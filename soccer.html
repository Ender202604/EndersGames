<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty Kicks - Ender's Game World</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0000;color:white;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}
h1{color:yellow;font-size:22px;margin-bottom:4px}
#home-btn{position:fixed;top:8px;left:10px;color:#ff9999;text-decoration:none;font-size:13px;z-index:99}
#scoreboard{font-size:18px;margin:6px 0;color:#ffddaa}
#hs-display{font-size:13px;color:#aaffaa;margin:2px 0}
#msg{font-size:15px;color:#ffff88;min-height:22px;margin:4px 0;text-align:center}
#field{position:relative;background:#2d7a2d;border-radius:10px;width:360px;height:260px;border:3px solid #fff;cursor:crosshair;overflow:hidden}
#goal{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:180px;height:90px;border:4px solid white;border-bottom:none;background:rgba(255,255,255,0.08);pointer-events:none}
#aim{position:absolute;width:20px;height:20px;border:2px solid yellow;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);display:none}
#ball{position:absolute;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#aaa);border:2px solid #555;bottom:30px;left:50%;transform:translateX(-50%);transition:all 0.5s ease-out}
#goalkeeper{position:absolute;top:28px;width:32px;height:68px;background:#ff6600;border-radius:6px;transition:left 0.3s}
#power-bar{width:300px;background:#333;border-radius:6px;height:18px;margin:6px 0;overflow:hidden;border:2px solid #666}
#power-fill{height:100%;width:0%;background:linear-gradient(90deg,#00cc00,#ffcc00,#ff0000);transition:width 0.05s}
.btn{background:#8b0000;color:white;border:2px solid #ff6666;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px}
.btn:hover{background:#cc0000}
#mode-row{display:flex;gap:6px;align-items:center;margin:4px 0}
.diff-btn{background:#2a0000;color:#ffcc00;border:2px solid #ff6666;padding:4px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.diff-btn.active{background:#cc0000;color:white}
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<h1>⚽ Penalty Kicks</h1>
<div id="scoreboard">You: <span id="pscore">0</span> &nbsp;|&nbsp; Keeper: <span id="kscore">0</span> &nbsp;|&nbsp; Round <span id="rnd">1</span>/5</div>
<div id="hs-display">Best: <span id="hs-val">0</span>/5</div>
<div id="mode-row">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">Easy</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">Hard</button>
</div>
<div id="field">
  <div id="goal"></div>
  <div id="goalkeeper"></div>
  <div id="aim"></div>
  <div id="ball"></div>
</div>
<div id="msg">Click in the goal area to aim, then hold SPACE (or hold button) to power up!</div>
<div id="power-bar"><div id="power-fill"></div></div>
<button class="btn" id="shoot-btn" onmousedown="startPower()" onmouseup="shoot()" ontouchstart="startPower();event.preventDefault()" ontouchend="shoot();event.preventDefault()">⚡ Hold to Power Up</button>
<button class="btn" onclick="resetGame()">🔄 New Game</button>
<script>
// --- Audio ---
var AC = window.AudioContext || window.webkitAudioContext;
var ac = AC ? new AC() : null;
function snd(freq, dur, type, vol) {
  if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.value = freq; o.type = type || 'square';
  g.gain.setValueAtTime(vol || 0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}
function sndKick() { snd(120, 0.12, 'square', 0.2); setTimeout(function(){ snd(80, 0.08, 'sine', 0.15); }, 80); }
function sndGoal() { [400,500,600,700,800].forEach(function(f,i){ setTimeout(function(){ snd(f,0.2,'sine',0.18); },i*80); }); }
function sndSave() { snd(300, 0.1, 'square', 0.18); setTimeout(function(){ snd(200, 0.15, 'sine', 0.12); }, 100); }

// --- High Score (best goals scored out of 5) ---
var HS_KEY = 'hs_soccer';
function getHiScore() { return parseInt(localStorage.getItem(HS_KEY) || '0'); }
function saveHiScore(v) { if (v > getHiScore()) { localStorage.setItem(HS_KEY, v); if(window.submitLeaderboard) submitLeaderboard('soccer',v); } }
document.getElementById('hs-val').textContent = getHiScore();

// --- Difficulty ---
var difficulty = 'easy';
function setDiff(d) {
  difficulty = d;
  document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
  document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
}
function getKeeperSpeed() { return difficulty === 'hard' ? 0.45 : 0.28; }
function getKeeperSmartness() { return difficulty === 'hard' ? 0.6 : 0.0; }

var playerScore=0,keeperScore=0,round=1,maxRounds=5;
var aiming=false,aimX=0,aimY=0,power=0,powering=false,powerTimer=null,shooting=false;
var field=document.getElementById('field');
var ball=document.getElementById('ball');
var aim=document.getElementById('aim');
var keeper=document.getElementById('goalkeeper');
var powerFill=document.getElementById('power-fill');
var msg=document.getElementById('msg');
keeper.style.left='164px';
keeper.style.top='28px';

field.addEventListener('mousemove',function(e){
  var r=field.getBoundingClientRect();
  var x=e.clientX-r.left, y=e.clientY-r.top;
  aim.style.left=x+'px'; aim.style.top=y+'px'; aim.style.display='block';
  aimX=x; aimY=y;
});
field.addEventListener('mouseleave',function(){aim.style.display='none';});
field.addEventListener('click',function(e){
  var r=field.getBoundingClientRect();
  aimX=e.clientX-r.left; aimY=e.clientY-r.top;
});
field.addEventListener('touchmove',function(e){
  e.preventDefault();
  var r=field.getBoundingClientRect();
  aimX=e.touches[0].clientX-r.left; aimY=e.touches[0].clientY-r.top;
  aim.style.left=aimX+'px'; aim.style.top=aimY+'px'; aim.style.display='block';
},{passive:false});

function startPower(){
  if(shooting||round>maxRounds) return;
  powering=true; power=0;
  powerTimer=setInterval(function(){
    power=Math.min(power+3,100);
    powerFill.style.width=power+'%';
  },30);
}
function shoot(){
  if(!powering||shooting) return;
  clearInterval(powerTimer); powering=false;
  if(round>maxRounds) return;
  shooting=true;
  sndKick();
  var targetX=aimX||180, targetY=aimY||60;
  ball.style.transition='all 0.45s ease-out';
  ball.style.left=(targetX-13)+'px';
  ball.style.top=(targetY-13)+'px';
  ball.style.bottom='auto';
  var goalLeft=90, goalRight=270, goalTop=20, goalBot=110;
  var inGoal = targetX>=goalLeft && targetX<=goalRight && targetY>=goalTop && targetY<=goalBot;
  // Keeper AI: hard mode tracks target position somewhat
  var keeperDest;
  if(difficulty==='hard' && Math.random()<getKeeperSmartness()){
    // Smart: move toward shot X with some error
    keeperDest = targetX - 16 + (Math.random()-0.5)*40;
    keeperDest = Math.max(90, Math.min(238, keeperDest));
  } else {
    keeperDest = Math.random()<0.5 ? 90+Math.random()*60 : 160+Math.random()*60;
  }
  // Animate keeper with difficulty speed
  var kTransTime = difficulty==='hard' ? 0.18 : 0.3;
  keeper.style.transition='left '+kTransTime+'s';
  keeper.style.left=keeperDest+'px';
  var keeperBlocked = Math.abs(targetX-(keeperDest+16))<28 && targetY>=28 && targetY<=96;
  setTimeout(function(){
    if(inGoal && !keeperBlocked){
      playerScore++;
      document.getElementById('pscore').textContent=playerScore;
      showMsg('⚽ GOAL! Great kick!','#88ff88');
      sndGoal();
    } else if(inGoal && keeperBlocked){
      keeperScore++;
      document.getElementById('kscore').textContent=keeperScore;
      showMsg('🧤 Saved! The keeper got it!','#ff8888');
      sndSave();
    } else {
      showMsg('😬 Missed! Aim for the goal!','#ffaa44');
    }
    round++;
    document.getElementById('rnd').textContent=Math.min(round,maxRounds);
    if(round>maxRounds){
      setTimeout(function(){
        saveHiScore(playerScore);
        document.getElementById('hs-val').textContent=getHiScore();
        var winner=playerScore>keeperScore?'You win! 🎉':playerScore<keeperScore?'Keeper wins! 😅':'Draw! 🤝';
        showMsg('Game Over! '+winner+' Final: '+playerScore+'-'+keeperScore,'#ffff44');
      },600);
    } else {
      setTimeout(function(){
        ball.style.transition='none';
        ball.style.left='167px'; ball.style.top='auto'; ball.style.bottom='30px';
        keeper.style.left='164px';
        powerFill.style.width='0%';
        shooting=false; power=0;
      },700);
    }
  },500);
}
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();if(!powering)startPower();}});
document.addEventListener('keyup',function(e){if(e.code==='Space')shoot();});
function showMsg(t,c){msg.textContent=t;msg.style.color=c||'#ffff88';}
function resetGame(){
  playerScore=0;keeperScore=0;round=1;shooting=false;powering=false;power=0;
  clearInterval(powerTimer);
  document.getElementById('pscore').textContent=0;
  document.getElementById('kscore').textContent=0;
  document.getElementById('rnd').textContent=1;
  powerFill.style.width='0%';
  ball.style.transition='none';
  ball.style.left='167px';ball.style.top='auto';ball.style.bottom='30px';
  keeper.style.left='164px';
  showMsg('Click in the goal area to aim, then hold button to power up!','#ffff88');
}
</script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
(function(){
  try {
    var lbApp=firebase.initializeApp({apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",databaseURL:"https://enders-games-default-rtdb.firebaseio.com"},'lb_soccer');
    var lbDb=lbApp.database();
    window.submitLeaderboard=function(game,score){
      if(score<=0)return;
      var n=localStorage.getItem('visitorName')||'Anonymous';
      lbDb.ref('leaderboard/'+game).push({name:n,score:score,date:new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),timestamp:Date.now()});
    };
  } catch(e){ window.submitLeaderboard=function(){}; }
})();
</script>
</body>
</html>
