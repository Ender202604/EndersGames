<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brick Breaker - Ender's Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0000;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
  }
  h1 {
    color: yellow;
    font-size: clamp(1.2rem, 4vw, 2rem);
    margin-bottom: 6px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #ffff00aa;
  }
  #status-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    font-size: clamp(0.8rem, 3vw, 1rem);
    color: #ffcccc;
    align-items: center;
  }
  #status-bar span { color: yellow; font-weight: bold; }
  #canvas-wrap {
    position: relative;
    border: 2px solid #ff6666;
    border-radius: 8px;
    box-shadow: 0 0 20px #ff000055;
    cursor: none;
  }
  canvas { display: block; border-radius: 6px; }
  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,0,0,0.9);
    border-radius: 6px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: clamp(1.4rem, 5vw, 2.2rem); }
  #overlay .sub { color: #ffcccc; font-size: clamp(0.9rem, 3vw, 1.1rem); }
  .big-btn {
    background: #cc0000;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
    margin: 4px;
  }
  .big-btn:hover { background: #ff2222; }
  .big-btn.green { background: #006600; }
  .big-btn.green:hover { background: #009900; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#ffaaaa;text-decoration:none;font-size:13px;border:1px solid #ff6666;padding:4px 10px;border-radius:6px;z-index:999;">← Back</a>

<h1>🧱 BRICK BREAKER</h1>
<div id="status-bar">
  ❤️ <span id="lives-val">3</span> &nbsp;&nbsp; Score: <span id="score-val">0</span> &nbsp;&nbsp; Level: <span id="level-val">1</span>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <h2 id="overlay-title" style="color:yellow;">Ready!</h2>
    <div class="sub" id="overlay-msg">Move mouse or touch to control the paddle</div>
    <div class="sub" id="overlay-score"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="big-btn green" id="btn-start">Start Game</button>
      <button class="big-btn" id="btn-restart" style="display:none;">Play Again</button>
      <button class="big-btn green" id="btn-next" style="display:none;">Next Level</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const BRICK_ROWS = 6;
const BRICK_COLS = 10;
const BRICK_COLORS = ['#ff2222','#ff8800','#ffdd00','#44ff44','#2288ff','#cc44ff'];

let W, H, PADDLE_W, PADDLE_H, BALL_R, BRICK_W, BRICK_H, BRICK_PAD, BRICK_TOP;

function resize() {
  W = Math.min(window.innerWidth - 20, 520);
  H = Math.min(window.innerHeight - 180, 480);
  W = Math.floor(W); H = Math.floor(H);
  canvas.width = W;
  canvas.height = H;
  PADDLE_W = Math.max(70, W * 0.18);
  PADDLE_H = 14;
  BALL_R = Math.max(7, W * 0.016);
  BRICK_PAD = 3;
  BRICK_W = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
  BRICK_H = Math.max(16, H * 0.04);
  BRICK_TOP = Math.max(40, H * 0.1);
}
resize();

let paddle, ball, bricks, lives, score, level, baseSpeed, state;
// state: 'ready' | 'playing' | 'paused' | 'dead' | 'levelup' | 'gameover'
let mouseX = W / 2;

function initBricks() {
  const b = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      b.push({
        x: BRICK_PAD + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        color: BRICK_COLORS[r],
        alive: true
      });
    }
  }
  return b;
}

function initBall() {
  const speed = baseSpeed + (level - 1) * 0.5;
  const angle = (Math.random() * 60 + 60) * Math.PI / 180;
  return {
    x: W / 2, y: H - 60,
    vx: Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1),
    vy: -Math.sin(angle) * speed,
    speed
  };
}

function init(keepLevel) {
  if (!keepLevel) { level = 1; score = 0; lives = 3; }
  baseSpeed = Math.min(W, H) * 0.008;
  paddle = { x: W / 2 - PADDLE_W / 2, y: H - 28, w: PADDLE_W, h: PADDLE_H };
  ball = initBall();
  bricks = initBricks();
  state = 'paused';
  updateUI();
  showOverlay('Ready!', `Level ${level} — Click or tap to launch!`, false, false, true);
  draw();
}

function showOverlay(title, msg, showRestart, showNext, showStart) {
  overlay.classList.add('show');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay-score').textContent = score > 0 ? `Score: ${score}` : '';
  document.getElementById('btn-restart').style.display = showRestart ? 'inline-block' : 'none';
  document.getElementById('btn-next').style.display = showNext ? 'inline-block' : 'none';
  document.getElementById('btn-start').style.display = showStart ? 'inline-block' : 'none';
}

function hideOverlay() { overlay.classList.remove('show'); }

function updateUI() {
  document.getElementById('lives-val').textContent = lives;
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
}

let animId;
function startPlay() {
  hideOverlay();
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  // Move paddle towards mouse/touch
  const target = mouseX - PADDLE_W / 2;
  paddle.x += (target - paddle.x) * 0.2;
  paddle.x = Math.max(0, Math.min(W - PADDLE_W, paddle.x));

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounces
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  if (ball.vy > 0 &&
      ball.y + BALL_R > paddle.y &&
      ball.y - BALL_R < paddle.y + PADDLE_H &&
      ball.x > paddle.x && ball.x < paddle.x + PADDLE_W) {
    const hitPos = (ball.x - paddle.x) / PADDLE_W - 0.5; // -0.5 to 0.5
    const angle = hitPos * 60 * Math.PI / 180;
    const spd = Math.hypot(ball.vx, ball.vy);
    ball.vx = Math.sin(angle) * spd;
    ball.vy = -Math.abs(Math.cos(angle)) * spd;
    ball.y = paddle.y - BALL_R;
  }

  // Brick collisions
  let bricksLeft = 0;
  for (const b of bricks) {
    if (!b.alive) continue;
    bricksLeft++;
    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
      b.alive = false;
      bricksLeft--;
      score += 10;
      updateUI();

      // Which side did we hit?
      const overlapLeft = ball.x + BALL_R - b.x;
      const overlapRight = b.x + b.w - (ball.x - BALL_R);
      const overlapTop = ball.y + BALL_R - b.y;
      const overlapBottom = b.y + b.h - (ball.y - BALL_R);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (minOverlap === overlapTop || minOverlap === overlapBottom) {
        ball.vy = -ball.vy;
      } else {
        ball.vx = -ball.vx;
      }
      break;
    }
  }

  // Win condition
  if (bricksLeft === 0) {
    state = 'levelup';
    cancelAnimationFrame(animId);
    level++;
    score += 100;
    updateUI();
    showOverlay('Level Complete! 🎉', `+100 bonus points! Ball is faster!`, false, true, false);
    return;
  }

  // Fall off bottom
  if (ball.y - BALL_R > H) {
    lives--;
    updateUI();
    if (lives <= 0) {
      state = 'gameover';
      cancelAnimationFrame(animId);
      showOverlay('GAME OVER', `Better luck next time!`, true, false, false);
    } else {
      state = 'paused';
      cancelAnimationFrame(animId);
      ball = initBall();
      showOverlay(`${lives} Life/Lives Left`, 'Click or tap to relaunch', false, false, true);
    }
  }
}

function draw() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.roundRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2, 3);
    ctx.fill();
    // Shine
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, 'rgba(255,255,255,0.25)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Paddle
  const pGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
  pGrad.addColorStop(0, '#ffffff');
  pGrad.addColorStop(1, '#aaaacc');
  ctx.fillStyle = pGrad;
  ctx.shadowColor = '#8888ff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 5);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball
  ctx.fillStyle = '#ffffaa';
  ctx.shadowColor = '#ffff44';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// Mouse control
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
document.getElementById('canvas-wrap').addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});

// Touch control
document.getElementById('canvas-wrap').addEventListener('touchmove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  e.preventDefault();
}, { passive: false });

document.getElementById('btn-start').addEventListener('click', startPlay);
document.getElementById('btn-restart').addEventListener('click', () => { init(false); });
document.getElementById('btn-next').addEventListener('click', () => {
  init(true);
  // Keep level that was already incremented
  updateUI();
});

window.addEventListener('resize', () => { resize(); init(false); });

init(false);
</script>
</body>
</html>
