<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Pop - Ender's Game World</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0040;color:white;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}
h1{color:#ff88ff;font-size:22px;margin-bottom:3px}
#home-btn{position:fixed;top:8px;left:10px;color:#ff9999;text-decoration:none;font-size:13px;z-index:99}
#scoreboard{font-size:18px;margin:4px 0;color:#ffddff}
#hs-display{font-size:13px;color:#aaffaa;margin:2px 0}
#timer-bar-wrap{width:320px;height:14px;background:#333;border-radius:7px;margin:4px 0;border:2px solid #888;overflow:hidden}
#timer-bar{height:100%;width:100%;background:linear-gradient(90deg,#ff3333,#ffaa00,#44ee44);transition:width 0.25s}
#msg{font-size:14px;color:#ffff88;min-height:20px;margin:3px 0;text-align:center}
canvas{border-radius:12px;border:3px solid rgba(255,100,255,0.4);cursor:crosshair;background:linear-gradient(180deg,#0a0030 0%,#180050 60%,#0a0020 100%)}
.btn{background:#4a0080;color:white;border:2px solid #cc66ff;padding:7px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px}
.btn:hover{background:#7a00cc}
#mode-row{display:flex;gap:6px;align-items:center;margin:3px 0}
.diff-btn{background:#1a0030;color:#cc88ff;border:2px solid #cc66ff;padding:3px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.diff-btn.active{background:#7a00cc;color:white}
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<h1>🎈 Balloon Pop</h1>
<div id="scoreboard">Score: <span id="score-el">0</span> &nbsp;|&nbsp; Popped: <span id="pop-el">0</span> &nbsp;|&nbsp; Missed: <span id="miss-el">0</span></div>
<div id="hs-display">Best: <span id="hs-val">0</span></div>
<div id="mode-row">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">Easy</button>
  <button class="diff-btn" id="btn-med" onclick="setDiff('medium')">Medium</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">Hard</button>
</div>
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>
<div id="msg">Click balloons before they escape! 🎈</div>
<canvas id="c" width="360" height="380"></canvas>
<button class="btn" onclick="startGame()">▶ Start</button>
<button class="btn" onclick="startGame()">🔄 Restart</button>
<script>
var AC=window.AudioContext||window.webkitAudioContext;
var ac=AC?new AC():null;
function snd(freq,dur,type,vol){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.frequency.value=freq;o.type=type||'sine';
  g.gain.setValueAtTime(vol||0.15,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.start();o.stop(ac.currentTime+dur);
}
function sndPop(big){
  if(!ac)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type='sawtooth';
  o.frequency.value=big?180:260;
  o.frequency.exponentialRampToValueAtTime(big?60:80,ac.currentTime+0.12);
  g.gain.setValueAtTime(0.22,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
  o.start();o.stop(ac.currentTime+0.15);
}
function sndMiss(){snd(150,0.1,'square',0.1);}
function sndGameOver(){[200,160,120].forEach(function(f,i){setTimeout(function(){snd(f,0.25,'square',0.15);},i*120);});}
function sndBig(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){snd(f,0.18,'sine',0.2);},i*80);});}

var HS_KEY='hs_balloonpop';
function getHS(){return parseInt(localStorage.getItem(HS_KEY)||'0');}
function saveHS(v){if(v>getHS()){localStorage.setItem(HS_KEY,v);if(window.submitLeaderboard)submitLeaderboard('balloonpop',v);}}
document.getElementById('hs-val').textContent=getHS();

var difficulty='easy';
var DIFF={
  easy:{spawnRate:0.018,speedMult:1.0,gameSec:60,maxBalloons:12},
  medium:{spawnRate:0.028,speedMult:1.4,gameSec:50,maxBalloons:16},
  hard:{spawnRate:0.040,speedMult:1.9,gameSec:45,maxBalloons:22}
};
function setDiff(d){
  difficulty=d;
  ['easy','medium','hard'].forEach(function(x){document.getElementById('btn-'+x).classList.toggle('active',x===d);});
}
// btn id fix
document.getElementById('btn-med').id='btn-medium';

var c=document.getElementById('c'),ctx=c.getContext('2d');
var W=360,H=380;
var balloons=[],particles=[];
var score=0,popped=0,missed=0;
var gameRunning=false,timeLeft=60;
var spawnTimer=0,animFrame=null;
var lastTime=0;

var COLORS=['#FF3366','#FF6633','#FFCC00','#33CC44','#3388FF','#CC44FF','#FF88AA','#00DDCC'];
var DARK={'#FF3366':'#AA1133','#FF6633':'#AA3300','#FFCC00':'#AA8800','#33CC44':'#1A8822',
          '#3388FF':'#1144AA','#CC44FF':'#881ACC','#FF88AA':'#AA4466','#00DDCC':'#007788'};

function makeBalloon(){
  var col=COLORS[Math.floor(Math.random()*COLORS.length)];
  var big=Math.random()<0.18;
  var r=big?28:(18+Math.random()*14);
  var d=DIFF[difficulty];
  return {
    x:r+Math.random()*(W-r*2), y:H+r,
    r:r, col:col, big:big,
    spd:(0.6+Math.random()*0.8)*d.speedMult*(big?0.75:1),
    drift:(Math.random()-0.5)*0.4,
    alpha:1, popping:false, popTimer:0,
    wobble:Math.random()*Math.PI*2, wobbleSpd:0.04+Math.random()*0.04,
    string:Math.random()*20+15
  };
}

function spawnParticles(x,y,col,r){
  for(var i=0;i<(r>22?12:7);i++){
    var a=Math.random()*Math.PI*2, spd=1.5+Math.random()*3;
    particles.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,col:col,life:1,r:2+Math.random()*3});
  }
}

function drawBalloon(b){
  if(b.popping){
    var t=1-b.popTimer/0.25;
    ctx.save();
    ctx.globalAlpha=t*0.8;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*(1.2+b.popTimer),0,Math.PI*2);
    ctx.strokeStyle=b.col;ctx.lineWidth=3;ctx.stroke();
    ctx.restore();
    return;
  }
  var w=b.r*0.12*Math.sin(b.wobble);
  ctx.save();
  ctx.globalAlpha=b.alpha;
  // Shadow
  var grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.05,b.x,b.y,b.r*1.05);
  grad.addColorStop(0,'rgba(255,255,255,0.55)');
  grad.addColorStop(0.4,b.col);
  grad.addColorStop(1,DARK[b.col]||'#330000');
  ctx.beginPath();
  ctx.ellipse(b.x+w,b.y,b.r,b.r*1.1,0,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.stroke();
  // Shine
  ctx.beginPath();ctx.ellipse(b.x+w-b.r*0.28,b.y-b.r*0.28,b.r*0.22,b.r*0.3,Math.PI/4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
  // Knot
  ctx.beginPath();ctx.arc(b.x+w,b.y+b.r*1.0,b.r*0.12,0,Math.PI*2);
  ctx.fillStyle=DARK[b.col]||'#330000';ctx.fill();
  // String
  ctx.beginPath();
  ctx.moveTo(b.x+w,b.y+b.r*1.12);
  ctx.quadraticCurveTo(b.x+w+b.string*0.3,b.y+b.r+b.string*0.5,b.x+w+b.string*0.1,b.y+b.r+b.string);
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.stroke();
  // Big star
  if(b.big){
    ctx.fillStyle='rgba(255,255,0,0.8)';ctx.font='bold 12px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',b.x+w,b.y+2);
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(function(p){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();ctx.restore();
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Stars
  if(!gameRunning&&score===0){
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(var s=0;s<40;s++){
      var sx=((s*137.5)%W),sy=((s*91.3)%H);
      ctx.fillRect(sx,sy,1.5,1.5);
    }
  }
  balloons.forEach(drawBalloon);
  drawParticles();
}

function update(dt){
  // Spawn
  var d=DIFF[difficulty];
  if(balloons.filter(function(b){return!b.popping;}).length<d.maxBalloons){
    spawnTimer+=dt;
    if(spawnTimer>1/d.spawnRate*0.016){
      spawnTimer=0;
      if(Math.random()<d.spawnRate) balloons.push(makeBalloon());
    }
  }
  // Update balloons
  for(var i=balloons.length-1;i>=0;i--){
    var b=balloons[i];
    if(b.popping){
      b.popTimer+=dt;
      if(b.popTimer>0.25){balloons.splice(i,1);}
    } else {
      b.y-=b.spd;
      b.x+=b.drift;
      b.wobble+=b.wobbleSpd;
      if(b.x<b.r)b.drift=Math.abs(b.drift);
      if(b.x>W-b.r)b.drift=-Math.abs(b.drift);
      if(b.y<-b.r-b.string){
        balloons.splice(i,1);
        missed++;
        document.getElementById('miss-el').textContent=missed;
        sndMiss();
      }
    }
  }
  // Particles
  for(var j=particles.length-1;j>=0;j--){
    var p=particles[j];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08;
    p.life-=dt*2.5;
    if(p.life<=0) particles.splice(j,1);
  }
  // Timer
  timeLeft-=dt;
  if(timeLeft<0) timeLeft=0;
  document.getElementById('timer-bar').style.width=(timeLeft/DIFF[difficulty].gameSec*100)+'%';
  if(timeLeft<=10) document.getElementById('timer-bar').style.background='#ff3333';
  if(timeLeft<=0) endGame();
}

var points=[100,200,150,120,80,60,40,80];
function clickBalloon(ex,ey){
  if(!gameRunning)return;
  for(var i=balloons.length-1;i>=0;i--){
    var b=balloons[i];
    if(b.popping)continue;
    var dx=ex-b.x,dy=ey-b.y;
    if(dx*dx+dy*dy<=b.r*b.r*1.15){
      var pts=b.big?500:100+Math.floor((DIFF[difficulty].speedMult-1)*50);
      score+=pts; popped++;
      document.getElementById('score-el').textContent=score;
      document.getElementById('pop-el').textContent=popped;
      showFloatScore(b.x,b.y,'+'+pts+(b.big?' 🌟':''));
      spawnParticles(b.x,b.y,b.col,b.r);
      b.popping=true; b.popTimer=0;
      if(b.big)sndBig(); else sndPop(b.r>22);
      return;
    }
  }
}
var floats=[];
function showFloatScore(x,y,txt){floats.push({x:x,y:y,txt:txt,life:1.0});}

function drawFloats(){
  floats=floats.filter(function(f){
    f.y-=1.2;f.life-=0.025;
    ctx.save();ctx.globalAlpha=f.life;
    ctx.fillStyle='#FFD700';ctx.font='bold 16px Arial';ctx.textAlign='center';
    ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.fillText(f.txt,f.x,f.y);ctx.restore();
    return f.life>0;
  });
}

var rafId=null;
function loop(ts){
  if(!gameRunning)return;
  var dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  draw();
  drawFloats();
  rafId=requestAnimationFrame(loop);
}

function startGame(){
  if(rafId)cancelAnimationFrame(rafId);
  balloons=[];particles=[];floats=[];
  score=0;popped=0;missed=0;spawnTimer=0;
  timeLeft=DIFF[difficulty].gameSec;
  document.getElementById('score-el').textContent=0;
  document.getElementById('pop-el').textContent=0;
  document.getElementById('miss-el').textContent=0;
  document.getElementById('timer-bar').style.background='linear-gradient(90deg,#ff3333,#ffaa00,#44ee44)';
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('msg').textContent='Pop as many as you can! ⭐ = 500 pts!';
  gameRunning=true;
  lastTime=performance.now();
  rafId=requestAnimationFrame(loop);
}

function endGame(){
  gameRunning=false;
  if(rafId)cancelAnimationFrame(rafId);
  saveHS(score);
  document.getElementById('hs-val').textContent=getHS();
  var msg=score>=2000?'INCREDIBLE! 🏆':score>=1000?'Amazing! 🌟':score>=500?'Great job! 👍':'Keep practicing! 🎈';
  document.getElementById('msg').textContent='Time\'s up! Score: '+score+' — '+msg;
  sndGameOver();
}

c.addEventListener('click',function(e){
  var r=c.getBoundingClientRect();
  clickBalloon(e.clientX-r.left,e.clientY-r.top);
});
c.addEventListener('touchstart',function(e){
  e.preventDefault();
  var r=c.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(function(t){clickBalloon(t.clientX-r.left,t.clientY-r.top);});
},{passive:false});
</script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
(function(){
  try{
    var lbApp=firebase.initializeApp({apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",databaseURL:"https://enders-games-default-rtdb.firebaseio.com"},'lb_balloonpop');
    var lbDb=lbApp.database();
    window.submitLeaderboard=function(game,score){
      if(score<=0)return;
      var n=localStorage.getItem('visitorName')||'Anonymous';
      lbDb.ref('leaderboard/'+game).push({name:n,score:score,date:new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),timestamp:Date.now()});
    };
  }catch(e){window.submitLeaderboard=function(){};}
})();
</script>
</body>
</html>
