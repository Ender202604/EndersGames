<!DOCTYPE html>
<html>
  <head>
    <title>Memory Match!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #000044; font-family: Arial, sans-serif; color: white; min-height: 100vh; user-select: none; -webkit-user-select: none; display: flex; flex-direction: column; }
      #hud { display: flex; justify-content: space-between; padding: 14px 24px; background: rgba(0,0,0,0.5); font-size: 26px; font-weight: bold; }
      #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; flex: 1; align-content: center; max-width: 600px; margin: 0 auto; width: 100%; }
      .card { background: #3333aa; border-radius: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 48px; cursor: pointer; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
      .card:active { transform: scale(0.93); }
      .card.flipped { background: #6666ff; }
      .card.matched { background: #006600; pointer-events: none; }
      .card-inner { font-size: 48px; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
      .overlay.show { display: flex; }
      .big-title { font-size: 52px; font-weight: bold; color: yellow; text-align: center; }
      .big-btn { font-size: 34px; padding: 20px 48px; border-radius: 20px; border: none; background: yellow; color: #000044; font-weight: bold; cursor: pointer; touch-action: manipulation; text-decoration: none; display: inline-block; }
      .big-btn:active { background: white; }
      .home-btn { position: fixed; top: 14px; left: 14px; font-size: 22px; padding: 10px 18px; border-radius: 14px; border: none; background: rgba(0,0,0,0.5); color: white; cursor: pointer; z-index: 30; text-decoration: none; }
    </style>
  </head>
  <body>
    <a class="home-btn" href="index.html">🏠 Home</a>
    <div id="hud">
      <span>🧠 Memory Match</span>
      <span id="moves-display">Moves: 0</span>
      <span id="pairs-display">Pairs: 0/8</span>
    </div>
    <div id="grid"></div>

    <div class="overlay show" id="start-overlay">
      <div style="font-size:90px">🧠</div>
      <div class="big-title">Memory Match!</div>
      <div style="font-size:24px; text-align:center; line-height:1.6;">Flip two cards at a time.<br>Find all the matching pairs!<br><span style="color:yellow">Can you match them all?</span></div>
      <button class="big-btn" onclick="startGame()">PLAY!</button>
    </div>
    <div class="overlay" id="end-overlay">
      <div style="font-size:90px">🎉</div>
      <div class="big-title">You Win!</div>
      <div style="font-size:32px; color:yellow;" id="final-moves"></div>
      <button class="big-btn" onclick="startGame()">Play Again!</button>
      <a class="big-btn" href="index.html">🏠 Home</a>
    </div>

    <script>
      var emojis = ["🍕","🌟","🐢","🎈","🦄","🍦","🚀","🌈"];
      var cards = [], flipped = [], moves = 0, pairs = 0, locked = false;

      function shuffle(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i+1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

      function startGame() {
        moves = 0; pairs = 0; flipped = []; locked = false;
        document.getElementById("moves-display").innerText = "Moves: 0";
        document.getElementById("pairs-display").innerText = "Pairs: 0/8";
        document.getElementById("start-overlay").classList.remove("show");
        document.getElementById("end-overlay").classList.remove("show");
        var deck = shuffle(emojis.concat(emojis));
        var grid = document.getElementById("grid"); grid.innerHTML = "";
        cards = [];
        deck.forEach(function(emoji, i) {
          var card = document.createElement("div");
          card.className = "card";
          card.dataset.emoji = emoji;
          card.dataset.index = i;
          card.innerHTML = "❓";
          card.ontouchstart = function(e) { e.preventDefault(); flipCard(card); };
          card.onclick = function() { flipCard(card); };
          grid.appendChild(card);
          cards.push(card);
        });
      }

      function flipCard(card) {
        if (locked || card.classList.contains("flipped") || card.classList.contains("matched")) return;
        card.innerHTML = card.dataset.emoji;
        card.classList.add("flipped");
        flipped.push(card);
        if (flipped.length === 2) {
          locked = true; moves++;
          document.getElementById("moves-display").innerText = "Moves: " + moves;
          if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
            flipped[0].classList.add("matched"); flipped[1].classList.add("matched");
            flipped = []; locked = false; pairs++;
            document.getElementById("pairs-display").innerText = "Pairs: " + pairs + "/8";
            if (pairs === 8) { setTimeout(function() { document.getElementById("final-moves").innerText = "You did it in " + moves + " moves!"; document.getElementById("end-overlay").classList.add("show"); }, 400); }
          } else {
            setTimeout(function() {
              flipped[0].innerHTML = "❓"; flipped[1].innerHTML = "❓";
              flipped[0].classList.remove("flipped"); flipped[1].classList.remove("flipped");
              flipped = []; locked = false;
            }, 900);
          }
        }
      }
    </script>
  </body>
</html>
