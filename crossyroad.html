<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossy Road – Ender's Game World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding-top: 40px; }
#home-btn { position: fixed; top: 8px; left: 10px; color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99; }
#hud { display: flex; flex-direction: column; align-items: center; width: 360px; padding: 4px 8px; font-size: 14px; color: #ffcccc; margin-bottom: 4px; }
#hud span { color: #ffff00; font-weight: bold; }
canvas { border: 2px solid #ff6666; border-radius: 8px; display: block; touch-action: none; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 50; }
#overlay h1 { font-size: 36px; color: #ff6666; text-shadow: 0 0 20px #ff0000; }
#overlay .info { font-size: 18px; color: #ffcccc; }
.btn { background: darkred; border: 2px solid #ff6666; color: #ffff00; font-size: 18px; padding: 10px 28px; border-radius: 8px; cursor: pointer; }
.btn:hover { background: #aa0000; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<div id="hud">
  <div>Score: <span id="hud-score">0</span></div>
  <div>Best: <span id="hud-hs">0</span></div>
</div>
<canvas id="gc" width="360" height="500"></canvas>

<div id="overlay">
  <h1>🐸 Crossy Road</h1>
  <div class="info">Hop forward to score!</div>
  <div class="info">Swipe or use arrow keys</div>
  <div class="info">Best: <span id="ov-hs">0</span></div>
  <button class="btn" id="play-btn">▶ Play</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
var FB_CFG = {apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",authDomain:"enders-games.firebaseapp.com",databaseURL:"https://enders-games-default-rtdb.firebaseio.com",projectId:"enders-games",storageBucket:"enders-games.firebasestorage.app",messagingSenderId:"87049074470",appId:"1:87049074470:web:bc38b35669b43aedceb3e7"};

var HS_KEY = 'hs_crossyroad';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function saveHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }
function submitScore(score) {
  var name = localStorage.getItem('visitorName') || 'Player';
  try {
    var app = firebase.initializeApp(FB_CFG, 'lb_crossyroad');
    var db = app.database();
    db.ref('leaderboard/crossyroad').push({name:name, score:score, date:new Date().toLocaleDateString()});
  } catch(e) {}
}

var audio = null;
function getAudio() {
  if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  return audio;
}
function playBeep(freq, dur, type, vol) {
  var ac = getAudio(); if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W = 360, H = 500;

var CELL = 44;         // cell size in pixels
var COLS = Math.floor(W / CELL); // 8 columns
var ROWS = Math.ceil(H / CELL) + 2;  // visible rows + buffer

var state = 'menu';
var player, score, cameraY, gameLoopId, lastTime;
var lanes, laneOffset;
var hopAnim, hopDir;
var keys;
var swipeStartX, swipeStartY;
var deathAnim;

function initGame() {
  score = 0;
  player = { col: Math.floor(COLS/2), row: 0, x: 0, y: 0, targetX: 0, targetY: 0, moving: false, onLog: null };
  cameraY = 0; // world Y of camera top (in cells)
  laneOffset = 0;
  lanes = [];
  hopAnim = null;
  deathAnim = null;
  keys = {};
  swipeStartX = null; swipeStartY = null;

  // Generate initial lanes (row 0 = start, row 1+ going up)
  generateLanes(0, 30);
  updatePlayerPixel();
  updateHUD();
}

// World row 0 = starting grass. Higher rows = further ahead (north).
// Camera: player stays at ~row 3 from bottom of visible area.
function worldRowToScreenY(worldRow) {
  // cameraY = world row at top of canvas
  var relRow = worldRow - cameraY;
  return relRow * CELL;
}

function updatePlayerPixel() {
  player.x = player.col * CELL + CELL/2;
  player.y = worldRowToScreenY(player.row) + CELL/2;
}

function generateLanes(fromRow, count) {
  for (var r = fromRow; r < fromRow + count; r++) {
    if (lanes[r]) continue;
    var type;
    if (r === 0) {
      type = 'safe';
    } else if (r % 5 === 0) {
      type = 'safe';
    } else if (r % 3 === 1 || r % 3 === 2) {
      type = Math.random() < 0.55 ? 'road' : 'water';
    } else {
      type = Math.random() < 0.3 ? 'safe' : (Math.random() < 0.5 ? 'road' : 'water');
    }
    // Force alternation: don't have 3+ water or 3+ road in a row
    if (r >= 2) {
      var prev1 = lanes[r-1] ? lanes[r-1].type : 'safe';
      var prev2 = lanes[r-2] ? lanes[r-2].type : 'safe';
      if (prev1 === type && prev2 === type && type !== 'safe') type = 'safe';
    }
    var lane = { type: type, vehicles: [] };
    if (type === 'road') {
      var dir = Math.random() < 0.5 ? 1 : -1;
      var baseSpeed = 60 + Math.random() * 80 + Math.min(r * 1.5, 80);
      lane.dir = dir;
      lane.speed = baseSpeed;
      var gap = 80 + Math.random() * 60;
      var cx = dir === 1 ? -80 : W + 80;
      for (var i = 0; i < 4; i++) {
        lane.vehicles.push({ x: cx + dir * i * (50 + gap), w: 36 + Math.random()*28, h: 26, color: randomCarColor() });
      }
    } else if (type === 'water') {
      var dir = Math.random() < 0.5 ? 1 : -1;
      var baseSpeed = 40 + Math.random() * 40;
      lane.dir = dir;
      lane.speed = baseSpeed;
      var lx = dir === 1 ? -100 : W + 100;
      for (var i = 0; i < 3; i++) {
        lane.vehicles.push({ x: lx + dir * i * (90 + Math.random()*40), w: 55 + Math.random()*35, h: 24, isLog: true });
      }
    }
    lanes[r] = lane;
  }
}

function randomCarColor() {
  var colors = ['#ff4444','#ff8800','#ffcc00','#44ff44','#4488ff','#cc44ff','#ff44cc','#44ffff'];
  return colors[Math.floor(Math.random() * colors.length)];
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-hs').textContent = getHS();
}

function tryMove(dc, dr) {
  if (player.moving || deathAnim) return;
  var newCol = player.col + dc;
  var newRow = player.row + dr;

  // Clamp column
  if (newCol < 0 || newCol >= COLS) return;
  // Don't allow going back past start
  if (newRow < 0) newRow = 0;

  if (dr > 0) { // moving forward
    score = Math.max(score, newRow);
    updateHUD();
  } else if (dr < 0) { // moving backward
    // score doesn't decrease
  }

  player.moving = true;
  hopAnim = { fromCol: player.col, fromRow: player.row, toCol: newCol, toRow: newRow, t: 0, dur: 0.12 };
  player.col = newCol;
  player.row = newRow;
  player.onLog = null;
  playBeep(440, 0.07, 'sine', 0.2);

  // Generate more lanes ahead
  generateLanes(player.row - 2, 20);
}

function gameOver(reason) {
  if (state !== 'play') return;
  state = 'over';
  saveHS(score);
  submitScore(score);
  if (reason === 'car') {
    playBeep(150, 0.4, 'sawtooth', 0.4);
  } else {
    playBeep(200, 0.3, 'sine', 0.3);
  }
  deathAnim = { t: 0, dur: 1.2, x: player.x, y: player.y };
  setTimeout(function() {
    showOverlay(true);
  }, 1200);
}

function showOverlay(isOver) {
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  var h1 = ov.querySelector('h1');
  var infos = ov.querySelectorAll('.info');
  if (isOver) {
    h1.textContent = 'Game Over!';
    infos[0].innerHTML = 'Score: <span style="color:#ffff00;font-weight:bold">' + score + '</span>';
    infos[1].innerHTML = 'Hops made!';
    infos[2].innerHTML = 'Best: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play Again';
  } else {
    h1.textContent = '🐸 Crossy Road';
    infos[0].textContent = 'Hop forward to score!';
    infos[1].textContent = 'Swipe or use arrow keys';
    infos[2].innerHTML = 'Best: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play';
  }
}

function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

function startGame() {
  initGame();
  hideOverlay();
  state = 'play';
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  lastTime = null;
  gameLoopId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (state !== 'play' && state !== 'over') return;
  if (!lastTime) lastTime = ts;
  var dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  gameLoopId = requestAnimationFrame(loop);
}

function update(dt) {
  if (state !== 'play') {
    // Just update death anim
    if (deathAnim) { deathAnim.t += dt; }
    return;
  }

  // Camera: target camera so player is ~3 rows from bottom
  var targetCameraY = player.row - (Math.floor(H / CELL) - 3);
  cameraY += (targetCameraY - cameraY) * 8 * dt;

  // Hop animation
  if (hopAnim) {
    hopAnim.t += dt;
    var prog = Math.min(hopAnim.t / hopAnim.dur, 1);
    var eased = prog < 0.5 ? 2*prog*prog : -1+(4-2*prog)*prog;
    var fromX = hopAnim.fromCol * CELL + CELL/2;
    var fromY = worldRowToScreenY(hopAnim.fromRow) + CELL/2;
    var toX = hopAnim.toCol * CELL + CELL/2;
    var toY = worldRowToScreenY(hopAnim.toRow) + CELL/2;
    player.x = fromX + (toX - fromX) * eased;
    player.y = fromY + (toY - fromY) * eased;
    // Hop arc
    player.hopArc = Math.sin(prog * Math.PI) * 10;
    if (prog >= 1) {
      player.moving = false;
      player.hopArc = 0;
      hopAnim = null;
      updatePlayerPixel();
      checkLanding();
    }
  } else {
    updatePlayerPixel();
    player.hopArc = 0;
  }

  // Update lanes / vehicles
  generateLanes(Math.floor(cameraY) - 2, ROWS + 4);
  var visTop = Math.floor(cameraY) - 1;
  var visBot = Math.floor(cameraY) + ROWS + 2;

  for (var r = visTop; r < visBot; r++) {
    var lane = lanes[r];
    if (!lane || (lane.type !== 'road' && lane.type !== 'water')) continue;
    for (var i = 0; i < lane.vehicles.length; i++) {
      var v = lane.vehicles[i];
      v.x += lane.dir * lane.speed * dt;
      // Wrap around
      if (lane.dir === 1 && v.x > W + v.w + 20) v.x = -v.w - 20;
      if (lane.dir === -1 && v.x < -v.w - 20) v.x = W + v.w + 20;
    }
  }

  // Log riding: if player is on a water lane and on a log, move with it
  if (!player.moving) {
    var pLane = lanes[player.row];
    if (pLane && pLane.type === 'water') {
      var onLog = false;
      for (var i = 0; i < pLane.vehicles.length; i++) {
        var v = pLane.vehicles[i];
        var px = player.x;
        if (px >= v.x && px <= v.x + v.w) {
          onLog = true;
          player.col += pLane.dir * pLane.speed * dt / CELL;
          player.col = Math.max(0, Math.min(COLS - 1, player.col));
          updatePlayerPixel();
          // Check if player drifted off canvas
          if (player.x < 0 || player.x > W) {
            gameOver('water'); return;
          }
          break;
        }
      }
      if (!onLog) {
        gameOver('water'); return;
      }
    }

    // Car collision
    if (pLane && pLane.type === 'road') {
      var screenY = worldRowToScreenY(player.row);
      for (var i = 0; i < pLane.vehicles.length; i++) {
        var v = pLane.vehicles[i];
        if (player.x + 14 > v.x && player.x - 14 < v.x + v.w) {
          gameOver('car'); return;
        }
      }
    }
  }

  // Check if player fell off bottom of camera (went back too far)
  if (worldRowToScreenY(player.row) > H + CELL) {
    gameOver('fall'); return;
  }

  saveHS(score);
}

function checkLanding() {
  // Re-run immediate collision checks after landing
  var pLane = lanes[player.row];
  if (pLane && pLane.type === 'water') {
    var onLog = false;
    for (var i = 0; i < pLane.vehicles.length; i++) {
      var v = pLane.vehicles[i];
      if (player.x >= v.x && player.x <= v.x + v.w) { onLog = true; break; }
    }
    if (!onLog) { gameOver('water'); }
  }
  if (pLane && pLane.type === 'road') {
    for (var i = 0; i < pLane.vehicles.length; i++) {
      var v = pLane.vehicles[i];
      if (player.x + 14 > v.x && player.x - 14 < v.x + v.w) {
        gameOver('car'); return;
      }
    }
  }
}

function getLaneColor(type) {
  if (type === 'safe') return '#2d5a1b';
  if (type === 'road') return '#444444';
  if (type === 'water') return '#1a3a6e';
  return '#2d5a1b';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  var visTop = Math.floor(cameraY) - 1;
  var visBot = Math.floor(cameraY) + ROWS + 2;

  // Draw lanes
  for (var r = visTop; r < visBot; r++) {
    var lane = lanes[r];
    if (!lane) continue;
    var sy = worldRowToScreenY(r);
    ctx.fillStyle = getLaneColor(lane.type);
    ctx.fillRect(0, sy, W, CELL);

    // Lane details
    if (lane.type === 'safe') {
      // Grass texture dots
      ctx.fillStyle = 'rgba(60,120,30,0.4)';
      for (var gx = 4; gx < W; gx += 14) {
        ctx.beginPath();
        ctx.arc(gx + (r*7)%8, sy + CELL/2 + (r*3)%6-3, 3, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (lane.type === 'road') {
      // Road markings
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (var mx = 10; mx < W; mx += 50) {
        ctx.fillRect(mx, sy + CELL/2 - 2, 24, 4);
      }
    } else if (lane.type === 'water') {
      // Water waves
      ctx.strokeStyle = 'rgba(100,180,255,0.3)';
      ctx.lineWidth = 2;
      for (var wx = 0; wx < W; wx += 30) {
        ctx.beginPath();
        ctx.moveTo(wx, sy + CELL/3);
        ctx.quadraticCurveTo(wx+8, sy + CELL/3 - 4, wx+16, sy + CELL/3);
        ctx.stroke();
      }
    }

    // Draw vehicles/logs
    if (lane.type === 'road' || lane.type === 'water') {
      for (var i = 0; i < lane.vehicles.length; i++) {
        var v = lane.vehicles[i];
        var vy = sy + (CELL - v.h) / 2;
        if (v.isLog) {
          ctx.fillStyle = '#8B4513';
          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(v.x, vy, v.w, v.h, 8) : ctx.rect(v.x, vy, v.w, v.h);
          ctx.fill();
          ctx.fillStyle = '#A0522D';
          ctx.fillRect(v.x + 4, vy + 4, v.w - 8, 4);
        } else {
          ctx.fillStyle = v.color;
          ctx.shadowColor = v.color;
          ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(v.x, vy, v.w, v.h, 5) : ctx.rect(v.x, vy, v.w, v.h);
          ctx.fill();
          // Windows
          ctx.fillStyle = 'rgba(200,230,255,0.6)';
          ctx.fillRect(v.x + v.w*0.2, vy + 3, v.w*0.25, v.h - 8);
          ctx.fillRect(v.x + v.w*0.55, vy + 3, v.w*0.25, v.h - 8);
          ctx.shadowBlur = 0;
        }
      }
    }
  }

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var c = 1; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL, 0);
    ctx.lineTo(c * CELL, H);
    ctx.stroke();
  }

  // Player
  if (deathAnim) {
    var dp = Math.min(deathAnim.t / deathAnim.dur, 1);
    ctx.globalAlpha = 1 - dp;
    ctx.save();
    ctx.translate(deathAnim.x, deathAnim.y);
    ctx.rotate(dp * Math.PI * 4);
    ctx.scale(1 + dp, 1 + dp);
    drawFrog(0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  } else {
    ctx.save();
    ctx.translate(player.x, player.y - (player.hopArc || 0));
    drawFrog(0, 0);
    ctx.restore();
  }

  // HUD overlay (score on canvas)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 28);
  ctx.fillStyle = '#ffcccc';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Score: ' + score, W/2, 18);
}

function drawFrog(x, y) {
  // Body
  ctx.fillStyle = '#44cc44';
  ctx.shadowColor = '#44cc44';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.ellipse(x, y, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(x - 5, y - 5, 5, 0, Math.PI*2);
  ctx.arc(x + 5, y - 5, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x - 5, y - 5, 2.5, 0, Math.PI*2);
  ctx.arc(x + 5, y - 5, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// Keyboard controls
document.addEventListener('keydown', function(e) {
  if (state !== 'play') return;
  if (e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); tryMove(0, 1); }
  if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); tryMove(0, -1); }
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); tryMove(-1, 0); }
  if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); tryMove(1, 0); }
});

// Touch / swipe controls
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, {passive:false});

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (swipeStartX === null) return;
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  var adx = Math.abs(dx), ady = Math.abs(dy);

  if (adx < 8 && ady < 8) {
    // Tap — hop forward
    if (state === 'play') tryMove(0, 1);
  } else if (adx > ady) {
    if (state === 'play') tryMove(dx > 0 ? 1 : -1, 0);
  } else {
    if (state === 'play') tryMove(0, dy > 0 ? -1 : 1);
  }
  swipeStartX = null; swipeStartY = null;
}, {passive:false});

canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive:false});

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('play-btn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

document.getElementById('ov-hs').textContent = getHS();
document.getElementById('hud-hs').textContent = getHS();
</script>
</body>
</html>
