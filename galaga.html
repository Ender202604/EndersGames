<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Galaga – Ender's Game World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding-top: 40px; }
#home-btn { position: fixed; top: 8px; left: 10px; color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99; }
#hud { display: flex; justify-content: space-between; width: 360px; padding: 4px 8px; font-size: 14px; color: #ffcccc; margin-bottom: 4px; }
#hud span { color: #ffff00; font-weight: bold; }
canvas { border: 2px solid #ff6666; border-radius: 8px; display: block; touch-action: none; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 50; }
#overlay h1 { font-size: 36px; color: #ff6666; text-shadow: 0 0 20px #ff0000; }
#overlay .info { font-size: 18px; color: #ffcccc; }
.btn { background: darkred; border: 2px solid #ff6666; color: #ffff00; font-size: 18px; padding: 10px 28px; border-radius: 8px; cursor: pointer; }
.btn:hover { background: #aa0000; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<div id="hud">
  <div>Wave: <span id="hud-wave">1</span></div>
  <div>Score: <span id="hud-score">0</span></div>
  <div>HS: <span id="hud-hs">0</span></div>
</div>
<canvas id="gc" width="360" height="500"></canvas>

<div id="overlay">
  <h1>👾 Galaga</h1>
  <div class="info">Arrow keys or drag to move</div>
  <div class="info">Space or tap to fire</div>
  <div class="info">High Score: <span id="ov-hs">0</span></div>
  <button class="btn" id="play-btn">▶ Play</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
var FB_CFG = {apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",authDomain:"enders-games.firebaseapp.com",databaseURL:"https://enders-games-default-rtdb.firebaseio.com",projectId:"enders-games",storageBucket:"enders-games.firebasestorage.app",messagingSenderId:"87049074470",appId:"1:87049074470:web:bc38b35669b43aedceb3e7"};

var HS_KEY = 'hs_galaga';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function saveHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }
function submitScore(score) {
  var name = localStorage.getItem('visitorName') || 'Player';
  try {
    var app = firebase.initializeApp(FB_CFG, 'lb_galaga');
    var db = app.database();
    db.ref('leaderboard/galaga').push({name:name, score:score, date:new Date().toLocaleDateString()});
  } catch(e) {}
}

var audio = null;
function getAudio() {
  if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  return audio;
}
function playBeep(freq, dur, type, vol) {
  var ac = getAudio(); if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W = 360, H = 500;

var state = 'menu';
var player, bullets, enemyBullets, enemies, divers, stars, explosions;
var score, lives, wave, gameLoopId, lastTime;
var keys, fireTimer, fireHeld;
var formDir, formX, formY, formSpeed;
var diveTimer, diveInterval;
var ufo, ufoTimer;
var waveFormSpeed;
var touchX, lastTouchX, dragging;

function initGame() {
  score = 0; lives = 3; wave = 1;
  player = { x: W/2, y: H - 45, w: 20, h: 24, vx: 0 };
  bullets = []; enemyBullets = []; divers = []; explosions = [];
  fireTimer = 0; fireHeld = false;
  keys = {};
  touchX = null; lastTouchX = null; dragging = false;
  ufo = null; ufoTimer = 0;
  waveFormSpeed = 1.0;
  setupWave();
  setupStars();
  updateHUD();
}

function setupStars() {
  stars = [];
  for (var i = 0; i < 70; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: 0.5+Math.random()*1.5, speed: 0.5+Math.random()*1 });
  }
}

function setupWave() {
  enemies = [];
  var cols = 5, rows = 3;
  var startX = 40, startY = 50, gapX = 52, gapY = 36;
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      enemies.push({
        row: r, col: c,
        x: startX + c * gapX,
        y: startY + r * gapY,
        homeX: startX + c * gapX,
        homeY: startY + r * gapY,
        type: r === 0 ? 'boss' : (r === 1 ? 'mid' : 'basic'),
        alive: true,
        diving: false,
        divePhase: 0,
        diveAngle: 0,
        diveTimer: 0
      });
    }
  }
  formDir = 1;
  formX = 0; formY = 0;
  formSpeed = waveFormSpeed;
  diveTimer = 0;
  diveInterval = 3.0;
}

function aliveEnemies() {
  var a = [];
  for (var i = 0; i < enemies.length; i++) if (enemies[i].alive && !enemies[i].diving) a.push(enemies[i]);
  return a;
}

function updateHUD() {
  document.getElementById('hud-wave').textContent = wave;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-hs').textContent = getHS();
  // Draw lives as ship icons in canvas (done in draw)
}

function spawnExplosion(x, y, color) {
  for (var i = 0; i < 10; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = 1 + Math.random() * 3;
    explosions.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, alpha:1, color:color||'#ffaa00', r:2+Math.random()*3 });
  }
}

function gameOver() {
  state = 'over';
  saveHS(score);
  submitScore(score);
  showOverlay(true);
}

function showOverlay(isOver) {
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  var h1 = ov.querySelector('h1');
  var infos = ov.querySelectorAll('.info');
  if (isOver) {
    h1.textContent = 'Game Over!';
    infos[0].innerHTML = 'Score: <span style="color:#ffff00;font-weight:bold">' + score + '</span>';
    infos[1].innerHTML = 'Wave Reached: <span style="color:#ffff00;font-weight:bold">' + wave + '</span>';
    infos[2].innerHTML = 'High Score: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play Again';
  } else {
    h1.textContent = '👾 Galaga';
    infos[0].textContent = 'Arrow keys or drag to move';
    infos[1].textContent = 'Space or tap to fire';
    infos[2].innerHTML = 'High Score: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play';
  }
}

function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

function startGame() {
  initGame();
  hideOverlay();
  state = 'play';
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  lastTime = null;
  gameLoopId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (state !== 'play') return;
  if (!lastTime) lastTime = ts;
  var dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  gameLoopId = requestAnimationFrame(loop);
}

function update(dt) {
  // Player movement
  var pspeed = 220;
  if (keys['ArrowLeft'] || keys['a']) player.x -= pspeed * dt;
  if (keys['ArrowRight'] || keys['d']) player.x += pspeed * dt;
  if (dragging && touchX !== null && lastTouchX !== null) {
    player.x += (touchX - lastTouchX);
    lastTouchX = touchX;
  }
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

  // Fire
  fireTimer -= dt;
  if ((keys[' '] || fireHeld) && fireTimer <= 0) {
    fireTimer = 0.25;
    bullets.push({ x: player.x, y: player.y - 14, vy: -420 });
    playBeep(660, 0.07, 'square', 0.15);
  }

  // Move player bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy * dt;
    if (bullets[i].y < -10) { bullets.splice(i, 1); continue; }

    // Check enemy hit
    var hit = false;
    for (var j = 0; j < enemies.length; j++) {
      var en = enemies[j];
      if (!en.alive) continue;
      var ex = en.diving ? en.x : en.x + formX;
      var ey = en.diving ? en.y : en.y + formY;
      if (Math.abs(bullets[i].x - ex) < 14 && Math.abs(bullets[i].y - ey) < 14) {
        en.alive = false;
        spawnExplosion(ex, ey, en.type === 'boss' ? '#ff44ff' : '#ffaa00');
        var pts = en.type === 'boss' ? 300 : (en.type === 'mid' ? 200 : 100);
        score += pts;
        playBeep(440, 0.1, 'square', 0.2);
        bullets.splice(i, 1);
        hit = true; break;
      }
    }
    if (hit) continue;

    // Check diver hit
    for (var j = 0; j < divers.length; j++) {
      var dv = divers[j];
      if (Math.abs(bullets[i].x - dv.x) < 14 && Math.abs(bullets[i].y - dv.y) < 14) {
        dv.alive = false;
        spawnExplosion(dv.x, dv.y, '#ff4444');
        score += 150;
        playBeep(440, 0.1, 'square', 0.2);
        bullets.splice(i, 1);
        hit = true; break;
      }
    }
  }

  // Formation movement
  var alive = aliveEnemies();
  formX += formDir * formSpeed * 60 * dt;
  var leftMost = W, rightMost = 0;
  for (var i = 0; i < alive.length; i++) {
    var ex = alive[i].homeX + formX;
    if (ex < leftMost) leftMost = ex;
    if (ex > rightMost) rightMost = ex;
  }
  if (rightMost > W - 20) { formDir = -1; formY += 8; }
  if (leftMost < 20) { formDir = 1; formY += 8; }

  // Check if enemies reached player level
  for (var i = 0; i < alive.length; i++) {
    if (alive[i].homeY + formY > H - 80) {
      gameOver(); return;
    }
  }

  // Dive timer
  diveTimer -= dt;
  if (diveTimer <= 0 && alive.length > 0) {
    diveTimer = diveInterval;
    var count = wave >= 3 ? 2 : 1;
    for (var n = 0; n < count && alive.length > 0; n++) {
      var idx = Math.floor(Math.random() * alive.length);
      var diver = alive[idx];
      diver.diving = true;
      diver.alive = true;
      var startX = diver.homeX + formX;
      var startY = diver.homeY + formY;
      divers.push({
        x: startX, y: startY,
        homeX: diver.homeX, homeY: diver.homeY,
        type: diver.type,
        alive: true,
        t: 0,
        phase: 'dive',
        shotFired: false,
        enemyRef: diver,
        startX: startX, startY: startY
      });
      // Hide from formation
      diver.alive = false;
    }
  }

  // Update divers
  for (var i = divers.length - 1; i >= 0; i--) {
    var dv = divers[i];
    if (!dv.alive) { divers.splice(i, 1); continue; }
    dv.t += dt;
    if (dv.phase === 'dive') {
      // Arc toward player
      var progress = dv.t / 2.5;
      dv.x = dv.startX + (player.x - dv.startX) * Math.min(progress, 1) + Math.sin(dv.t * 3) * 30;
      dv.y = dv.startY + progress * (H + 50);
      if (!dv.shotFired && dv.t > 1.0) {
        dv.shotFired = true;
        var ang = Math.atan2(player.y - dv.y, player.x - dv.x);
        enemyBullets.push({ x: dv.x, y: dv.y, vx: Math.cos(ang)*160, vy: Math.sin(ang)*160 });
        playBeep(220, 0.1, 'sawtooth', 0.15);
      }
      if (dv.y > H + 40) {
        // Return to formation
        dv.phase = 'return';
        dv.t = 0;
        dv.startX = dv.x;
        dv.startY = H + 40;
      }
      // Collision with player
      if (Math.abs(dv.x - player.x) < 20 && Math.abs(dv.y - player.y) < 24) {
        playerHit(); divers.splice(i, 1); continue;
      }
    } else if (dv.phase === 'return') {
      var tx = dv.homeX + formX;
      var ty = dv.homeY + formY;
      dv.x += (tx - dv.x) * 3 * dt;
      dv.y += (ty - dv.y) * 3 * dt;
      if (Math.abs(dv.x - tx) < 5 && Math.abs(dv.y - ty) < 5) {
        dv.enemyRef.alive = true;
        dv.enemyRef.diving = false;
        divers.splice(i, 1);
      }
    }
  }

  // Enemy bullets
  for (var i = enemyBullets.length - 1; i >= 0; i--) {
    var eb = enemyBullets[i];
    eb.x += eb.vx * dt;
    eb.y += eb.vy * dt;
    if (eb.y > H + 10 || eb.x < 0 || eb.x > W) { enemyBullets.splice(i, 1); continue; }
    if (Math.abs(eb.x - player.x) < 18 && Math.abs(eb.y - player.y) < 24) {
      enemyBullets.splice(i, 1);
      playerHit();
    }
  }

  // UFO
  ufoTimer -= dt;
  if (ufoTimer <= 0) {
    ufoTimer = 12 + Math.random() * 8;
    if (wave % 5 === 0) {
      ufo = { x: -30, y: 30, vx: 90, alive: true };
    }
  }
  if (ufo) {
    ufo.x += ufo.vx * dt;
    if (ufo.x > W + 40) { ufo = null; }
    for (var i = bullets.length - 1; i >= 0; i--) {
      if (ufo && Math.abs(bullets[i].x - ufo.x) < 22 && Math.abs(bullets[i].y - ufo.y) < 14) {
        score += 500;
        spawnExplosion(ufo.x, ufo.y, '#ffff00');
        playBeep(880, 0.3, 'sine', 0.3);
        ufo = null;
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // Explosions
  for (var i = explosions.length - 1; i >= 0; i--) {
    var ex = explosions[i];
    ex.x += ex.vx; ex.y += ex.vy;
    ex.alpha -= 0.04;
    if (ex.alpha <= 0) explosions.splice(i, 1);
  }

  // Check wave clear
  var anyAlive = false;
  for (var i = 0; i < enemies.length; i++) if (enemies[i].alive) anyAlive = true;
  for (var i = 0; i < divers.length; i++) if (divers[i].alive) anyAlive = true;
  if (!anyAlive && divers.length === 0) {
    wave++;
    waveFormSpeed += 0.15;
    diveInterval = Math.max(1.0, diveInterval - 0.2);
    formY = 0;
    setupWave();
  }

  // Scroll stars
  for (var i = 0; i < stars.length; i++) {
    stars[i].y += stars[i].speed * 60 * dt;
    if (stars[i].y > H) stars[i].y = 0;
  }

  updateHUD();
}

var playerFlash = 0;
function playerHit() {
  lives--;
  playerFlash = 1.5;
  playBeep(150, 0.4, 'sawtooth', 0.4);
  spawnExplosion(player.x, player.y, '#ff0000');
  if (lives <= 0) { gameOver(); }
}

function drawShip(x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color || '#00ff88';
  ctx.shadowColor = color || '#00ff88';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.7, size * 0.7);
  ctx.lineTo(0, size * 0.2);
  ctx.lineTo(-size * 0.7, size * 0.7);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawEnemy(x, y, type) {
  ctx.save();
  ctx.translate(x, y);
  if (type === 'boss') {
    ctx.fillStyle = '#ff44ff';
    ctx.shadowColor = '#ff44ff';
  } else if (type === 'mid') {
    ctx.fillStyle = '#ff8844';
    ctx.shadowColor = '#ff8844';
  } else {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
  }
  ctx.shadowBlur = 6;
  // Simple alien shape
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(-4, -2, 3, 0, Math.PI*2);
  ctx.arc(4, -2, 3, 0, Math.PI*2);
  ctx.fill();
  // Wings
  ctx.fillStyle = ctx.shadowColor;
  ctx.fillRect(-16, 2, 6, 5);
  ctx.fillRect(10, 2, 6, 5);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + s.r * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  // Explosions
  for (var i = 0; i < explosions.length; i++) {
    var ex = explosions[i];
    ctx.globalAlpha = Math.max(0, ex.alpha);
    ctx.fillStyle = ex.color;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Formation enemies
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    if (!en.alive || en.diving) continue;
    drawEnemy(en.homeX + formX, en.homeY + formY, en.type);
  }

  // Divers
  for (var i = 0; i < divers.length; i++) {
    var dv = divers[i];
    if (!dv.alive) continue;
    drawEnemy(dv.x, dv.y, dv.type);
  }

  // UFO
  if (ufo) {
    ctx.save();
    ctx.translate(ufo.x, ufo.y);
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, 4, 22, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#88ffff';
    ctx.beginPath();
    ctx.ellipse(0, -2, 12, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.font = '10px Arial';
    ctx.fillStyle = '#ffff00';
    ctx.textAlign = 'center';
    ctx.fillText('500', ufo.x, ufo.y - 16);
  }

  // Player bullets
  for (var i = 0; i < bullets.length; i++) {
    ctx.fillStyle = '#88ffff';
    ctx.shadowColor = '#88ffff';
    ctx.shadowBlur = 6;
    ctx.fillRect(bullets[i].x - 2, bullets[i].y - 7, 4, 14);
  }

  // Enemy bullets
  for (var i = 0; i < enemyBullets.length; i++) {
    var eb = enemyBullets[i];
    ctx.fillStyle = '#ff8800';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Player ship
  if (playerFlash > 0) {
    playerFlash -= 0.08;
    if (Math.floor(playerFlash * 8) % 2 === 0) {
      drawShip(player.x, player.y, 16, '#ff4444');
    }
  } else {
    drawShip(player.x, player.y, 16, '#00ff88');
  }

  // Lives display
  for (var i = 0; i < lives; i++) {
    drawShip(20 + i * 22, H - 14, 8, '#00ff88');
  }
}

// Input
document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); fireHeld = true; }
});
document.addEventListener('keyup', function(e) {
  keys[e.key] = false;
  if (e.key === ' ') fireHeld = false;
});

var touchStartX = null;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (state !== 'play') return;
  touchStartX = e.touches[0].clientX;
  lastTouchX = touchStartX;
  dragging = true;
  fireHeld = true;
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
}, {passive:false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (state !== 'play') return;
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
}, {passive:false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  dragging = false; fireHeld = false; touchX = null; lastTouchX = null;
}, {passive:false});

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('play-btn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

document.getElementById('ov-hs').textContent = getHS();
document.getElementById('hud-hs').textContent = getHS();
</script>
</body>
</html>
