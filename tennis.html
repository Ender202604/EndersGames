<!DOCTYPE html>
<html>
<head>
<title>Tennis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 32px; }
#home-btn { position: fixed; top: 8px; left: 10px; color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99; }
canvas { border: 2px solid #ff6666; border-radius: 8px; display: block; touch-action: none; cursor: crosshair; }
#hud { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 6px; font-size: 13px; color: #ffcccc; }
#hud span { font-weight: bold; color: #ffff00; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; }
.overlay h2 { color: #ffff00; font-size: 26px; }
.overlay p { color: #ffcccc; font-size: 14px; text-align: center; max-width: 300px; }
.overlay button { background: darkred; border: 2px solid #ff6666; color: #ffff00; font-size: 16px; padding: 8px 24px; border-radius: 8px; cursor: pointer; }
.overlay button:hover { background: #8b0000; }
.diff-btn { background: #220000; border: 2px solid #ff6666; color: #ffcccc; font-size: 14px; padding: 6px 16px; border-radius: 6px; cursor: pointer; margin: 2px; }
.diff-btn.active { background: darkred; color: #ffff00; }
#msg { color: #ffff00; font-size: 14px; font-weight: bold; min-height: 20px; margin-top: 3px; text-align: center; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<canvas id="c" width="360" height="500"></canvas>
<div id="hud">
  <div>You: <span id="h-pscore">0</span></div>
  <div>AI: <span id="h-ascore">0</span></div>
  <div>Games: <span id="h-pgames">0</span>-<span id="h-agames">0</span></div>
  <div>Best: <span id="h-hs">0</span></div>
</div>
<div id="msg"></div>

<div class="overlay" id="start-screen">
  <h2>🎾 Tennis</h2>
  <p>Drag/move mouse to control paddle. Click to serve. First to 3 games wins!</p>
  <div style="display:flex;gap:6px;margin:4px 0">
    <button class="diff-btn active" id="d-easy">Easy</button>
    <button class="diff-btn" id="d-med">Medium</button>
    <button class="diff-btn" id="d-hard">Hard</button>
  </div>
  <button id="start-btn">Play!</button>
</div>
<div class="overlay" id="end-screen" style="display:none">
  <h2 id="end-title">Match Over!</h2>
  <p id="end-msg"></p>
  <button id="restart-btn">Play Again</button>
</div>

<script>
var FB_CFG={apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",authDomain:"enders-games.firebaseapp.com",databaseURL:"https://enders-games-default-rtdb.firebaseio.com",projectId:"enders-games",storageBucket:"enders-games.firebasestorage.app",messagingSenderId:"87049074470",appId:"1:87049074470:web:bc38b35669b43aedceb3e7"};
const HS_KEY='hs_tennis';
function getHS(){return parseInt(localStorage.getItem(HS_KEY))||0;}
function saveHS(s){if(s>getHS())localStorage.setItem(HS_KEY,s);}
function submitScore(score){
  var name=localStorage.getItem('visitorName')||'Player';
  try{var app=firebase.initializeApp(FB_CFG,'lb_tennis');var db=app.database();
  db.ref('leaderboard/tennis').push({name:name,score:score,date:new Date().toLocaleDateString()});}catch(e){}
}

let audio=null;
function getAudio(){if(!audio){try{audio=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audio;}
function beep(freq,dur,type='square',vol=0.12){
  var a=getAudio();if(!a)return;
  var o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur);
}
function playHit(){beep(440,0.06,'square');}
function playScore(){beep(523,0.08);setTimeout(()=>beep(659,0.08),90);setTimeout(()=>beep(784,0.25),180);}
function playNet(){beep(150,0.15,'sawtooth');}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=360,H=500;
const NET_Y=H/2;
const PADDLE_W=70,PADDLE_H=10;
const BALL_R=7;

let diff=0; // 0=easy,1=med,2=hard
let aiSpeed=[1.5,2.5,4.0];

// Tennis scoring
const POINTS_LABEL=['0','15','30','40','Ad'];
let pPts=0,aPts=0,pGames=0,aGames=0;
let matchGamesNeeded=3;

let px=W/2,py=H-40; // player paddle center
let ax=W/2,ay=40;   // AI paddle center
let ball={x:W/2,y:py-BALL_R-PADDLE_H/2-1,vx:0,vy:0,inPlay:false,speed:4};
let serving=true,playerServing=true;
let gameActive=false,rally=0;
let dragActive=false;
let msgTimer=0;
let touchX=null;

function setMsg(txt,dur=2000){
  document.getElementById('msg').textContent=txt;
  msgTimer=dur;
}

function scoreLabel(p){return POINTS_LABEL[Math.min(p,4)];}

function updateHUD(){
  var ps=scoreLabel(pPts),as=scoreLabel(aPts);
  if(pPts>=3&&aPts>=3){
    if(pPts===aPts){ps=as='40';}
    else if(pPts>aPts){ps='Ad';as='40';}
    else{ps='40';as='Ad';}
  }
  document.getElementById('h-pscore').textContent=ps;
  document.getElementById('h-ascore').textContent=as;
  document.getElementById('h-pgames').textContent=pGames;
  document.getElementById('h-agames').textContent=aGames;
  document.getElementById('h-hs').textContent=getHS();
}

function resetBall(server){
  serving=true;playerServing=server;
  ball.inPlay=false;ball.speed=4;rally=0;
  if(server){
    ball.x=px;ball.y=py-BALL_R-PADDLE_H/2-2;ball.vx=0;ball.vy=0;
  } else {
    ball.x=ax;ball.y=ay+BALL_R+PADDLE_H/2+2;ball.vx=0;ball.vy=0;
  }
}

function awardPoint(toPlayer){
  if(toPlayer){
    pPts++;
  } else {
    aPts++;
  }
  // Deuce logic
  var winner=null;
  if(pPts>=4&&aPts>=4){
    if(pPts-aPts>=2)winner='player';
    else if(aPts-pPts>=2)winner='ai';
  } else if(pPts>=4&&aPts<3){winner='player';}
  else if(aPts>=4&&pPts<3){winner='ai';}

  if(winner){
    pPts=0;aPts=0;
    if(winner==='player'){pGames++;setMsg('Game! You win this game!');}
    else{aGames++;setMsg('Game to AI!');}
    playScore();
    updateHUD();
    if(pGames>=matchGamesNeeded||aGames>=matchGamesNeeded){
      setTimeout(endMatch,1000);return;
    }
    resetBall(winner==='ai'); // loser serves
  } else {
    playScore();
    updateHUD();
    resetBall(!toPlayer);
  }
}

function endMatch(){
  gameActive=false;
  var won=pGames>=matchGamesNeeded;
  var setsWon=won?1:0;
  saveHS(pGames);
  submitScore(pGames);
  document.getElementById('end-title').textContent=won?'You Win! 🎾':'AI Wins!';
  document.getElementById('end-msg').textContent='Score: '+pGames+'-'+aGames+' games | Best: '+getHS()+' games won';
  document.getElementById('end-screen').style.display='flex';
}

function startGame(){
  pPts=0;aPts=0;pGames=0;aGames=0;
  px=W/2;ax=W/2;
  gameActive=true;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  resetBall(true);
  updateHUD();
  requestAnimationFrame(loop);
}

// Draw court
function drawCourt(){
  // Court surface
  ctx.fillStyle='#2d6e3e';
  ctx.fillRect(0,0,W,H);
  // Court lines
  ctx.strokeStyle='white';ctx.lineWidth=2;
  // Outer boundary
  ctx.strokeRect(20,20,W-40,H-40);
  // Net
  ctx.fillStyle='#cccccc';
  ctx.fillRect(20,NET_Y-3,W-40,6);
  // Net posts
  ctx.fillStyle='white';
  ctx.fillRect(18,NET_Y-8,4,16);
  ctx.fillRect(W-22,NET_Y-8,4,16);
  // Center line
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,20);ctx.lineTo(W/2,H-20);ctx.stroke();
  // Service lines
  var sTop=NET_Y-80,sBot=NET_Y+80;
  ctx.beginPath();ctx.moveTo(20,sTop);ctx.lineTo(W-20,sTop);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,sBot);ctx.lineTo(W-20,sBot);ctx.stroke();
}

function drawPaddle(cx,cy,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.roundRect(cx-PADDLE_W/2,cy-PADDLE_H/2,PADDLE_W,PADDLE_H,4);
  ctx.fill();
  ctx.strokeStyle='#ffff00';ctx.lineWidth=1.5;
  ctx.stroke();
}

function drawBallEl(){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(ball.x+2,ball.y+2,BALL_R,BALL_R*0.5,0,0,Math.PI*2);ctx.fill();
  // Ball
  ctx.fillStyle='#ccff00';
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='white';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.stroke();
}

let lastTs=0;
function loop(ts){
  if(!gameActive)return;
  var dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;

  if(msgTimer>0){msgTimer-=dt*1000;if(msgTimer<=0)document.getElementById('msg').textContent='';}

  // Move player paddle (keyboard/touch)
  if(touchX!==null){
    px+=(touchX-px)*0.35;
  }
  px=Math.max(PADDLE_W/2+20,Math.min(W-PADDLE_W/2-20,px));

  // AI paddle
  var aiTarget=ball.x;
  var spd=aiSpeed[diff];
  if(ax<aiTarget-2)ax+=spd;
  else if(ax>aiTarget+2)ax-=spd;
  ax=Math.max(PADDLE_W/2+20,Math.min(W-PADDLE_W/2-20,ax));

  // Ball serving
  if(!ball.inPlay&&serving){
    if(playerServing){ball.x=px;ball.y=py-BALL_R-PADDLE_H/2-2;}
    else{ball.x=ax;ball.y=ay+BALL_R+PADDLE_H/2+2;}
  }

  if(ball.inPlay){
    ball.x+=ball.vx;
    ball.y+=ball.vy;

    // Wall bounces
    if(ball.x-BALL_R<20){ball.x=20+BALL_R;ball.vx=Math.abs(ball.vx);playHit();}
    if(ball.x+BALL_R>W-20){ball.x=W-20-BALL_R;ball.vx=-Math.abs(ball.vx);playHit();}

    // Player paddle hit
    if(ball.vy>0&&ball.y+BALL_R>=py-PADDLE_H/2&&ball.y-BALL_R<=py+PADDLE_H/2
       &&ball.x>px-PADDLE_W/2&&ball.x<px+PADDLE_W/2){
      ball.vy=-Math.abs(ball.vy);
      var off=(ball.x-px)/(PADDLE_W/2);
      ball.vx=off*ball.speed*0.8;
      rally++;
      ball.speed=Math.min(ball.speed+0.15,12);
      ball.y=py-PADDLE_H/2-BALL_R-1;
      playHit();
    }
    // AI paddle hit
    if(ball.vy<0&&ball.y-BALL_R<=ay+PADDLE_H/2&&ball.y+BALL_R>=ay-PADDLE_H/2
       &&ball.x>ax-PADDLE_W/2&&ball.x<ax+PADDLE_W/2){
      ball.vy=Math.abs(ball.vy);
      var off2=(ball.x-ax)/(PADDLE_W/2);
      ball.vx=off2*ball.speed*0.8+(Math.random()-0.5)*1.5;
      rally++;
      ball.speed=Math.min(ball.speed+0.15,12);
      ball.y=ay+PADDLE_H/2+BALL_R+1;
      playHit();
    }

    // Net check
    if(Math.abs(ball.y-NET_Y)<BALL_R+3){
      // check if crossing
      if((ball.vy<0&&ball.y<NET_Y)||(ball.vy>0&&ball.y>NET_Y)){
        // passed net - ok
      } else if(ball.y>NET_Y-8&&ball.y<NET_Y+8){
        playNet();
        setMsg('Net!');
        ball.inPlay=false;
        serving=true;
        // fault - re-serve same server
        if(playerServing)resetBall(true);
        else resetBall(false);
      }
    }

    // Score: out of bounds top
    if(ball.y-BALL_R<10){
      // AI missed (ball past AI)
      setMsg('Point to You!');
      ball.inPlay=false;
      setTimeout(()=>awardPoint(true),600);
    }
    // Out bottom
    if(ball.y+BALL_R>H-10){
      setMsg('Point to AI!');
      ball.inPlay=false;
      setTimeout(()=>awardPoint(false),600);
    }
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  drawCourt();
  drawPaddle(px,py,'#4488ff');
  drawPaddle(ax,ay,'#ff4444');
  drawBallEl();

  // Score overlay on court
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W/2-40,NET_Y-22,80,18);
  ctx.fillStyle='white';ctx.font='11px Arial';ctx.textAlign='center';
  var ps2=scoreLabel(pPts),as2=scoreLabel(aPts);
  ctx.fillText('You: '+ps2+'  AI: '+as2,W/2,NET_Y-8);ctx.textAlign='left';

  if(!ball.inPlay&&serving&&playerServing){
    ctx.fillStyle='rgba(255,255,0,0.7)';ctx.font='13px Arial';ctx.textAlign='center';
    ctx.fillText('Tap to serve',W/2,py-30);ctx.textAlign='left';
  }

  requestAnimationFrame(loop);
}

// Input handling
canvas.addEventListener('mousemove',e=>{
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width;
  px=(e.clientX-rect.left)*scaleX;
});
canvas.addEventListener('click',e=>{
  if(!gameActive)return;
  getAudio();
  if(!ball.inPlay&&serving&&playerServing){
    ball.inPlay=true;
    var ang=(Math.random()*0.6-0.3);
    ball.vy=-ball.speed*Math.cos(ang);
    ball.vx=ball.speed*Math.sin(ang);
  }
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  var touch=e.touches[0];
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width;
  touchX=(touch.clientX-rect.left)*scaleX;
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  var touch=e.touches[0];
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width;
  touchX=(touch.clientX-rect.left)*scaleX;
  getAudio();
  if(!ball.inPlay&&serving&&playerServing){
    ball.inPlay=true;
    var ang=(Math.random()*0.6-0.3);
    ball.vy=-ball.speed*Math.cos(ang);
    ball.vx=ball.speed*Math.sin(ang);
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});

// Difficulty buttons
['easy','med','hard'].forEach((id,i)=>{
  document.getElementById('d-'+id).addEventListener('click',function(){
    diff=i;
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
  });
});

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

// Initial draw
ctx.fillStyle='#2d6e3e';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#ffff00';ctx.font='bold 22px Arial';ctx.textAlign='center';
ctx.fillText('🎾 Tennis',W/2,H/2);ctx.textAlign='left';
document.getElementById('h-hs').textContent=getHS();
</script>
</body>
</html>
