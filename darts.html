<!DOCTYPE html>
<html>
<head>
<title>Darts 301</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 28px; overflow: hidden; }
#home-btn { position: fixed; top: 8px; left: 10px; color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99; }
canvas { border: 2px solid #ff6666; border-radius: 8px; display: block; touch-action: none; cursor: crosshair; }
#hud { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 5px; font-size: 13px; color: #ffcccc; }
#hud .big { font-size: 26px; font-weight: bold; color: #ffff00; }
#hud span { font-weight: bold; color: #ffff00; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; }
.overlay h2 { color: #ffff00; font-size: 26px; }
.overlay p { color: #ffcccc; font-size: 14px; text-align: center; max-width: 300px; }
.overlay button { background: darkred; border: 2px solid #ff6666; color: #ffff00; font-size: 16px; padding: 8px 24px; border-radius: 8px; cursor: pointer; }
.overlay button:hover { background: #8b0000; }
#throw-log { font-size: 11px; color: #ffcccc; margin-top: 3px; max-height: 36px; overflow: hidden; text-align: center; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<canvas id="c" width="360" height="500"></canvas>
<div id="hud">
  <div class="big" id="h-remain">301</div>
  <div>Turn: <span id="h-turn">1</span>/10</div>
  <div>Darts: <span id="h-darts">●●●</span></div>
  <div>Best: <span id="h-hs">0</span></div>
</div>
<div id="throw-log"></div>

<div class="overlay" id="start-screen">
  <h2>🎯 Darts 301</h2>
  <p>Start at 301. Subtract your score each throw. You must finish on a <b style="color:#ffff00">Double</b>!</p>
  <p style="font-size:12px;color:#ff9999">Watch the moving crosshair — tap at the right moment!</p>
  <button id="start-btn">Throw!</button>
</div>
<div class="overlay" id="end-screen" style="display:none">
  <h2 id="end-title">Game Over!</h2>
  <p id="end-msg"></p>
  <button id="restart-btn">Play Again</button>
</div>

<script>
var FB_CFG={apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",authDomain:"enders-games.firebaseapp.com",databaseURL:"https://enders-games-default-rtdb.firebaseio.com",projectId:"enders-games",storageBucket:"enders-games.firebasestorage.app",messagingSenderId:"87049074470",appId:"1:87049074470:web:bc38b35669b43aedceb3e7"};
const HS_KEY='hs_darts';
function getHS(){return parseInt(localStorage.getItem(HS_KEY))||0;}
function saveHS(s){if(s>getHS())localStorage.setItem(HS_KEY,s);}
function submitScore(score){
  var name=localStorage.getItem('visitorName')||'Player';
  try{var app=firebase.initializeApp(FB_CFG,'lb_darts');var db=app.database();
  db.ref('leaderboard/darts').push({name:name,score:score,date:new Date().toLocaleDateString()});}catch(e){}
}

let audio=null;
function getAudio(){if(!audio){try{audio=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audio;}
function beep(freq,dur,type='square',vol=0.12){
  var a=getAudio();if(!a)return;
  var o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur);
}
function playThrow(){beep(300,0.07,'square');}
function playBull(){beep(880,0.1);setTimeout(()=>beep(1100,0.15),110);}
function playWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2),i*120));}
function playBust(){beep(180,0.3,'sawtooth');}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=360,H=500;

// Board geometry
const CX=W/2, CY=210, BOARD_R=140;

// Dart sections (clockwise from top: 20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5)
const SECTIONS=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const NUM_SEC=20;

// Ring radii (relative to board radius)
const R_BULL=0.06;
const R_OUTER_BULL=0.13;
const R_TRIPLE_INNER=0.58;
const R_TRIPLE_OUTER=0.67;
const R_DOUBLE_INNER=0.93;
const R_DOUBLE_OUTER=1.0;

// Crosshair oscillation
let chX=CX,chY=CY;
let chAngleX=0,chAngleY=0;
let chSpeedX=1.8+Math.random()*0.8,chSpeedY=1.3+Math.random()*0.8;
let chAmpX=90,chAmpY=80;

// Game state
let remaining=301,turn=1,dartsThrown=0,maxTurns=10;
let gameActive=false;
let throwLog=[];
let dartDots=[]; // {x,y,score,color}
let animThrow=null; // {x,y,t,tx,ty}
let canThrow=true;
let flashMsg='',flashTimer=0;

function updateHUD(){
  document.getElementById('h-remain').textContent=remaining;
  document.getElementById('h-turn').textContent=turn;
  var dots='';
  for(var i=0;i<3;i++)dots+=i<dartsThrown?'◦':'●';
  document.getElementById('h-darts').textContent=dots;
  document.getElementById('h-hs').textContent=getHS();
}

function logThrow(txt){
  throwLog.push(txt);
  if(throwLog.length>5)throwLog=throwLog.slice(-5);
  document.getElementById('throw-log').textContent=throwLog.slice(-3).join('  |  ');
}

function sectionAt(x,y){
  var dx=x-CX,dy=y-CY;
  var r=Math.sqrt(dx*dx+dy*dy)/BOARD_R;
  if(r>R_DOUBLE_OUTER)return{score:0,label:'Miss',mult:1};
  if(r<=R_BULL)return{score:50,label:'Bull!',mult:1,isBull:true};
  if(r<=R_OUTER_BULL)return{score:25,label:'25',mult:1,isOBull:true};

  // Find section
  var angle=Math.atan2(dy,dx)*(180/Math.PI)+90; // rotate so 0 is top
  if(angle<0)angle+=360;
  var secIdx=Math.floor((angle+9)%360/18); // 9deg offset for first section
  var sec=SECTIONS[secIdx%20];

  if(r>=R_TRIPLE_INNER&&r<=R_TRIPLE_OUTER)return{score:sec*3,label:'T'+sec,mult:3,sec:sec};
  if(r>=R_DOUBLE_INNER&&r<=R_DOUBLE_OUTER)return{score:sec*2,label:'D'+sec,mult:2,sec:sec,isDouble:true};
  return{score:sec,label:''+sec,mult:1,sec:sec};
}

function throwDart(x,y){
  if(!canThrow||!gameActive||animThrow)return;
  canThrow=false;
  animThrow={tx:x,ty:y,x:CX,y:CY-200,t:0};
}

function landDart(x,y){
  var result=sectionAt(x,y);
  var newRem=remaining-result.score;
  var dotColor='#ff4444';
  var label=result.label;

  if(result.isBull){playBull();dotColor='#ffff00';}
  else if(result.score===0){beep(200,0.2,'sawtooth');}
  else{playThrow();}

  if(newRem<0||newRem===1){
    // Bust
    playBust();
    logThrow('Bust! ('+result.label+')');
    flashMsg='BUST! (+0)';flashTimer=1500;
    dartDots.push({x,y,color:'#ff0000'});
    // reset to start of turn
    setTimeout(()=>{
      dartsThrown=3; // end turn
      endTurnIfDone();
    },600);
    canThrow=true;
    return;
  }

  // Check win condition: must land on double
  if(newRem===0&&!result.isDouble&&!result.isBull){
    playBust();
    logThrow('Need Double! ('+result.label+')');
    flashMsg='Need a Double!';flashTimer=1500;
    dartDots.push({x,y,color:'#ff8800'});
    dartsThrown++;
    updateHUD();
    canThrow=true;
    endTurnIfDone();
    return;
  }

  remaining=newRem;
  dartDots.push({x,y,color:result.mult===3?'#00ff88':result.mult===2?'#ffff00':'#ffffff'});
  logThrow(result.label+' ('+result.score+'pts) → '+remaining+' left');
  flashMsg=result.label+' = '+result.score+'!';flashTimer=1200;
  dartsThrown++;
  updateHUD();

  if(remaining===0){
    // WIN
    playWin();
    var finalScore=301; // they scored 301
    flashMsg='CHECKOUT! You Win! 🎯';flashTimer=3000;
    setTimeout(()=>endGame(true),2000);
    canThrow=true;
    return;
  }
  endTurnIfDone();
  canThrow=true;
}

function endTurnIfDone(){
  if(dartsThrown>=3){
    dartsThrown=0;
    turn++;
    dartDots=[];
    if(turn>maxTurns){
      setTimeout(()=>endGame(false),800);
      return;
    }
    setTimeout(()=>{canThrow=true;updateHUD();},400);
  } else {
    canThrow=true;
  }
}

function endGame(won){
  gameActive=false;
  var sc=301-remaining;
  saveHS(sc);
  submitScore(sc);
  document.getElementById('end-title').textContent=won?'CHECKOUT! 🎯':'Game Over!';
  document.getElementById('end-msg').textContent=
    (won?'You finished 301! Score: '+sc:'Remaining: '+remaining+' | Score: '+sc)+' | Best: '+getHS();
  document.getElementById('end-screen').style.display='flex';
}

function startGame(){
  remaining=301;turn=1;dartsThrown=0;dartDots=[];throwLog=[];
  flashMsg='';flashTimer=0;animThrow=null;canThrow=true;
  gameActive=true;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('throw-log').textContent='';
  updateHUD();
  lastT=performance.now();
  requestAnimationFrame(loop);
}

// Drawing
function sectionColor(secIdx,ring){
  // Alternating black/cream for main, red/green for double/triple
  var dark=(secIdx%2===0);
  if(ring==='triple')return dark?'#cc0000':'#00aa00';
  if(ring==='double')return dark?'#cc0000':'#00aa00';
  return dark?'#1a1a1a':'#eeeecc';
}

function drawBoard(){
  var sliceAngle=2*Math.PI/NUM_SEC;
  var startOffset=-Math.PI/2-sliceAngle/2;

  // Draw sections
  for(var i=0;i<NUM_SEC;i++){
    var a1=startOffset+i*sliceAngle;
    var a2=a1+sliceAngle;

    // Main section (cream/black)
    ctx.fillStyle=sectionColor(i,'main');
    ctx.beginPath();ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,BOARD_R*R_DOUBLE_OUTER,a1,a2);ctx.closePath();ctx.fill();

    // Double ring
    ctx.fillStyle=sectionColor(i,'double');
    ctx.beginPath();
    ctx.arc(CX,CY,BOARD_R*R_DOUBLE_OUTER,a1,a2);
    ctx.arc(CX,CY,BOARD_R*R_DOUBLE_INNER,a2,a1,true);
    ctx.closePath();ctx.fill();

    // Filler between double and triple
    ctx.fillStyle=sectionColor(i,'main');
    ctx.beginPath();
    ctx.arc(CX,CY,BOARD_R*R_DOUBLE_INNER,a1,a2);
    ctx.arc(CX,CY,BOARD_R*R_TRIPLE_OUTER,a2,a1,true);
    ctx.closePath();ctx.fill();

    // Triple ring
    ctx.fillStyle=sectionColor(i,'triple');
    ctx.beginPath();
    ctx.arc(CX,CY,BOARD_R*R_TRIPLE_OUTER,a1,a2);
    ctx.arc(CX,CY,BOARD_R*R_TRIPLE_INNER,a2,a1,true);
    ctx.closePath();ctx.fill();

    // Inner section
    ctx.fillStyle=sectionColor(i,'main');
    ctx.beginPath();
    ctx.arc(CX,CY,BOARD_R*R_TRIPLE_INNER,a1,a2);
    ctx.arc(CX,CY,BOARD_R*R_OUTER_BULL,a2,a1,true);
    ctx.closePath();ctx.fill();
  }

  // Board outline rings
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  [R_DOUBLE_OUTER,R_DOUBLE_INNER,R_TRIPLE_OUTER,R_TRIPLE_INNER,R_OUTER_BULL].forEach(r=>{
    ctx.beginPath();ctx.arc(CX,CY,BOARD_R*r,0,Math.PI*2);ctx.stroke();
  });

  // Outer bull
  ctx.fillStyle='#00aa00';
  ctx.beginPath();ctx.arc(CX,CY,BOARD_R*R_OUTER_BULL,0,Math.PI*2);ctx.fill();
  // Bull
  ctx.fillStyle='#cc0000';
  ctx.beginPath();ctx.arc(CX,CY,BOARD_R*R_BULL,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffff00';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(CX,CY,BOARD_R*R_BULL,0,Math.PI*2);ctx.stroke();

  // Board border ring
  ctx.strokeStyle='#888';ctx.lineWidth=8;
  ctx.beginPath();ctx.arc(CX,CY,BOARD_R+5,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(CX,CY,BOARD_R+9,0,Math.PI*2);ctx.stroke();

  // Section numbers
  ctx.fillStyle='white';ctx.font='bold 11px Arial';ctx.textAlign='center';
  for(var i=0;i<NUM_SEC;i++){
    var midAngle=startOffset+(i+0.5)*sliceAngle;
    var r=BOARD_R*1.1;
    var nx=CX+Math.cos(midAngle)*r;
    var ny=CY+Math.sin(midAngle)*r;
    ctx.fillText(SECTIONS[i],nx,ny+4);
  }
  ctx.textAlign='left';
}

function drawDarts(){
  dartDots.forEach(d=>{
    ctx.fillStyle=d.color;
    ctx.beginPath();ctx.arc(d.x,d.y,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#000';ctx.lineWidth=1;
    ctx.stroke();
  });
}

function drawCrosshair(){
  var x=chX,y=chY;
  ctx.strokeStyle='rgba(255,255,0,0.85)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-14,y);ctx.lineTo(x+14,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-14);ctx.lineTo(x,y+14);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.stroke();
}

function drawAnimDart(){
  if(!animThrow)return;
  // Draw line from throw start to current
  ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(animThrow.x,animThrow.y-200+200*animThrow.t);
  ctx.lineTo(animThrow.tx,animThrow.ty);ctx.stroke();
  // Dart tip
  var cx=animThrow.x+(animThrow.tx-animThrow.x)*animThrow.t;
  var cy=(animThrow.y-200+200*animThrow.t)+(animThrow.ty-(animThrow.y-200+200*animThrow.t))*animThrow.t;
  ctx.fillStyle='#ffaa00';
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
}

let lastT=0;
function loop(ts){
  if(!gameActive)return;
  var dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;

  // Update crosshair
  chAngleX+=chSpeedX*dt;
  chAngleY+=chSpeedY*dt;
  chX=CX+Math.sin(chAngleX)*chAmpX;
  chY=CY+Math.cos(chAngleY)*chAmpY;

  // Animate dart throw
  if(animThrow){
    animThrow.t+=dt*3.5;
    if(animThrow.t>=1){
      landDart(animThrow.tx,animThrow.ty);
      animThrow=null;
    }
  }

  if(flashTimer>0){flashTimer-=dt*1000;}

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0000';ctx.fillRect(0,0,W,H);
  drawBoard();
  drawDarts();
  drawAnimDart();
  if(canThrow&&gameActive&&!animThrow)drawCrosshair();

  // Flash message
  if(flashTimer>0&&flashMsg){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(CX-90,CY+130,180,28);
    ctx.fillStyle='#ffff00';ctx.font='bold 15px Arial';ctx.textAlign='center';
    ctx.fillText(flashMsg,CX,CY+149);ctx.textAlign='left';
  }

  requestAnimationFrame(loop);
}

// Input
function handleTap(mx,my){
  if(!gameActive||!canThrow||animThrow)return;
  getAudio();
  throwDart(chX,chY);
}

canvas.addEventListener('click',e=>{
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width,scaleY=H/rect.height;
  handleTap((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  var touch=e.changedTouches[0];
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width,scaleY=H/rect.height;
  handleTap((touch.clientX-rect.left)*scaleX,(touch.clientY-rect.top)*scaleY);
},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();},{passive:false});

document.getElementById('start-btn').addEventListener('click',()=>{getAudio();startGame();});
document.getElementById('restart-btn').addEventListener('click',startGame);

// Initial draw
ctx.fillStyle='#0a0000';ctx.fillRect(0,0,W,H);
drawBoard();
ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W/2-100,H/2-20,200,40);
ctx.fillStyle='#ffff00';ctx.font='bold 18px Arial';ctx.textAlign='center';
ctx.fillText('🎯 Darts 301',W/2,H/2+7);ctx.textAlign='left';
document.getElementById('h-hs').textContent=getHS();
</script>
</body>
</html>
