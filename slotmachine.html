<!DOCTYPE html>
<html>
<head>
<title>Slot Machine - Ender's Game World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0000;
  font-family: Arial, sans-serif;
  color: #ff9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 12px 20px;
  user-select: none;
}
#home-btn {
  position: fixed; top: 8px; left: 10px;
  color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99;
}
h1 { color: yellow; font-size: 28px; margin-bottom: 4px; text-shadow: 0 0 10px #ff0000; }
.subtitle { font-size: 13px; color: #ffcccc; margin-bottom: 16px; }
.stats-row {
  display: flex; gap: 20px; margin-bottom: 16px;
  background: darkred; border: 2px solid #ff6666;
  border-radius: 12px; padding: 10px 24px;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #ffcccc; }
.stat-value { font-size: 22px; color: yellow; font-weight: bold; }
.machine {
  background: linear-gradient(180deg, #3a0000 0%, #1a0000 100%);
  border: 3px solid #ff6666;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px #ff000044, inset 0 0 20px #00000066;
  margin-bottom: 16px;
  width: 100%;
  max-width: 380px;
}
.machine-top {
  text-align: center;
  font-size: 13px;
  color: #ffcccc;
  margin-bottom: 12px;
  background: #0a0000;
  border-radius: 8px;
  padding: 6px;
  border: 1px solid #ff6666;
}
.reels-container {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}
.reel {
  width: 90px;
  height: 100px;
  background: #0a0000;
  border: 2px solid #ff6666;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.reel-inner {
  position: absolute;
  width: 100%;
  transition: top 0.1s linear;
  will-change: top;
}
.reel-symbol {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  line-height: 1;
}
.reel-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, #0a0000bb 0%, transparent 25%, transparent 75%, #0a0000bb 100%);
  border-radius: 8px;
  pointer-events: none;
}
.spin-btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 20px;
  font-weight: bold;
  background: linear-gradient(180deg, #cc0000, #880000);
  color: yellow;
  border: 2px solid #ff6666;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.1s;
  box-shadow: 0 4px 8px #00000088;
}
.spin-btn:active:not(:disabled) {
  transform: scale(0.97);
  box-shadow: 0 1px 3px #00000088;
}
.spin-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.result-msg {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  min-height: 28px;
  margin-bottom: 10px;
  color: yellow;
  text-shadow: 0 0 8px currentColor;
}
.paytable {
  background: #0a0000;
  border: 1px solid #ff6666;
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 16px;
  width: 100%;
  max-width: 380px;
}
.paytable h3 { color: yellow; font-size: 13px; margin-bottom: 6px; text-align: center; }
.pay-row {
  display: flex; justify-content: space-between;
  font-size: 12px; color: #ffcccc; padding: 2px 0;
}
.pay-win { color: yellow; font-weight: bold; }
.diff-row {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.diff-btn {
  flex: 1; padding: 8px; border: 2px solid #ff6666;
  border-radius: 8px; font-size: 13px; font-weight: bold;
  cursor: pointer; transition: all 0.15s;
  background: #1a0000; color: #ff9999;
}
.diff-btn.active { background: darkred; color: yellow; border-color: yellow; }
.win-flash {
  animation: winFlash 0.4s ease-in-out 3;
}
@keyframes winFlash {
  0%, 100% { box-shadow: 0 0 30px #ff000044, inset 0 0 20px #00000066; }
  50% { box-shadow: 0 0 60px #ffff0088, inset 0 0 30px #ffff0033; }
}
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<h1>🎰 Slot Machine</h1>
<p class="subtitle">Spin to win! Match symbols for credits.</p>

<div class="stats-row">
  <div class="stat">
    <div class="stat-label">Credits</div>
    <div class="stat-value" id="credits">20</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="highscore">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Spins</div>
    <div class="stat-value" id="spins">0</div>
  </div>
</div>

<div class="diff-row" style="width:100%;max-width:380px;">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">🟢 Easy</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">🔴 Hard</button>
</div>

<div class="machine" id="machine">
  <div class="machine-top" id="machine-top">💡 Press SPIN to play! Cost: 1 credit</div>
  <div class="reels-container">
    <div class="reel"><div class="reel-inner" id="reel0"></div><div class="reel-overlay"></div></div>
    <div class="reel"><div class="reel-inner" id="reel1"></div><div class="reel-overlay"></div></div>
    <div class="reel"><div class="reel-inner" id="reel2"></div><div class="reel-overlay"></div></div>
  </div>
  <div class="result-msg" id="result-msg">&nbsp;</div>
  <button class="spin-btn" id="spin-btn" onclick="spin()">🎰 SPIN</button>
</div>

<div class="paytable">
  <h3>💰 Pay Table</h3>
  <div class="pay-row"><span>💎💎💎</span><span class="pay-win">+50 credits</span></div>
  <div class="pay-row"><span>⭐⭐⭐</span><span class="pay-win">+20 credits</span></div>
  <div class="pay-row"><span>Any 3 same</span><span class="pay-win">+10 credits</span></div>
  <div class="pay-row"><span>Any 2 same</span><span class="pay-win">+2 credits</span></div>
  <div class="pay-row"><span>No match</span><span class="pay-win">-1 credit</span></div>
</div>

<script>
const SYMBOLS = ['🍒','🍋','🍊','🍇','⭐','💎'];
const REEL_COUNT = 3;
let credits = 20, spins = 0, spinning = false;
let difficulty = 'easy';
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type === 'spin') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } else if (type === 'win') {
      o.type = 'sine';
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      o.frequency.setValueAtTime(1047, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
    } else if (type === 'jackpot') {
      [523,659,784,1047,1319].forEach((f,i) => {
        const oo = ctx.createOscillator();
        const gg = ctx.createGain();
        oo.connect(gg); gg.connect(ctx.destination);
        oo.type = 'sine';
        oo.frequency.value = f;
        gg.gain.setValueAtTime(0.2, ctx.currentTime + i*0.08);
        gg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.08 + 0.4);
        oo.start(ctx.currentTime + i*0.08);
        oo.stop(ctx.currentTime + i*0.08 + 0.4);
      });
    } else if (type === 'lose') {
      o.type = 'square';
      o.frequency.setValueAtTime(200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } else if (type === 'click') {
      o.type = 'sine';
      o.frequency.value = 800;
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      o.start(); o.stop(ctx.currentTime + 0.05);
    }
  } catch(e) {}
}

function setDiff(d) {
  difficulty = d;
  document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
  document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
  playSound('click');
}

// Build reel strips (each reel has 20 symbols)
function buildReelStrip(reelEl, initialSymbols) {
  reelEl.innerHTML = '';
  // Build a long strip of symbols
  for (let i = 0; i < 20; i++) {
    const div = document.createElement('div');
    div.className = 'reel-symbol';
    div.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    reelEl.appendChild(div);
  }
  // Show middle symbol as initial
  reelEl.style.top = '0px';
}

// Initialize reels
function initReels() {
  for (let i = 0; i < REEL_COUNT; i++) {
    const inner = document.getElementById('reel' + i);
    buildReelStrip(inner);
    // Position so first symbol shows
    inner.style.top = '0px';
    inner.style.transition = 'none';
  }
}

let reelResults = [0, 0, 0];

function spin() {
  if (spinning) return;
  if (credits <= 0) {
    document.getElementById('result-msg').textContent = '💀 No credits! Refresh to restart.';
    return;
  }
  credits--;
  spins++;
  document.getElementById('credits').textContent = credits;
  document.getElementById('spins').textContent = spins;
  document.getElementById('result-msg').textContent = '🎰 Spinning...';
  document.getElementById('spin-btn').disabled = true;
  spinning = true;
  playSound('spin');

  const baseDelay = difficulty === 'hard' ? 400 : 800;
  const spinDuration = difficulty === 'hard' ? [600, 800, 1000] : [1000, 1300, 1600];

  // Determine final symbols
  reelResults = [
    Math.floor(Math.random() * SYMBOLS.length),
    Math.floor(Math.random() * SYMBOLS.length),
    Math.floor(Math.random() * SYMBOLS.length)
  ];

  const stopTimes = spinDuration;
  let stopped = 0;

  for (let r = 0; r < REEL_COUNT; r++) {
    const inner = document.getElementById('reel' + r);
    const finalSym = reelResults[r];

    // Animate reel spinning
    animateReel(inner, finalSym, stopTimes[r], () => {
      stopped++;
      playSound('click');
      if (stopped === REEL_COUNT) {
        setTimeout(() => resolveWin(), 100);
      }
    });
  }
}

function animateReel(inner, finalSymIdx, duration, onStop) {
  const symbolH = 100;
  const totalSymbols = inner.children.length;
  let startTime = null;
  let speed = 30; // px per frame roughly
  let currentTop = 0;

  // Set final symbol as the one shown
  // We need position such that symbol at (totalSymbols - 1 - finalSymIdx) is centered
  const targetPos = -(finalSymIdx * symbolH);

  // Rebuild strip with final symbol in a deterministic position
  inner.innerHTML = '';
  // Add 10 random symbols before
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'reel-symbol';
    d.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    inner.appendChild(d);
  }
  // Add the final symbol at index 10
  const finalDiv = document.createElement('div');
  finalDiv.className = 'reel-symbol';
  finalDiv.textContent = SYMBOLS[finalSymIdx];
  inner.appendChild(finalDiv);
  // Add a few more
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'reel-symbol';
    d.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    inner.appendChild(d);
  }

  inner.style.transition = 'none';
  inner.style.top = '0px';

  const totalSpinPx = 10 * symbolH; // Spin through 10 symbols
  const targetTop = -(10 * symbolH); // End at symbol index 10

  const easeOut = (t) => 1 - Math.pow(1 - t, 3);

  let animStart = null;
  function frame(ts) {
    if (!animStart) animStart = ts;
    const elapsed = ts - animStart;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);
    const top = -(eased * totalSpinPx);
    inner.style.top = top + 'px';

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      inner.style.top = targetTop + 'px';
      onStop();
    }
  }
  requestAnimationFrame(frame);
}

function resolveWin() {
  spinning = false;
  document.getElementById('spin-btn').disabled = false;

  const s = reelResults.map(i => SYMBOLS[i]);
  const msg = document.getElementById('result-msg');
  const machine = document.getElementById('machine');

  let winAmount = 0;
  let winMsg = '';

  if (s[0] === s[1] && s[1] === s[2]) {
    if (s[0] === '💎') { winAmount = 50; winMsg = '💎 JACKPOT! +50 credits!'; playSound('jackpot'); }
    else if (s[0] === '⭐') { winAmount = 20; winMsg = '⭐ STARS! +20 credits!'; playSound('jackpot'); }
    else { winAmount = 10; winMsg = '🎉 THREE OF A KIND! +10 credits!'; playSound('win'); }
    machine.classList.add('win-flash');
    setTimeout(() => machine.classList.remove('win-flash'), 1200);
  } else if (s[0] === s[1] || s[1] === s[2] || s[0] === s[2]) {
    winAmount = 2; winMsg = '✨ Two of a kind! +2 credits'; playSound('win');
  } else {
    winMsg = '😞 No match. -1 credit'; playSound('lose');
  }

  credits += winAmount;
  document.getElementById('credits').textContent = credits;
  msg.textContent = winMsg;

  // Update high score
  const hs = parseInt(localStorage.getItem('hs_slotmachine') || '0');
  if (credits > hs) {
    localStorage.setItem('hs_slotmachine', credits);
    document.getElementById('highscore').textContent = credits;
    if (credits > hs) msg.textContent += ' 🏆 NEW BEST!';
  }

  if (credits <= 0) {
    document.getElementById('machine-top').textContent = '💀 Out of credits! Refresh to try again.';
    document.getElementById('spin-btn').disabled = true;
  }
}

function loadStats() {
  const hs = localStorage.getItem('hs_slotmachine') || '0';
  document.getElementById('highscore').textContent = hs;
}

initReels();
loadStats();
</script>
</body>
</html>
