<!DOCTYPE html>
<html>
<head>
<title>Car Racer - Ender's Game World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0000;
  font-family: Arial, sans-serif;
  color: #ff9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 8px 12px;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}
#home-btn {
  position: fixed; top: 8px; left: 10px;
  color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99;
}
h1 { color: yellow; font-size: 26px; margin-bottom: 4px; text-shadow: 0 0 10px #ff0000; }
.stats-row {
  display: flex; gap: 14px; margin-bottom: 8px;
  background: darkred; border: 2px solid #ff6666;
  border-radius: 10px; padding: 6px 16px;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #ffcccc; }
.stat-value { font-size: 20px; color: yellow; font-weight: bold; }
.diff-row { display: flex; gap: 8px; margin-bottom: 8px; width: 320px; }
.diff-btn {
  flex: 1; padding: 7px; border: 2px solid #ff6666;
  border-radius: 8px; font-size: 12px; font-weight: bold;
  cursor: pointer; transition: all 0.15s;
  background: #1a0000; color: #ff9999;
}
.diff-btn.active { background: darkred; color: yellow; border-color: yellow; }
#canvas {
  border: 3px solid #ff6666;
  border-radius: 12px;
  display: block;
  box-shadow: 0 0 20px #ff000044;
  touch-action: none;
}
.controls-hint {
  font-size: 11px; color: #ffcccc; margin-top: 6px; text-align: center;
}
.touch-controls {
  display: flex; gap: 16px; margin-top: 10px;
}
.touch-btn {
  width: 70px; height: 50px;
  background: darkred; border: 2px solid #ff6666;
  border-radius: 12px; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.touch-btn:active { background: #880000; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<h1>🏎️ Car Racer</h1>

<div class="stats-row">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="highscore">0</div></div>
  <div class="stat"><div class="stat-label">Speed</div><div class="stat-value" id="speed">1x</div></div>
</div>

<div class="diff-row">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">🟢 Easy</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">🔴 Hard</button>
</div>

<canvas id="canvas" width="320" height="480"></canvas>

<div class="controls-hint">⬅ ➡ Arrow keys or tap buttons below</div>
<div class="touch-controls">
  <div class="touch-btn" id="left-btn">⬅</div>
  <div class="touch-btn" id="right-btn">➡</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 480;

// Road config
const ROAD_LEFT = 40;
const ROAD_RIGHT = 280;
const ROAD_WIDTH = ROAD_RIGHT - ROAD_LEFT;
const LANE_COUNT = 3;
const LANE_WIDTH = ROAD_WIDTH / LANE_COUNT;

let score = 0, gameActive = false, gameOver = false;
let difficulty = 'easy';
let audioCtx = null;
let animFrame = null;

// Player car
const player = {
  lane: 1, // 0=left, 1=mid, 2=right
  x: 0, y: H - 100,
  width: 36, height: 60,
  moving: false, targetX: 0,
  speed: 8
};

// Enemies
let enemies = [];
let particles = [];
let roadLines = [];
let roadScroll = 0;
let gameSpeed = 3;
let speedMultiplier = 1;
let frameCount = 0;
let spawnCooldown = 0;
let keys = { left: false, right: false };
let touchLeft = false, touchRight = false;
let moveDelay = 0;

// Scenery
let trees = [];

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const c = getAudio();
    if (type === 'crash') {
      const buf = c.createBuffer(1, c.sampleRate * 0.4, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / data.length);
      }
      const src = c.createBufferSource();
      src.buffer = buf;
      const g = c.createGain(); g.gain.value = 0.3;
      src.connect(g); g.connect(c.destination);
      src.start();
    } else if (type === 'dodge') {
      const o = c.createOscillator(); const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320, c.currentTime + 0.1);
      g.gain.setValueAtTime(0.12, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
      o.start(); o.stop(c.currentTime + 0.15);
    } else if (type === 'start') {
      [523,659,784,1047].forEach((f,i) => {
        const oo = c.createOscillator(); const gg = c.createGain();
        oo.connect(gg); gg.connect(c.destination);
        oo.type = 'sine'; oo.frequency.value = f;
        gg.gain.setValueAtTime(0.12, c.currentTime + i*0.08);
        gg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i*0.08 + 0.12);
        oo.start(c.currentTime + i*0.08); oo.stop(c.currentTime + i*0.08 + 0.12);
      });
    } else if (type === 'engine') {
      const o = c.createOscillator(); const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sawtooth';
      o.frequency.value = 60 + speedMultiplier * 30;
      g.gain.setValueAtTime(0.04, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
      o.start(); o.stop(c.currentTime + 0.1);
    }
  } catch(e) {}
}

function setDiff(d) {
  if (gameActive) return;
  difficulty = d;
  document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
  document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
}

function laneX(lane) {
  return ROAD_LEFT + lane * LANE_WIDTH + LANE_WIDTH / 2 - player.width / 2;
}

function initGame() {
  score = 0; frameCount = 0; spawnCooldown = 0;
  gameSpeed = difficulty === 'hard' ? 5 : 3;
  speedMultiplier = 1;
  enemies = []; particles = []; trees = [];
  roadLines = [];
  player.lane = 1;
  player.x = laneX(1);
  player.targetX = player.x;
  player.moving = false;
  moveDelay = 0;

  // Init road lines
  for (let y = 0; y < H; y += 40) roadLines.push(y);

  // Init trees
  for (let i = 0; i < 8; i++) {
    trees.push({ x: Math.random() < 0.5 ? 5 + Math.random() * 30 : 285 + Math.random() * 30, y: Math.random() * H, speed: 1 });
  }

  document.getElementById('score').textContent = '0';
  document.getElementById('speed').textContent = '1x';
  gameActive = true; gameOver = false;
  playSound('start');
}

const CAR_COLORS = ['#ff4444','#44aaff','#44ff88','#ffee44','#ff88ff','#ff8844'];

function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  const color = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
  enemies.push({
    lane, x: laneX(lane) - 2 + player.width / 2 - 36 / 2 + 2,
    y: -70, width: 36, height: 60, color,
    speed: gameSpeed * 0.8
  });
}

function drawCar(x, y, w, h, color, isPlayer) {
  ctx.save();
  // Body
  const grad = ctx.createLinearGradient(x, y, x + w, y);
  grad.addColorStop(0, lightenColor(color, 30));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darkenColor(color, 30));
  ctx.fillStyle = grad;
  ctx.beginPath();
  const r8 = 8;
  ctx.moveTo(x + r8, y);
  ctx.lineTo(x + w - r8, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r8);
  ctx.lineTo(x + w, y + h - r8); ctx.quadraticCurveTo(x + w, y + h, x + w - r8, y + h);
  ctx.lineTo(x + r8, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r8);
  ctx.lineTo(x, y + r8); ctx.quadraticCurveTo(x, y, x + r8, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Windows
  ctx.fillStyle = isPlayer ? '#aaddff' : '#224466';
  ctx.fillRect(x + 5, y + (isPlayer ? 12 : h - 26), w - 10, 14);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - 4, y + 8, 6, 12);
  ctx.fillRect(x + w - 2, y + 8, 6, 12);
  ctx.fillRect(x - 4, y + h - 22, 6, 12);
  ctx.fillRect(x + w - 2, y + h - 22, 6, 12);

  if (isPlayer) {
    // Headlights
    ctx.fillStyle = '#ffffaa';
    ctx.fillRect(x + 4, y, 8, 6);
    ctx.fillRect(x + w - 12, y, 8, 6);
  }
  ctx.restore();
}

function lightenColor(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - amt);
  return `rgb(${r},${g},${b})`;
}

function drawRoad() {
  // Background / grass
  ctx.fillStyle = '#1a3300';
  ctx.fillRect(0, 0, W, H);

  // Road asphalt
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(ROAD_LEFT, 0, ROAD_WIDTH, H);

  // Road edge lines
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(ROAD_LEFT, 0); ctx.lineTo(ROAD_LEFT, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_RIGHT, 0); ctx.lineTo(ROAD_RIGHT, H); ctx.stroke();

  // Lane dashes
  ctx.strokeStyle = '#ffff88';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 20]);
  for (let l = 1; l < LANE_COUNT; l++) {
    const lx = ROAD_LEFT + l * LANE_WIDTH;
    ctx.beginPath();
    for (const y of roadLines) {
      ctx.moveTo(lx, y); ctx.lineTo(lx, y + 20);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Trees / scenery
  trees.forEach(t => {
    ctx.font = '22px serif';
    ctx.fillText(t.x < ROAD_LEFT ? '🌲' : '🌲', t.x - 11, t.y);
  });
}

function updateGame() {
  frameCount++;
  roadScroll += gameSpeed;

  // Move road lines
  roadLines = roadLines.map(y => {
    y += gameSpeed;
    return y > H ? y - H : y;
  });

  // Move trees
  trees.forEach(t => {
    t.y += gameSpeed * 0.8;
    if (t.y > H + 20) { t.y = -20; t.x = t.x < ROAD_LEFT ? 5 + Math.random() * 30 : 285 + Math.random() * 30; }
  });

  // Speed up over time
  if (frameCount % (difficulty === 'hard' ? 150 : 200) === 0) {
    gameSpeed = Math.min(difficulty === 'hard' ? 18 : 12, gameSpeed + 0.3);
    speedMultiplier = Math.round((gameSpeed / (difficulty === 'hard' ? 5 : 3)) * 10) / 10;
    document.getElementById('speed').textContent = speedMultiplier.toFixed(1) + 'x';
  }

  // Score
  score++;
  if (frameCount % 6 === 0) document.getElementById('score').textContent = score;

  // High score
  if (score > parseInt(localStorage.getItem('hs_carracer') || '0')) {
    localStorage.setItem('hs_carracer', score);
    document.getElementById('highscore').textContent = score;
  }

  // Player movement
  if (moveDelay > 0) moveDelay--;
  if (moveDelay === 0) {
    const moving = (keys.left || touchLeft) ? 'left' : (keys.right || touchRight) ? 'right' : null;
    if (moving === 'left' && player.lane > 0) {
      player.lane--;
      player.targetX = laneX(player.lane);
      moveDelay = 12;
      playSound('dodge');
    } else if (moving === 'right' && player.lane < LANE_COUNT - 1) {
      player.lane++;
      player.targetX = laneX(player.lane);
      moveDelay = 12;
      playSound('dodge');
    }
  }
  player.x += (player.targetX - player.x) * 0.25;

  // Spawn enemies
  const spawnRate = difficulty === 'hard' ? Math.max(20, 60 - frameCount / 30) : Math.max(30, 80 - frameCount / 30);
  spawnCooldown--;
  if (spawnCooldown <= 0) {
    spawnEnemy();
    spawnCooldown = spawnRate + Math.random() * 20;
    if (difficulty === 'hard' && Math.random() < 0.3) {
      setTimeout(spawnEnemy, 200);
    }
  }

  // Update enemies
  enemies.forEach(e => {
    e.y += gameSpeed + e.speed;
  });

  // Collision detection
  for (const e of enemies) {
    if (e.y > H + 80) continue;
    const px = player.x, py = player.y;
    const ex = e.x, ey = e.y;
    const overlap = px < ex + e.width - 6 && px + player.width - 6 > ex &&
                    py < ey + e.height - 8 && py + player.height - 8 > ey;
    if (overlap) {
      // Crash
      spawnCrashParticles(player.x + player.width/2, player.y + player.height/2);
      playSound('crash');
      endGame();
      return;
    }
    // Dodge bonus
    if (e.y > py + player.height + 5 && !e.dodged) {
      e.dodged = true;
      score += 5;
    }
  }

  // Remove off-screen enemies
  enemies = enemies.filter(e => e.y < H + 100);

  // Update particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.03;
  });
  particles = particles.filter(p => p.life > 0);

  // Engine sound occasionally
  if (frameCount % 30 === 0) playSound('engine');
}

function spawnCrashParticles(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      color: ['#ff4444','#ffaa00','#ff8800','#ffff44'][Math.floor(Math.random()*4)],
      size: 3 + Math.random() * 6
    });
  }
}

function drawGame() {
  drawRoad();

  // Draw enemies
  enemies.forEach(e => drawCar(e.x, e.y, e.width, e.height, e.color, false));

  // Draw player
  drawCar(player.x, player.y, player.width, player.height, '#ff6644', true);

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Speed indicator
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(ROAD_LEFT + 4, 4, 80, 20);
  ctx.fillStyle = '#ffff44';
  ctx.font = 'bold 12px Arial';
  ctx.fillText(`⚡ ${speedMultiplier.toFixed(1)}x`, ROAD_LEFT + 8, 18);
}

function drawOverlay(title, sub) {
  ctx.fillStyle = '#1a0000cc';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'yellow';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, W/2, H/2 - 30);
  ctx.fillStyle = '#ffcccc';
  ctx.font = '15px Arial';
  ctx.fillText(sub, W/2, H/2 + 5);
  ctx.fillStyle = '#ff9999';
  ctx.font = '13px Arial';
  ctx.fillText('Tap or press Space to play', W/2, H/2 + 35);
  ctx.textAlign = 'left';
}

function endGame() {
  gameActive = false; gameOver = true;
  const hs = parseInt(localStorage.getItem('hs_carracer') || '0');
  if (score > hs) { localStorage.setItem('hs_carracer', score); document.getElementById('highscore').textContent = score; }
}

function gameLoop() {
  if (gameActive) {
    updateGame();
    drawGame();
  } else if (gameOver) {
    drawGame();
    const hs = parseInt(localStorage.getItem('hs_carracer') || '0');
    drawOverlay('💥 CRASH!', `Score: ${score} | Best: ${Math.max(score,hs)}`);
  } else {
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(0, 0, W, H);
    drawOverlay('🏎️ Car Racer', 'Dodge the oncoming cars!');
  }
  animFrame = requestAnimationFrame(gameLoop);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
  if ((e.key === ' ' || e.key === 'Enter') && !gameActive) { initGame(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

canvas.addEventListener('click', () => { if (!gameActive) initGame(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (!gameActive) initGame(); }, { passive: false });

// Touch controls
const leftBtn = document.getElementById('left-btn');
const rightBtn = document.getElementById('right-btn');

leftBtn.addEventListener('pointerdown', e => { e.preventDefault(); touchLeft = true; if (!gameActive) initGame(); });
leftBtn.addEventListener('pointerup', e => { e.preventDefault(); touchLeft = false; });
leftBtn.addEventListener('pointerleave', e => { touchLeft = false; });

rightBtn.addEventListener('pointerdown', e => { e.preventDefault(); touchRight = true; if (!gameActive) initGame(); });
rightBtn.addEventListener('pointerup', e => { e.preventDefault(); touchRight = false; });
rightBtn.addEventListener('pointerleave', e => { touchRight = false; });

// Swipe on canvas
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameActive) { initGame(); return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 20) {
    if (dx < 0 && player.lane > 0) { player.lane--; player.targetX = laneX(player.lane); playSound('dodge'); }
    else if (dx > 0 && player.lane < LANE_COUNT - 1) { player.lane++; player.targetX = laneX(player.lane); playSound('dodge'); }
  }
}, { passive: false });

document.getElementById('highscore').textContent = localStorage.getItem('hs_carracer') || '0';
player.x = laneX(1); player.targetX = player.x;
gameLoop();
</script>
</body>
</html>
