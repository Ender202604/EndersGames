<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake - Ender's Games</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#1a0000;color:white;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none; }
h1 { color:yellow;font-size:clamp(1.2rem,4vw,2rem);margin-bottom:8px;letter-spacing:2px;text-shadow:0 0 10px #ffff00aa; }
#score-board { display:flex;gap:20px;margin-bottom:8px;font-size:clamp(0.8rem,3vw,1rem);color:#ffcccc;flex-wrap:wrap;justify-content:center; }
#score-board span { color:yellow;font-weight:bold; }
#canvas-wrap { position:relative;border:2px solid #ff6666;border-radius:8px;box-shadow:0 0 20px #ff000055; }
canvas { display:block;border-radius:6px; }
#overlay { display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(26,0,0,0.88);border-radius:6px;flex-direction:column;align-items:center;justify-content:center;gap:12px; }
#overlay.show { display:flex; }
#overlay h2 { color:#ff4444;font-size:clamp(1.4rem,5vw,2.2rem); }
#overlay .final-score { color:white;font-size:clamp(1rem,3.5vw,1.4rem); }
#overlay .high-score-msg { color:yellow;font-size:clamp(0.8rem,3vw,1rem); }
#diff-row { display:flex;gap:8px; }
.diff-btn { background:transparent;color:#ffaaaa;border:1px solid #ff6666;padding:6px 14px;font-size:0.85rem;border-radius:6px;cursor:pointer;opacity:0.6;font-family:'Courier New',monospace;transition:all .2s; }
.diff-btn.active,.diff-btn:hover { opacity:1;background:rgba(255,80,80,.15);box-shadow:0 0 8px #ff4444; }
#play-again { background:#cc0000;color:white;border:none;padding:12px 30px;font-size:clamp(0.9rem,3vw,1.1rem);border-radius:8px;cursor:pointer;font-weight:bold;transition:background 0.2s; }
#play-again:hover { background:#ff2222; }
#start-msg { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#aaffaa;font-size:clamp(0.85rem,3vw,1rem);pointer-events:none; }
#mobile-controls { display:none;margin-top:12px;gap:8px;flex-direction:column;align-items:center; }
.dpad-row { display:flex;gap:8px; }
.dpad-btn { width:52px;height:52px;background:#440000;border:2px solid #ff6666;border-radius:8px;color:white;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none; }
.dpad-btn:active { background:#880000; }
@media (max-width:600px) { #mobile-controls { display:flex; } }
@media (hover:none) { #mobile-controls { display:flex; } }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#ffaaaa;text-decoration:none;font-size:13px;border:1px solid #ff6666;padding:4px 10px;border-radius:6px;z-index:999;">&#8592; Back</a>
<h1>&#x1F40D; SNAKE</h1>
<div id="score-board">Score: <span id="score-val">0</span> &nbsp;|&nbsp; Best: <span id="hi-val">0</span> &nbsp;|&nbsp; Level: <span id="lvl-val">1</span></div>
<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">GAME OVER</h2>
    <div class="final-score" id="overlay-score">Score: 0</div>
    <div class="high-score-msg" id="overlay-hi"></div>
    <div id="diff-row">
      <button class="diff-btn" id="d-easy" onclick="setDifficulty('easy')">EASY</button>
      <button class="diff-btn active" id="d-medium" onclick="setDifficulty('medium')">MEDIUM</button>
      <button class="diff-btn" id="d-hard" onclick="setDifficulty('hard')">HARD</button>
    </div>
    <button id="play-again">Play Again</button>
  </div>
  <div id="start-msg">Press any arrow key or tap a button to start!</div>
</div>
<div id="mobile-controls">
  <div class="dpad-row"><button class="dpad-btn" id="btn-up">&#9650;</button></div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-left">&#9664;</button>
    <button class="dpad-btn" id="btn-down">&#9660;</button>
    <button class="dpad-btn" id="btn-right">&#9654;</button>
  </div>
</div>
<script>
var AC=window.AudioContext||window.webkitAudioContext;
var ac=AC?new AC():null;
function snd(freq,dur,type,vol){
  if(!ac)return;
  try{var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=freq;o.type=type||'square';g.gain.setValueAtTime(vol||0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}
}
function sndEat(){snd(660,.06,'square',.08);}
function sndDie(){snd(330,.1,'sawtooth',.13);setTimeout(function(){snd(220,.15,'sawtooth',.1);},100);setTimeout(function(){snd(165,.22,'sawtooth',.08);},220);}
function sndLevelUp(){snd(523,.07,'square',.1);setTimeout(function(){snd(659,.07,'square',.1);},80);setTimeout(function(){snd(784,.12,'square',.1);},165);}

var HS_KEY='snakeHi';
function loadHi(){return parseInt(localStorage.getItem(HS_KEY)||'0');}
function saveHi(v){localStorage.setItem(HS_KEY,v);}

var difficulty='medium';
var diffSpeeds={easy:200,medium:150,hard:95};
function setDifficulty(d){
  difficulty=d;
  ['easy','medium','hard'].forEach(function(k){document.getElementById('d-'+k).classList.remove('active');});
  document.getElementById('d-'+d).classList.add('active');
}

var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var overlay=document.getElementById('overlay');
var startMsg=document.getElementById('start-msg');
var CELL=20,COLS,ROWS;

function resize(){
  var maxW=Math.min(window.innerWidth-20,500),maxH=Math.min(window.innerHeight-200,460);
  COLS=Math.floor(maxW/CELL);ROWS=Math.floor(maxH/CELL);
  canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
}
resize();

var snake,dir,nextDir,food,score,highScore,level,foodEaten,gameLoop,running,started;

function init(){
  if(ac&&ac.state==='suspended')ac.resume();
  var midX=Math.floor(COLS/2),midY=Math.floor(ROWS/2);
  snake=[{x:midX,y:midY},{x:midX-1,y:midY},{x:midX-2,y:midY}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;foodEaten=0;highScore=loadHi();
  running=false;started=false;
  overlay.classList.remove('show');spawnFood();updateUI();draw();
}

function spawnFood(){
  var pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(function(s){return s.x===pos.x&&s.y===pos.y;}));
  food=pos;
}

function getSpeed(){return Math.max(55,diffSpeeds[difficulty]-(level-1)*15);}

function start(){
  if(started)return;
  started=true;startMsg.style.display='none';running=true;
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(tick,getSpeed());
}

function tick(){
  dir={x:nextDir.x,y:nextDir.y};
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS)return gameOver();
  if(snake.some(function(s){return s.x===head.x&&s.y===head.y;}))return gameOver();
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;foodEaten++;sndEat();
    if(foodEaten%5===0){level++;clearInterval(gameLoop);gameLoop=setInterval(tick,getSpeed());sndLevelUp();}
    if(score>highScore){highScore=score;saveHi(highScore);}
    spawnFood();updateUI();
  } else {snake.pop();}
  draw();
}

function gameOver(){
  clearInterval(gameLoop);running=false;sndDie();
  document.getElementById('overlay-title').textContent='GAME OVER';
  document.getElementById('overlay-score').textContent='Score: '+score;
  document.getElementById('overlay-hi').textContent=score>=highScore&&score>0?'New High Score: '+highScore:'Best: '+highScore;
  overlay.classList.add('show');
}

function updateUI(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('hi-val').textContent=highScore;
  document.getElementById('lvl-val').textContent=level;
}

function draw(){
  ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#0d1f0d';ctx.lineWidth=0.5;
  for(var x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(var y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
  var fx=food.x*CELL+CELL/2,fy=food.y*CELL+CELL/2,fr=CELL/2-2;
  ctx.fillStyle='#ff2222';ctx.shadowColor='#ff0000';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  snake.forEach(function(seg,i){
    var ratio=1-i/snake.length,g2=Math.floor(150+ratio*105);
    ctx.fillStyle=i===0?'#00ff44':'rgb(0,'+g2+',30)';
    ctx.shadowColor=i===0?'#00ff44':'transparent';ctx.shadowBlur=i===0?8:0;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(seg.x*CELL+2,seg.y*CELL+2,CELL-4,CELL-4,4);
    else ctx.rect(seg.x*CELL+2,seg.y*CELL+2,CELL-4,CELL-4);
    ctx.fill();ctx.shadowBlur=0;
    if(i===0){
      ctx.fillStyle='#000';
      var ex=dir.x===0?4:(dir.x>0?CELL-6:4),ey=dir.y===0?4:(dir.y>0?CELL-6:4);
      ctx.beginPath();ctx.arc(seg.x*CELL+ex,seg.y*CELL+ey,2,0,Math.PI*2);ctx.fill();
      var ex2=dir.x===0?CELL-4:ex,ey2=dir.y===0?CELL-4:ey;
      ctx.beginPath();ctx.arc(seg.x*CELL+ex2,seg.y*CELL+ey2,2,0,Math.PI*2);ctx.fill();
    }
  });
}

document.addEventListener('keydown',function(e){
  var moves={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  if(moves[e.key]){e.preventDefault();var m=moves[e.key];if(m.x!==-dir.x||m.y!==-dir.y)nextDir=m;start();}
});

var touchStartX,touchStartY;
canvas.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){var m=dx>0?{x:1,y:0}:{x:-1,y:0};if(m.x!==-dir.x)nextDir=m;}
  else{var m=dy>0?{x:0,y:1}:{x:0,y:-1};if(m.y!==-dir.y)nextDir=m;}
  start();e.preventDefault();
},{passive:false});

function setDir(m){if(m.x!==-dir.x||m.y!==-dir.y)nextDir=m;start();}
document.getElementById('btn-up').addEventListener('touchstart',function(e){setDir({x:0,y:-1});e.preventDefault();},{passive:false});
document.getElementById('btn-down').addEventListener('touchstart',function(e){setDir({x:0,y:1});e.preventDefault();},{passive:false});
document.getElementById('btn-left').addEventListener('touchstart',function(e){setDir({x:-1,y:0});e.preventDefault();},{passive:false});
document.getElementById('btn-right').addEventListener('touchstart',function(e){setDir({x:1,y:0});e.preventDefault();},{passive:false});
document.getElementById('btn-up').addEventListener('click',function(){setDir({x:0,y:-1});});
document.getElementById('btn-down').addEventListener('click',function(){setDir({x:0,y:1});});
document.getElementById('btn-left').addEventListener('click',function(){setDir({x:-1,y:0});});
document.getElementById('btn-right').addEventListener('click',function(){setDir({x:1,y:0});});
document.getElementById('play-again').addEventListener('click',init);
window.addEventListener('resize',function(){resize();if(!started)init();});
init();
</script>
</body>
</html>
