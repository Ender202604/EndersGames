<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle - Ender's Game World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0000;
  font-family: Arial, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
}
#home-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  background: darkred;
  color: yellow;
  border: 2px solid yellow;
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
}
#home-btn:hover { background: #8b0000; }
h1 { color: yellow; font-size: 28px; margin: 10px 0 4px; }
#subtitle { color: #ffaaaa; font-size: 13px; margin-bottom: 12px; }
#board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 5px;
  margin-bottom: 14px;
}
.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}
.tile {
  width: 56px;
  height: 56px;
  border: 2px solid #555;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  background: #2a0000;
  color: white;
  transition: background 0.3s, border-color 0.3s;
  user-select: none;
}
.tile.filled { border-color: #888; }
.tile.correct { background: #538d4e; border-color: #538d4e; }
.tile.present { background: #b59f3b; border-color: #b59f3b; }
.tile.absent  { background: #3a3a3c; border-color: #3a3a3c; }
.tile.pop { animation: pop 0.1s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
.tile.flip { animation: flip 0.5s ease; }
@keyframes flip { 0%{transform:rotateX(0)} 50%{transform:rotateX(-90deg)} 100%{transform:rotateX(0)} }
.tile.shake { animation: shake 0.5s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
#keyboard {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
.kb-row {
  display: flex;
  gap: 5px;
}
.key {
  background: #555;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  height: 56px;
  min-width: 36px;
  padding: 0 4px;
  transition: background 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.key.wide { min-width: 54px; font-size: 11px; }
.key:hover { filter: brightness(1.3); }
.key.correct { background: #538d4e; }
.key.present { background: #b59f3b; }
.key.absent  { background: #3a3a3c; }
#message {
  height: 32px;
  line-height: 32px;
  font-size: 16px;
  font-weight: bold;
  color: yellow;
  text-align: center;
  margin-bottom: 6px;
}
#new-game-btn {
  display: none;
  margin-top: 8px;
  padding: 10px 24px;
  background: darkred;
  color: yellow;
  border: 2px solid yellow;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
#new-game-btn:hover { background: #8b0000; }
</style>
</head>
<body>
<a id="home-btn" href="index.html">🏠 Home</a>
<h1>🟩 Wordle</h1>
<div id="subtitle">Guess the 5-letter word in 6 tries!</div>
<div id="message"></div>
<div id="board"></div>
<div id="keyboard"></div>
<button id="new-game-btn" onclick="initGame()">New Game</button>

<script>
const WORDS = [
  "apple","brave","chair","dance","earth","flame","grape","heart","ivory","juice",
  "knife","lemon","magic","night","ocean","piano","queen","river","stone","tiger",
  "uncle","video","water","xenon","yacht","zebra","angel","blast","cloud","depth",
  "eagle","fable","giant","house","image","jewel","karma","laser","metal","novel",
  "olive","peace","quest","radar","sugar","table","ultra","vapor","waste","extra",
  "young","zonal","birds","crown","drill","empty","field","gloom","hence","input",
  "joker","knack","light","march","nerve","order","paint","range","scale","twist",
  "upset","valve","woken","yeast","blank","chess","dreamy","fleet","grind","honor"
].map(w => w.toUpperCase()).filter(w => w.length === 5);

const KB_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];

let targetWord, currentRow, currentCol, gameOver, grid;

function initGame() {
  targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;
  grid = Array.from({length:6}, () => Array(5).fill(''));
  document.getElementById('message').textContent = '';
  document.getElementById('new-game-btn').style.display = 'none';
  buildBoard();
  buildKeyboard();
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = 'tile-' + r + '-' + c;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k === 'ENTER' || k === '⌫' ? ' wide' : '');
      btn.textContent = k;
      btn.id = 'key-' + k;
      btn.addEventListener('click', () => handleKey(k));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function handleKey(k) {
  if (gameOver) return;
  if (k === '⌫' || k === 'BACKSPACE') {
    if (currentCol > 0) {
      currentCol--;
      grid[currentRow][currentCol] = '';
      updateTile(currentRow, currentCol, '');
    }
  } else if (k === 'ENTER') {
    submitGuess();
  } else if (/^[A-Z]$/.test(k) && currentCol < 5) {
    grid[currentRow][currentCol] = k;
    updateTile(currentRow, currentCol, k, true);
    currentCol++;
  }
}

function updateTile(r, c, letter, pop) {
  const tile = document.getElementById('tile-' + r + '-' + c);
  tile.textContent = letter;
  tile.className = 'tile' + (letter ? ' filled' : '') + (pop ? ' pop' : '');
  if (pop) setTimeout(() => tile.classList.remove('pop'), 150);
}

function submitGuess() {
  if (currentCol < 5) {
    shakeRow(currentRow);
    showMessage('Not enough letters!');
    return;
  }
  const guess = grid[currentRow].join('');
  const result = scoreGuess(guess);
  revealRow(currentRow, result, guess);
  updateKeyboard(guess, result);
  if (result.every(r => r === 'correct')) {
    setTimeout(() => { showMessage('Brilliant! 🎉'); gameOver = true; document.getElementById('new-game-btn').style.display = 'inline-block'; }, 1800);
  } else if (currentRow === 5) {
    setTimeout(() => { showMessage('The word was: ' + targetWord); gameOver = true; document.getElementById('new-game-btn').style.display = 'inline-block'; }, 1800);
  }
  currentRow++;
  currentCol = 0;
}

function scoreGuess(guess) {
  const result = Array(5).fill('absent');
  const target = targetWord.split('');
  const used = Array(5).fill(false);
  // First pass: correct
  for (let i = 0; i < 5; i++) {
    if (guess[i] === target[i]) { result[i] = 'correct'; used[i] = true; }
  }
  // Second pass: present
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guess[i] === target[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }
  return result;
}

function revealRow(row, result, guess) {
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById('tile-' + row + '-' + c);
    setTimeout(() => {
      tile.className = 'tile flip ' + result[c];
      tile.textContent = guess[c];
    }, c * 300);
  }
}

function updateKeyboard(guess, result) {
  const priority = { correct: 3, present: 2, absent: 1 };
  for (let i = 0; i < 5; i++) {
    const keyEl = document.getElementById('key-' + guess[i]);
    if (!keyEl) continue;
    const cur = keyEl.className.split(' ').find(c => ['correct','present','absent'].includes(c));
    if (!cur || priority[result[i]] > priority[cur]) {
      keyEl.classList.remove('correct','present','absent');
      keyEl.classList.add(result[i]);
    }
  }
}

function shakeRow(row) {
  const rowEl = document.getElementById('row-' + row);
  rowEl.querySelectorAll('.tile').forEach(t => {
    t.classList.add('shake');
    setTimeout(() => t.classList.remove('shake'), 600);
  });
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  if (msg && !gameOver) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 2000);
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('BACKSPACE');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

initGame();
</script>
</body>
</html>
