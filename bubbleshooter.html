<!DOCTYPE html>
<html>
<head>
<title>Bubble Shooter - Ender's Game World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0000;
  font-family: Arial, sans-serif;
  color: #ff9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 12px 12px;
  user-select: none;
  -webkit-user-select: none;
}
#home-btn {
  position: fixed; top: 8px; left: 10px;
  color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99;
}
h1 { color: yellow; font-size: 26px; margin-bottom: 4px; text-shadow: 0 0 10px #ff0000; }
.stats-row {
  display: flex; gap: 14px; margin-bottom: 8px;
  background: darkred; border: 2px solid #ff6666;
  border-radius: 10px; padding: 6px 16px;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #ffcccc; }
.stat-value { font-size: 20px; color: yellow; font-weight: bold; }
#canvas {
  border: 3px solid #ff6666;
  border-radius: 12px;
  display: block;
  cursor: crosshair;
  touch-action: none;
  box-shadow: 0 0 20px #ff000044;
}
.diff-row { display: flex; gap: 10px; margin: 8px 0; width: 320px; }
.diff-btn {
  flex: 1; padding: 7px; border: 2px solid #ff6666;
  border-radius: 8px; font-size: 13px; font-weight: bold;
  cursor: pointer; transition: all 0.15s;
  background: #1a0000; color: #ff9999;
}
.diff-btn.active { background: darkred; color: yellow; border-color: yellow; }
.next-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: #ffcccc; margin-top: 6px;
}
#msg-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #1a0000cc;
  border: 2px solid #ff6666;
  border-radius: 14px;
  padding: 16px 24px;
  text-align: center;
  pointer-events: none;
  display: none;
}
#msg-overlay h2 { color: yellow; margin-bottom: 8px; }
#msg-overlay p { color: #ffcccc; font-size: 14px; }
.canvas-wrap { position: relative; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<h1>🫧 Bubble Shooter</h1>

<div class="stats-row">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="highscore">0</div></div>
  <div class="stat"><div class="stat-label">Shots</div><div class="stat-value" id="shots">0</div></div>
  <div class="stat"><div class="stat-label">Next Row</div><div class="stat-value" id="next-row-ct">8</div></div>
</div>

<div class="diff-row">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">🟢 Easy</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">🔴 Hard</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="320" height="480"></canvas>
  <div id="msg-overlay">
    <h2 id="msg-title">Bubble Shooter</h2>
    <p id="msg-body">Click to aim &amp; shoot!</p>
  </div>
</div>

<div class="next-row" style="margin-top:8px;">
  <span>Next bubble:</span>
  <canvas id="next-canvas" width="36" height="36"></canvas>
  <span id="shots-til-row">Shots until new row: <b id="shots-til">8</b></span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

const W = 320, H = 480;
const RADIUS = 18;
const COLS = 8;
const ROW_HEIGHT = Math.floor(RADIUS * 1.73);
let difficulty = 'easy';
let audioCtx = null;

const COLORS_EASY = ['#ff4444','#ffaa00','#44ff44','#4444ff','#ff44ff','#44ffff'];
const COLORS_HARD = ['#ff4444','#ffaa00','#44ff44','#4444ff','#ff44ff','#44ffff','#ff9900','#aaffaa'];

let grid = [];
let bubbleFly = null;
let nextColor = null;
let score = 0;
let shots = 0;
let shotsTilRow = 8;
let gameOver = false;
let gameStarted = false;
let animFrame = null;

function getColors() { return difficulty === 'hard' ? COLORS_HARD : COLORS_EASY; }
function getAddInterval() { return difficulty === 'hard' ? 5 : 8; }

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const c = getAudio();
    const o = c.createOscillator(); const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    if (type === 'shoot') {
      o.type = 'sine'; o.frequency.value = 800;
      g.gain.setValueAtTime(0.12, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
      o.start(); o.stop(c.currentTime + 0.08);
    } else if (type === 'pop') {
      o.type = 'sine'; o.frequency.setValueAtTime(600, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(900, c.currentTime + 0.1);
      g.gain.setValueAtTime(0.15, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
      o.start(); o.stop(c.currentTime + 0.15);
    } else if (type === 'bigpop') {
      [600,700,800,900,1000].forEach((f,i) => {
        const oo = c.createOscillator(); const gg = c.createGain();
        oo.connect(gg); gg.connect(c.destination);
        oo.type = 'sine'; oo.frequency.value = f;
        gg.gain.setValueAtTime(0.15, c.currentTime + i*0.03);
        gg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i*0.03 + 0.12);
        oo.start(c.currentTime + i*0.03); oo.stop(c.currentTime + i*0.03 + 0.12);
      });
    } else if (type === 'gameover') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(400, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.6);
      g.gain.setValueAtTime(0.15, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
      o.start(); o.stop(c.currentTime + 0.6);
    } else if (type === 'newrow') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(300, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.2);
      g.gain.setValueAtTime(0.1, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.2);
      o.start(); o.stop(c.currentTime + 0.2);
    }
  } catch(e) {}
}

function setDiff(d) {
  if (gameStarted) return;
  difficulty = d;
  document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
  document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
  shotsTilRow = getAddInterval();
  document.getElementById('next-row-ct').textContent = getAddInterval();
  document.getElementById('shots-til').textContent = getAddInterval();
}

// Grid: row × col, each cell = null or color string
function initGrid() {
  grid = [];
  const colors = getColors();
  for (let row = 0; row < 5; row++) {
    addGridRow(row, colors, false);
  }
}

function addGridRow(atRow, colors, shift = false) {
  // Insert at top — shift all rows down
  if (shift) {
    grid.unshift(new Array(COLS).fill(null));
    atRow = 0;
  } else {
    while (grid.length <= atRow) grid.push(new Array(COLS).fill(null));
  }
  for (let c = 0; c < COLS; c++) {
    grid[atRow][c] = colors[Math.floor(Math.random() * colors.length)];
  }
}

function getBubbleXY(row, col) {
  const offset = (row % 2) * RADIUS;
  const x = offset + RADIUS + col * RADIUS * 2;
  const y = RADIUS + row * ROW_HEIGHT;
  return { x, y };
}

function findGridXY(x, y) {
  // Find closest grid cell
  let best = null, bestDist = Infinity;
  const rowCount = grid.length;
  for (let r = 0; r < rowCount + 1; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x: gx, y: gy } = getBubbleXY(r, c);
      const d = Math.hypot(gx - x, gy - y);
      if (d < bestDist) { bestDist = d; best = { r, c }; }
    }
  }
  return best;
}

function randomColor() {
  const colors = getColors();
  return colors[Math.floor(Math.random() * colors.length)];
}

function drawBubble(ctx, x, y, color, r = RADIUS) {
  ctx.save();
  const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  grad.addColorStop(0, lighten(color));
  grad.addColorStop(0.7, color);
  grad.addColorStop(1, darken(color));
  ctx.beginPath();
  ctx.arc(x, y, r - 1, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Shine
  ctx.beginPath();
  ctx.arc(x - r*0.25, y - r*0.25, r*0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();
  ctx.restore();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
}
function darken(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
}

function drawAimLine(mx, my) {
  const cx = W / 2, cy = H - 30;
  ctx.save();
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  // Calculate direction
  const dx = mx - cx, dy = my - cy;
  const len = Math.hypot(dx, dy);
  if (len < 10) { ctx.restore(); return; }
  const nx = dx / len, ny = dy / len;
  // Simulate bounces
  let x = cx, y = cy, vx = nx, vy = ny;
  ctx.lineTo(x, y);
  for (let i = 0; i < 3; i++) {
    // Find wall bounce or top
    let tLeft = vx < 0 ? -x / vx : Infinity;
    let tRight = vx > 0 ? (W - x) / vx : Infinity;
    let tTop = vy < 0 ? -y / vy : Infinity;
    const t = Math.min(tLeft, tRight, tTop, 120);
    x += vx * t; y += vy * t;
    ctx.lineTo(x, y);
    if (t === tLeft || t === tRight) vx = -vx;
    else break;
  }
  ctx.stroke();
  ctx.restore();
}

let aimX = W / 2, aimY = H / 2;
let popParticles = [];

function drawGame() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a0000';
  ctx.fillRect(0, 0, W, H);

  // Danger zone line
  ctx.save();
  ctx.strokeStyle = '#ff000066';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(0, H - 70);
  ctx.lineTo(W, H - 70);
  ctx.stroke();
  ctx.restore();

  // Draw grid bubbles
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) {
        const { x, y } = getBubbleXY(r, c);
        drawBubble(ctx, x, y, grid[r][c]);
      }
    }
  }

  // Draw flying bubble
  if (bubbleFly) {
    drawBubble(ctx, bubbleFly.x, bubbleFly.y, bubbleFly.color);
  }

  // Draw aim line
  if (!bubbleFly && gameStarted && !gameOver) {
    drawAimLine(aimX, aimY);
  }

  // Cannon
  const cx = W / 2, cy = H - 30;
  const angle = Math.atan2(aimY - cy, aimX - cx);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#cc4444';
  ctx.fillRect(-6, -24, 12, 24);
  ctx.restore();

  // Current bubble in cannon
  if (!bubbleFly) {
    drawBubble(ctx, cx, cy, nextColor || '#ff4444', RADIUS * 0.85);
  }

  // Pop particles
  popParticles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function shoot(toX, toY) {
  if (bubbleFly || !gameStarted || gameOver) return;
  const cx = W / 2, cy = H - 30;
  if (toY >= cy) return;
  const angle = Math.atan2(toY - cy, toX - cx);
  playSound('shoot');
  bubbleFly = {
    x: cx, y: cy,
    color: nextColor,
    vx: Math.cos(angle) * 10,
    vy: Math.sin(angle) * 10
  };
  nextColor = randomColor();
  drawNextBubble();
  shots++;
  document.getElementById('shots').textContent = shots;
  shotsTilRow--;
  document.getElementById('shots-til').textContent = Math.max(0, shotsTilRow);
  document.getElementById('next-row-ct').textContent = getAddInterval() - (getAddInterval() - Math.max(0, shotsTilRow));
}

function drawNextBubble() {
  nextCtx.clearRect(0, 0, 36, 36);
  drawBubble(nextCtx, 18, 18, nextColor, 15);
}

function updateFlyingBubble() {
  if (!bubbleFly) return;
  bubbleFly.x += bubbleFly.vx;
  bubbleFly.y += bubbleFly.vy;

  // Wall bounce
  if (bubbleFly.x - RADIUS < 0) { bubbleFly.x = RADIUS; bubbleFly.vx = Math.abs(bubbleFly.vx); }
  if (bubbleFly.x + RADIUS > W) { bubbleFly.x = W - RADIUS; bubbleFly.vx = -Math.abs(bubbleFly.vx); }

  // Check collision with grid or top
  const hitTop = bubbleFly.y - RADIUS <= 0;
  let hitGrid = false;
  let hitCell = null;

  for (let r = 0; r < grid.length && !hitGrid; r++) {
    for (let c = 0; c < COLS && !hitGrid; c++) {
      if (!grid[r][c]) continue;
      const { x, y } = getBubbleXY(r, c);
      if (Math.hypot(bubbleFly.x - x, bubbleFly.y - y) < RADIUS * 1.9) {
        hitGrid = true;
      }
    }
  }

  if (hitTop || hitGrid) {
    // Snap to grid
    const { r, c } = findGridXY(bubbleFly.x, bubbleFly.y) || { r: 0, c: 0 };
    const snapRow = Math.max(0, r);
    while (grid.length <= snapRow) grid.push(new Array(COLS).fill(null));
    // Find empty cell near r, c
    const placed = placeInGrid(snapRow, c, bubbleFly.color);
    bubbleFly = null;

    if (placed) {
      const popped = findAndPop(placed.r, placed.c, grid[placed.r][placed.c]);
      if (popped >= 3) {
        score += popped * 10;
        document.getElementById('score').textContent = score;
        const hs = parseInt(localStorage.getItem('hs_bubbleshooter') || '0');
        if (score > hs) {
          localStorage.setItem('hs_bubbleshooter', score);
          document.getElementById('highscore').textContent = score;
        }
        if (popped >= 6) playSound('bigpop'); else playSound('pop');
        removeFloating();
      }
    }

    if (shotsTilRow <= 0) {
      addNewRow();
      shotsTilRow = getAddInterval();
      document.getElementById('shots-til').textContent = shotsTilRow;
    }

    checkGameOver();
  }
}

function placeInGrid(row, col, color) {
  // Try the cell, then neighbors
  const candidates = [[row, col]];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      candidates.push([row + dr, col + dc]);
    }
  }
  for (const [r, c] of candidates) {
    if (r < 0 || c < 0 || c >= COLS) continue;
    while (grid.length <= r) grid.push(new Array(COLS).fill(null));
    if (!grid[r][c]) {
      grid[r][c] = color;
      return { r, c };
    }
  }
  // Force place
  while (grid.length <= row) grid.push(new Array(COLS).fill(null));
  grid[row][col] = color;
  return { r: row, c: col };
}

function getNeighbors(r, c) {
  const odd = r % 2;
  return [
    [r - 1, c + (odd ? 0 : -1)], [r - 1, c + (odd ? 1 : 0)],
    [r, c - 1], [r, c + 1],
    [r + 1, c + (odd ? 0 : -1)], [r + 1, c + (odd ? 1 : 0)]
  ].filter(([rr, cc]) => rr >= 0 && rr < grid.length && cc >= 0 && cc < COLS);
}

function findAndPop(startR, startC, color) {
  const visited = new Set();
  const queue = [[startR, startC]];
  visited.add(`${startR},${startC}`);
  const group = [];

  while (queue.length) {
    const [r, c] = queue.shift();
    if (grid[r] && grid[r][c] === color) {
      group.push([r, c]);
      for (const [nr, nc] of getNeighbors(r, c)) {
        const key = `${nr},${nc}`;
        if (!visited.has(key)) { visited.add(key); queue.push([nr, nc]); }
      }
    }
  }

  if (group.length >= 3) {
    group.forEach(([r, c]) => {
      const { x, y } = getBubbleXY(r, c);
      spawnParticles(x, y, color);
      grid[r][c] = null;
    });
    return group.length;
  }
  return 0;
}

function removeFloating() {
  // Find all bubbles connected to top row
  const connected = new Set();
  const queue = [];
  for (let c = 0; c < COLS; c++) {
    if (grid[0] && grid[0][c]) { connected.add(`0,${c}`); queue.push([0, c]); }
  }
  while (queue.length) {
    const [r, c] = queue.shift();
    for (const [nr, nc] of getNeighbors(r, c)) {
      const key = `${nr},${nc}`;
      if (!connected.has(key) && grid[nr] && grid[nr][nc]) {
        connected.add(key); queue.push([nr, nc]);
      }
    }
  }
  // Remove floating
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] && !connected.has(`${r},${c}`)) {
        const { x, y } = getBubbleXY(r, c);
        spawnParticles(x, y, grid[r][c]);
        grid[r][c] = null;
        score += 5;
      }
    }
  }
  document.getElementById('score').textContent = score;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    popParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      r: 6 + Math.random() * 6,
      life: 1
    });
  }
}

function addNewRow() {
  playSound('newrow');
  const colors = getColors();
  // Move all rows down
  grid.unshift(new Array(COLS).fill(null).map(() => colors[Math.floor(Math.random() * colors.length)]));
}

function checkGameOver() {
  // Check if any bubble in bottom 3 rows has passed the danger zone
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) {
        const { y } = getBubbleXY(r, c);
        if (y + RADIUS > H - 70) {
          endGame();
          return;
        }
      }
    }
  }
}

function endGame() {
  gameOver = true;
  playSound('gameover');
  const hs = parseInt(localStorage.getItem('hs_bubbleshooter') || '0');
  if (score > hs) { localStorage.setItem('hs_bubbleshooter', score); document.getElementById('highscore').textContent = score; }
  showOverlay('Game Over!', `Score: ${score} | Best: ${Math.max(score, hs)}\n\nClick canvas to play again`);
}

function showOverlay(title, body) {
  const ov = document.getElementById('msg-overlay');
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  ov.style.display = 'block';
}

function hideOverlay() {
  document.getElementById('msg-overlay').style.display = 'none';
}

function startGame() {
  score = 0; shots = 0; shotsTilRow = getAddInterval();
  gameOver = false; gameStarted = true;
  popParticles = [];
  bubbleFly = null;
  initGrid();
  nextColor = randomColor();
  drawNextBubble();
  document.getElementById('score').textContent = '0';
  document.getElementById('shots').textContent = '0';
  document.getElementById('shots-til').textContent = shotsTilRow;
  document.getElementById('next-row-ct').textContent = shotsTilRow;
  hideOverlay();
}

function gameLoop() {
  updateFlyingBubble();
  popParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.04;
  });
  popParticles = popParticles.filter(p => p.life > 0);
  drawGame();
  requestAnimationFrame(gameLoop);
}

// Input handling
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  aimX = (e.clientX - rect.left) * (W / rect.width);
  aimY = (e.clientY - rect.top) * (H / rect.height);
});

canvas.addEventListener('click', e => {
  if (!gameStarted || gameOver) { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  shoot(x, y);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameStarted || gameOver) { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const x = (t.clientX - rect.left) * (W / rect.width);
  const y = (t.clientY - rect.top) * (H / rect.height);
  aimX = x; aimY = y;
  shoot(x, y);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  aimX = (t.clientX - rect.left) * (W / rect.width);
  aimY = (t.clientY - rect.top) * (H / rect.height);
}, { passive: false });

document.getElementById('highscore').textContent = localStorage.getItem('hs_bubbleshooter') || '0';
showOverlay('Bubble Shooter', 'Click or tap to aim & shoot!\nMatch 3+ same color to pop them.\n\nClick to Start!');
gameLoop();
</script>
</body>
</html>
