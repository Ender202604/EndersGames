<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Scramble - Ender's Game World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0000;
  font-family: Arial, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
}
#home-btn {
  position: absolute;
  top: 10px; left: 10px;
  background: darkred;
  color: yellow;
  border: 2px solid yellow;
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
}
#home-btn:hover { background: #8b0000; }
h1 { color: yellow; font-size: 28px; margin: 10px 0 4px; }
#subtitle { color: #ffaaaa; font-size: 13px; margin-bottom: 10px; }
#cat-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.cat-btn {
  background: #3a0000;
  color: #ffaaaa;
  border: 1px solid #ff6666;
  border-radius: 6px;
  padding: 4px 12px;
  cursor: pointer;
  font-size: 13px;
}
.cat-btn.active, .cat-btn:hover { background: darkred; color: yellow; border-color: yellow; }
#game-panel {
  background: #2a0000;
  border: 2px solid #8b0000;
  border-radius: 14px;
  padding: 20px;
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
#score-round-bar {
  display: flex;
  justify-content: space-between;
  width: 100%;
  font-size: 15px;
  color: #ffaaaa;
}
#score-round-bar span { color: yellow; font-weight: bold; }
#timer-bar {
  width: 100%;
  height: 10px;
  background: #5a0000;
  border-radius: 5px;
  overflow: hidden;
}
#timer-fill {
  height: 100%;
  background: yellow;
  border-radius: 5px;
  transition: width 0.5s linear, background 0.3s;
}
#timer-num {
  color: yellow;
  font-size: 20px;
  font-weight: bold;
}
#category-label {
  color: #ffaaaa;
  font-size: 13px;
}
#scrambled-word {
  font-size: 42px;
  font-weight: bold;
  color: yellow;
  letter-spacing: 10px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(255,200,0,0.4);
}
#scrambled-word.wrong-shake { animation: shake 0.4s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)}
}
#input-row {
  display: flex;
  gap: 8px;
  width: 100%;
}
#answer-input {
  flex: 1;
  padding: 10px 14px;
  background: #1a0000;
  border: 2px solid #8b0000;
  border-radius: 8px;
  font-size: 18px;
  color: white;
  outline: none;
  text-transform: uppercase;
}
#answer-input:focus { border-color: yellow; }
#submit-btn {
  padding: 10px 16px;
  background: darkred;
  color: yellow;
  border: 2px solid yellow;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}
#submit-btn:hover { background: #8b0000; }
#btn-row {
  display: flex;
  gap: 10px;
}
.game-btn {
  padding: 8px 18px;
  background: #3a0000;
  color: #ffaaaa;
  border: 1px solid #ff6666;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}
.game-btn:hover { background: darkred; color: yellow; border-color: yellow; }
#feedback {
  font-size: 18px;
  font-weight: bold;
  min-height: 28px;
  text-align: center;
}
#results-panel {
  display: none;
  background: #2a0000;
  border: 2px solid #8b0000;
  border-radius: 14px;
  padding: 24px 32px;
  text-align: center;
  max-width: 380px;
  width: 100%;
}
#results-panel h2 { color: yellow; margin-bottom: 16px; }
.res-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 17px; }
.res-label { color: #ffaaaa; }
.res-val { color: yellow; font-weight: bold; font-size: 20px; }
#play-again-btn {
  margin-top: 14px;
  padding: 10px 24px;
  background: darkred;
  color: yellow;
  border: 2px solid yellow;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
#play-again-btn:hover { background: #8b0000; }
</style>
</head>
<body>
<a id="home-btn" href="index.html">🏠 Home</a>
<h1>🔀 Word Scramble</h1>
<div id="subtitle">Unscramble the word before time runs out!</div>
<div id="cat-bar"></div>
<div id="game-panel">
  <div id="score-round-bar">
    <div>Round: <span id="round-num">1</span>/10</div>
    <div>Score: <span id="score-num">0</span></div>
  </div>
  <div id="timer-num">15</div>
  <div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
  <div id="category-label">Category: Animals</div>
  <div id="scrambled-word">------</div>
  <div id="input-row">
    <input id="answer-input" type="text" placeholder="Your answer..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="20">
    <button id="submit-btn" onclick="submitAnswer()">Go!</button>
  </div>
  <div id="btn-row">
    <button class="game-btn" onclick="useHint()">💡 Hint</button>
    <button class="game-btn" onclick="skipWord()">⏭ Skip</button>
  </div>
  <div id="feedback"></div>
</div>
<div id="results-panel">
  <h2>Game Over!</h2>
  <div class="res-row"><span class="res-label">Final Score</span><span class="res-val" id="final-score">0</span></div>
  <div class="res-row"><span class="res-label">Correct</span><span class="res-val" id="final-correct">0/10</span></div>
  <div class="res-row"><span class="res-label">Category</span><span class="res-val" id="final-cat">-</span></div>
  <button id="play-again-btn" onclick="startGame()">Play Again</button>
</div>

<script>
const WORD_CATS = {
  Animals:  ['ELEPHANT','GIRAFFE','PENGUIN','DOLPHIN','KANGAROO','CHEETAH','GORILLA','HAMSTER','LEOPARD','OCTOPUS','PANTHER','RACCOON','TOUCAN','WALRUS','BUFFALO','FALCON','JAGUAR','SCORPION','CARIBOU','PARROT'],
  Countries:['FRANCE','BRAZIL','JAPAN','CANADA','MEXICO','INDIA','EGYPT','RUSSIA','TURKEY','NORWAY','SWEDEN','GREECE','POLAND','UKRAINE','VIETNAM','KENYA','GHANA','CHILE','PERU','CUBA'],
  Sports:   ['SOCCER','TENNIS','HOCKEY','CRICKET','SWIMMING','CYCLING','BOXING','ARCHERY','SURFING','KARATE','BOWLING','FENCING','SAILING','SKIING','ROWING','DIVING','WRESTLING','VOLLEYBALL','BASKETBALL','BASEBALL'],
  Foods:    ['PIZZA','BURGER','SUSHI','TACOS','PASTA','SALMON','MANGO','BANANA','PRETZEL','WAFFLE','BROWNIE','COOKIE','NOODLE','OYSTER','PICKLE','QUINOA','RADISH','SPINACH','TOMATO','YOGURT']
};

let currentCat = 'Animals';
let round = 0;
let score = 0;
let currentWord = '';
let hintUsed = false;
let timerInterval = null;
let timeLeft = 15;
let gameRunning = false;
let wordQueue = [];

function buildCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  Object.keys(WORD_CATS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (!gameRunning) startGame();
    };
    bar.appendChild(btn);
  });
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function scramble(word) {
  let scrambled;
  let tries = 0;
  do {
    scrambled = shuffle(word.split('')).join('');
    tries++;
  } while (scrambled === word && tries < 20);
  return scrambled;
}

function startGame() {
  clearInterval(timerInterval);
  round = 0;
  score = 0;
  gameRunning = true;
  const words = WORD_CATS[currentCat];
  wordQueue = shuffle(words).slice(0, 10);
  document.getElementById('game-panel').style.display = 'flex';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  nextRound();
}

function nextRound() {
  if (round >= 10) { endGame(); return; }
  clearInterval(timerInterval);
  hintUsed = false;
  currentWord = wordQueue[round];
  round++;
  timeLeft = 15;

  document.getElementById('round-num').textContent = round;
  document.getElementById('score-num').textContent = score;
  document.getElementById('category-label').textContent = 'Category: ' + currentCat;
  document.getElementById('scrambled-word').textContent = scramble(currentWord);
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').focus();
  document.getElementById('feedback').textContent = '';
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showFeedback('⏰ Time! Word was: ' + currentWord, '#ff5555');
      setTimeout(nextRound, 1500);
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-num').textContent = timeLeft;
  const pct = (timeLeft / 15) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.style.background = timeLeft <= 5 ? '#ff4444' : timeLeft <= 8 ? 'orange' : 'yellow';
}

function submitAnswer() {
  if (!gameRunning) return;
  const ans = document.getElementById('answer-input').value.trim().toUpperCase();
  if (!ans) return;
  if (ans === currentWord) {
    const bonus = Math.ceil(timeLeft / 3) + (hintUsed ? 0 : 2);
    score += bonus;
    document.getElementById('score-num').textContent = score;
    showFeedback('Correct! +' + bonus + ' pts', '#7fff7f');
    clearInterval(timerInterval);
    setTimeout(nextRound, 1000);
  } else {
    const el = document.getElementById('scrambled-word');
    el.classList.add('wrong-shake');
    setTimeout(() => el.classList.remove('wrong-shake'), 500);
    showFeedback('Try again!', '#ff5555');
    document.getElementById('answer-input').value = '';
  }
}

function skipWord() {
  if (!gameRunning) return;
  clearInterval(timerInterval);
  showFeedback('Skipped! Word was: ' + currentWord, '#ffaaaa');
  setTimeout(nextRound, 1400);
}

function useHint() {
  if (!gameRunning || hintUsed) return;
  hintUsed = true;
  const hint = 'First letter: ' + currentWord[0];
  showFeedback('💡 ' + hint, '#ffcc00');
}

function showFeedback(msg, color) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.style.color = color;
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  document.getElementById('game-panel').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-cat').textContent = currentCat;
}

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

buildCatBar();
startGame();
</script>
</body>
</html>
