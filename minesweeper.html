<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minesweeper – Ender's Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a1a;font-family:'Segoe UI',Arial,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 10px}
a.back{position:fixed;top:10px;left:10px;color:#ffaaaa;text-decoration:none;font-size:13px;border:1px solid #ff6666;padding:4px 10px;border-radius:6px;z-index:999}
h1{color:#44ddff;font-size:2rem;margin:50px 0 6px;letter-spacing:2px}
.controls{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;justify-content:center;align-items:center}
select,button{background:#1a1a3a;color:#44ddff;border:2px solid #44ddff;border-radius:8px;padding:6px 14px;font-size:.9rem;cursor:pointer}
button{background:#1a3a1a;color:#44ff44;border-color:#44ff44}
button:hover{background:#2a5a2a}
.status-row{display:flex;gap:16px;margin:8px 0;align-items:center;flex-wrap:wrap;justify-content:center}
.stat{background:#0a0a2a;border:2px solid #4444aa;border-radius:8px;padding:5px 14px;text-align:center;min-width:80px}
.stat .label{font-size:.65rem;color:#aaaaff;text-transform:uppercase}
.stat .val{font-size:1.3rem;color:#44ddff;font-weight:bold}
.stat .sub{font-size:.65rem;color:#6666aa;margin-top:1px}
#board{display:grid;gap:2px;margin:10px 0;padding:6px;background:#1a1a3a;border-radius:10px;border:2px solid #4444aa}
.cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:bold;border-radius:5px;cursor:pointer;user-select:none;border:2px solid #5555bb;background:#2a2a5a;transition:.1s}
.cell:hover{background:#3a3a7a}
.cell.revealed{background:#0d0d2a;border-color:#3333aa;cursor:default}
.cell.revealed:hover{background:#0d0d2a}
.cell.flagged{background:#2a1a3a;color:#ff6666}
.cell.mine-hit{background:#aa0000;border-color:#ff0000}
.cell.mine-show{background:#1a0000;color:#ff4444}
.cell.safe-reveal{background:#0a2200;color:#44ff44;border-color:#44ff44}
.n1{color:#44aaff}.n2{color:#44ff88}.n3{color:#ff6644}.n4{color:#aa44ff}.n5{color:#ff4444}.n6{color:#44ffff}.n7{color:#ff44aa}.n8{color:#ffff44}
#msg{font-size:1.2rem;font-weight:bold;min-height:1.8rem;margin:6px 0}
.win-msg{color:#44ff44}
.lose-msg{color:#ff4444}
.hint{color:#8888aa;font-size:.75rem;margin-top:6px}
</style>
</head>
<body>
<a href="index.html" class="back">← Back</a>
<h1>Minesweeper</h1>
<div class="controls">
  <select id="diff" onchange="newGame()">
    <option value="easy">Easy (9x9, 10 mines)</option>
    <option value="med" selected>Medium (16x16, 40 mines)</option>
    <option value="hard">Hard (30x16, 99 mines)</option>
  </select>
  <button onclick="newGame()">New Game</button>
</div>
<div class="status-row">
  <div class="stat"><div class="label">Mines</div><div class="val" id="mcount">40</div></div>
  <div class="stat"><div class="label">Time</div><div class="val" id="timer">0</div><div class="sub">Best: <span id="best-time">--</span>s</div></div>
  <div class="stat"><div class="label">Flags</div><div class="val" id="flags">0</div></div>
</div>
<div id="board"></div>
<div id="msg"></div>
<div class="hint">Left-click: reveal | Right-click: flag</div>
<script>
// --- Web Audio API sound engine ---
var AC = window.AudioContext || window.webkitAudioContext;
var ac = AC ? new AC() : null;
function snd(freq, dur, type, vol) {
  if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.value = freq; o.type = type || 'square';
  g.gain.setValueAtTime(vol || 0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}
function sndReveal() { snd(660, 0.05, 'sine', 0.1); }
function sndExplosion() {
  snd(120, 0.08, 'sawtooth', 0.25);
  setTimeout(function(){ snd(80, 0.15, 'sawtooth', 0.3); }, 80);
  setTimeout(function(){ snd(50, 0.3, 'sawtooth', 0.25); }, 200);
}
function sndFlag() { snd(440, 0.08, 'sine', 0.12); }
function sndUnflag() { snd(330, 0.06, 'sine', 0.1); }
function sndWin() {
  var notes = [523, 659, 784, 1047];
  notes.forEach(function(f, i){
    setTimeout(function(){ snd(f, 0.15, 'sine', 0.2); }, i * 120);
  });
}

// --- High scores per difficulty (localStorage) ---
var HS_KEYS = { easy: 'hs_mines_easy', med: 'hs_mines_med', hard: 'hs_mines_hard' };
function getBestTime() {
  var diff = document.getElementById('diff').value;
  var v = localStorage.getItem(HS_KEYS[diff]);
  return v !== null ? parseInt(v, 10) : null;
}
function saveBestTime(t) {
  var diff = document.getElementById('diff').value;
  var cur = getBestTime();
  if (cur === null || t < cur) {
    localStorage.setItem(HS_KEYS[diff], t);
    return true;
  }
  return false;
}
function updateBestDisplay() {
  var v = getBestTime();
  document.getElementById('best-time').textContent = v !== null ? v : '--';
}

const DIFFS={easy:{r:9,c:9,m:10},med:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let rows,cols,mines,board,revealed,flagged,started,timer,timerID,firstClick,gameOver;

function getDiff(){return DIFFS[document.getElementById('diff').value];}

function newGame(){
  clearInterval(timerID);
  const d=getDiff();rows=d.r;cols=d.c;mines=d.m;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  started=false;timer=0;firstClick=true;gameOver=false;
  document.getElementById('timer').textContent=0;
  document.getElementById('mcount').textContent=mines;
  document.getElementById('flags').textContent=0;
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';
  updateBestDisplay();
  renderBoard();
}

function placeMines(sr,sc){
  let placed=0,attempts=0;
  while(placed<mines&&attempts<10000){
    attempts++;
    let r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(board[r][c]===-1)continue;
    if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(board[r][c]===-1)continue;
    let cnt=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      let nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===-1)cnt++;
    }
    board[r][c]=cnt;
  }
}

function renderBoard(){
  const b=document.getElementById('board');
  b.style.gridTemplateColumns='repeat('+cols+',32px)';
  b.innerHTML='';
  let fl=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    const rv=revealed[r][c],fg=flagged[r][c];
    if(rv){
      cell.classList.add('revealed');
      if(board[r][c]===-1)cell.classList.add('mine-show');
      else if(board[r][c]>0){cell.textContent=board[r][c];cell.classList.add('n'+board[r][c]);}
    }else if(fg){cell.classList.add('flagged');cell.textContent='🚩';fl++;}
    cell.addEventListener('click',()=>leftClick(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();rightClick(r,c);});
    b.appendChild(cell);
  }
  document.getElementById('flags').textContent=fl;
  document.getElementById('mcount').textContent=mines-fl;
}

function startTimer(){
  timerID=setInterval(()=>{
    timer++;document.getElementById('timer').textContent=timer;
  },1000);
}

function leftClick(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);startTimer();}
  if(board[r][c]===-1){reveal(r,c);explode(r,c);return;}
  sndReveal();
  flood(r,c);
  checkWin();
  renderBoard();
}

function flood(r,c){
  if(r<0||r>=rows||c<0||c>=cols)return;
  if(revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)flood(r+dr,c+dc);
}

function reveal(r,c){revealed[r][c]=true;}

function explode(er,ec){
  gameOver=true;clearInterval(timerID);
  sndExplosion();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(board[r][c]===-1)revealed[r][c]=true;
  renderBoard();
  const b=document.getElementById('board');
  const cells=b.children;
  const idx=er*cols+ec;
  cells[idx].classList.add('mine-hit');
  const msg=document.getElementById('msg');
  msg.textContent='💥 BOOM! Game Over!';msg.className='lose-msg';
}

function rightClick(r,c){
  if(gameOver||revealed[r][c])return;
  if(flagged[r][c]){ sndUnflag(); } else { sndFlag(); }
  flagged[r][c]=!flagged[r][c];
  renderBoard();
}

function checkWin(){
  let count=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(revealed[r][c])count++;
  if(count===rows*cols-mines){
    gameOver=true;clearInterval(timerID);
    sndWin();
    var isNew = saveBestTime(timer);
    updateBestDisplay();
    const msg=document.getElementById('msg');
    var txt = 'You Win! Time: '+timer+'s';
    if(isNew) txt += ' (New Best!)';
    msg.textContent=txt;msg.className='win-msg';
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c])flagged[r][c]=true;
    renderBoard();
  }
}

newGame();
</script>
</body>
</html>
