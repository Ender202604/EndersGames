<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird — Ender's Games</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#0a0a14;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace; }
canvas { display:block;cursor:pointer;touch-action:none; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#ffaaaa;text-decoration:none;font-size:13px;border:1px solid #ff6666;padding:4px 10px;border-radius:6px;z-index:999;">← Back</a>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=Math.min(window.innerWidth,380),H=Math.min(window.innerHeight-20,620);
C.width=W;C.height=H;

const PIPE_W=52,GAP=H*.28,PIPE_SPEED=2.8,GRAVITY=.55,FLAP=-9.5;
const BIRD_X=W*.28,BIRD_R=16;

let bird,pipes,score,best,state,raf,bgStars,clouds,groundX=0;
// state: 'title','playing','dead'

function init(){
  bird={y:H*.42,vy:0,angle:0,flapAnim:0};
  pipes=[];score=0;state='title';
  bgStars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*.75,r:Math.random()<.2?.9:.45,twinkle:Math.random()*Math.PI*2}));
  clouds=Array.from({length:5},()=>({x:Math.random()*W,y:Math.random()*H*.4+20,w:60+Math.random()*60,speed:.3+Math.random()*.3}));
  if(best===undefined)best=0;
}

function flap(){
  if(state==='title'){state='playing';spawnPipe();}
  else if(state==='dead'){init();state='playing';spawnPipe();}
  if(state==='playing'){bird.vy=FLAP;bird.flapAnim=8;}
}

C.addEventListener('click',flap);
C.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}});

function spawnPipe(){
  const minTop=H*.12,maxTop=H*.58;
  const topH=minTop+Math.random()*(maxTop-minTop);
  pipes.push({x:W+10,topH,passed:false});
}

let last=0,pipeTimer=0;
function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/16.67,2.5);last=ts;
  update(dt);render();
}

function update(dt){
  // Clouds
  for(const cl of clouds){cl.x-=cl.speed*dt;if(cl.x<-cl.w)cl.x=W+cl.w;}
  groundX=(groundX-PIPE_SPEED*dt*1.2)%(W*.5);
  if(state!=='playing')return;
  // Bird physics
  bird.vy+=GRAVITY*dt;
  bird.y+=bird.vy*dt;
  bird.angle=Math.min(Math.PI*.45,Math.max(-Math.PI*.35,bird.vy*.045));
  bird.flapAnim=Math.max(0,bird.flapAnim-dt);
  // Pipes
  pipeTimer+=dt;
  if(pipeTimer>88){pipeTimer=0;spawnPipe();}
  for(const p of pipes){
    p.x-=PIPE_SPEED*dt;
    if(!p.passed&&p.x+PIPE_W<BIRD_X){p.passed=true;score++;if(score>best)best=score;}
  }
  pipes=pipes.filter(p=>p.x>-PIPE_W-10);
  // Collision
  const bx=BIRD_X,by=bird.y;
  if(by>H-44||by<0){die();return;}
  for(const p of pipes){
    if(bx+BIRD_R-6>p.x&&bx-BIRD_R+6<p.x+PIPE_W){
      if(by-BIRD_R+5<p.topH||by+BIRD_R-5>p.topH+GAP){die();return;}
    }
  }
}

function die(){state='dead';bird.vy=FLAP*.5;}

function render(){
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H*.78);
  sky.addColorStop(0,'#0d0d2a');sky.addColorStop(1,'#1a2040');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Stars
  for(const s of bgStars){
    s.twinkle+=.04;
    ctx.globalAlpha=.5+Math.sin(s.twinkle)*.3;
    ctx.fillStyle='#cceeff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Clouds
  for(const cl of clouds){
    ctx.fillStyle='rgba(160,180,220,.18)';
    ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w*.5,cl.w*.22,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x-cl.w*.2,cl.y+cl.w*.08,cl.w*.32,cl.w*.17,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x+cl.w*.2,cl.y+cl.w*.06,cl.w*.28,cl.w*.15,0,0,Math.PI*2);ctx.fill();
  }
  // Pipes
  for(const p of pipes){drawPipe(p);}
  // Ground
  const gH=44;
  ctx.fillStyle='#2a5c1e';ctx.fillRect(0,H-gH,W,gH);
  ctx.fillStyle='#3a7c2a';ctx.fillRect(0,H-gH,W,10);
  // Ground tiles
  ctx.fillStyle='#4a8c38';
  const tileW=W*.5,tileH=6;
  const gOff=((groundX%tileW)+tileW)%tileW;
  for(let tx=-tileW;tx<W+tileW;tx+=tileW){
    ctx.fillRect(tx+gOff,H-gH+2,tileW-4,tileH);
  }
  // Bird
  drawBird();
  // HUD
  if(state==='playing'||state==='dead'){
    ctx.textAlign='center';ctx.font=`bold ${Math.round(H*.065)}px "Courier New"`;
    ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.strokeText(score,W/2,H*.1);
    ctx.fillStyle='#ffffff';ctx.shadowColor='#ffff88';ctx.shadowBlur=10;
    ctx.fillText(score,W/2,H*.1);ctx.shadowBlur=0;
  }
  // Overlays
  if(state==='title'){
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,H*.25,W,H*.45);
    ctx.textAlign='center';ctx.fillStyle='#ffee44';ctx.shadowColor='#ffee44';ctx.shadowBlur=18;
    ctx.font=`bold ${Math.round(H*.075)}px "Courier New"`;ctx.fillText('FLAPPY BIRD',W/2,H*.42);
    ctx.shadowBlur=0;ctx.fillStyle='#cccccc';ctx.font=`${Math.round(H*.035)}px "Courier New"`;
    ctx.fillText('TAP / SPACE to flap',W/2,H*.52);
    if(best>0){ctx.fillStyle='#ffaa44';ctx.font=`${Math.round(H*.04)}px "Courier New"`;ctx.fillText('BEST: '+best,W/2,H*.6);}
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H*.3,W,H*.38);
    ctx.textAlign='center';ctx.fillStyle='#ff5555';ctx.shadowColor='#ff5555';ctx.shadowBlur=16;
    ctx.font=`bold ${Math.round(H*.07)}px "Courier New"`;ctx.fillText('GAME OVER',W/2,H*.44);
    ctx.shadowBlur=0;ctx.fillStyle='#ffee44';ctx.font=`${Math.round(H*.045)}px "Courier New"`;
    ctx.fillText('SCORE: '+score,W/2,H*.52);
    ctx.fillStyle='#aaffaa';ctx.font=`${Math.round(H*.038)}px "Courier New"`;
    ctx.fillText('BEST: '+best,W/2,H*.59);
    ctx.fillStyle='#aaaaaa';ctx.font=`${Math.round(H*.032)}px "Courier New"`;
    ctx.fillText('Tap to play again',W/2,H*.66);
  }
}

function drawPipe(p){
  const GX=p.x,GY=p.topH,BX=p.x,BY=p.topH+GAP;
  // Top pipe
  const tg=ctx.createLinearGradient(GX,0,GX+PIPE_W,0);
  tg.addColorStop(0,'#2a8c1a');tg.addColorStop(.4,'#4ecc3a');tg.addColorStop(1,'#1a5c0e');
  ctx.fillStyle=tg;ctx.shadowColor='#33ff22';ctx.shadowBlur=5;
  ctx.fillRect(GX,0,PIPE_W,GY);
  // Cap top
  ctx.fillRect(GX-6,GY-22,PIPE_W+12,22);ctx.shadowBlur=0;
  // Highlight
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(GX+6,0,8,GY-22);
  // Bottom pipe
  ctx.fillStyle=tg;ctx.shadowColor='#33ff22';ctx.shadowBlur=5;
  ctx.fillRect(BX,BY,PIPE_W,H-BY-44);
  ctx.fillRect(BX-6,BY,PIPE_W+12,22);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(BX+6,BY+22,8,H-BY-44-22);
}

function drawBird(){
  ctx.save();
  ctx.translate(BIRD_X,bird.y);
  ctx.rotate(bird.angle);
  // Shadow
  ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=10;
  // Body
  ctx.fillStyle='#ffcc22';
  ctx.beginPath();ctx.ellipse(0,0,BIRD_R,BIRD_R*.82,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Wing
  const wingY=bird.flapAnim>0?-6:4;
  ctx.fillStyle='#ffaa00';
  ctx.beginPath();ctx.ellipse(-4,wingY,BIRD_R*.55,BIRD_R*.38,.3,0,Math.PI*2);ctx.fill();
  // Chest
  ctx.fillStyle='#ff8844';
  ctx.beginPath();ctx.ellipse(3,3,BIRD_R*.6,BIRD_R*.5,0,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(BIRD_R*.38,-BIRD_R*.2,BIRD_R*.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(BIRD_R*.48,-BIRD_R*.18,BIRD_R*.16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(BIRD_R*.52,-BIRD_R*.22,BIRD_R*.07,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.fillStyle='#ff7700';
  ctx.beginPath();ctx.moveTo(BIRD_R*.62,BIRD_R*.05);ctx.lineTo(BIRD_R*.62+10,0);ctx.lineTo(BIRD_R*.62,BIRD_R*.25);ctx.closePath();ctx.fill();
  ctx.restore();
}

init();requestAnimationFrame(loop);
</script>
</body>
</html>
