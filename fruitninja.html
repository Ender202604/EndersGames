<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruit Ninja – Ender's Game World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding-top: 40px; }
#home-btn { position: fixed; top: 8px; left: 10px; color: #ff9999; text-decoration: none; font-size: 13px; z-index: 99; }
#hud { display: flex; justify-content: space-between; width: 360px; padding: 4px 8px; font-size: 14px; color: #ffcccc; margin-bottom: 4px; }
#hud span { color: #ffff00; font-weight: bold; }
canvas { border: 2px solid #ff6666; border-radius: 8px; display: block; touch-action: none; cursor: crosshair; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 50; }
#overlay h1 { font-size: 36px; color: #ff6666; text-shadow: 0 0 20px #ff0000; }
#overlay .info { font-size: 18px; color: #ffcccc; }
#overlay .info span { color: #ffff00; font-weight: bold; }
.btn { background: darkred; border: 2px solid #ff6666; color: #ffff00; font-size: 18px; padding: 10px 28px; border-radius: 8px; cursor: pointer; }
.btn:hover { background: #aa0000; }
#lives-display { font-size: 18px; }
</style>
</head>
<body>
<a href="index.html" id="home-btn">🏠 Home</a>
<div id="hud">
  <div>Score: <span id="hud-score">0</span></div>
  <div id="lives-display">❤️❤️❤️</div>
  <div>Time: <span id="hud-timer">60</span>s</div>
</div>
<canvas id="gc" width="360" height="500"></canvas>

<div id="overlay">
  <h1>🍉 Fruit Ninja</h1>
  <div class="info">Slash fruits, avoid bombs!</div>
  <div class="info">High Score: <span id="ov-hs">0</span></div>
  <button class="btn" id="play-btn">▶ Play</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
var FB_CFG = {apiKey:"AIzaSyCF9IHEEWXxX24ouRVpkZuFR958N6_ceIc",authDomain:"enders-games.firebaseapp.com",databaseURL:"https://enders-games-default-rtdb.firebaseio.com",projectId:"enders-games",storageBucket:"enders-games.firebasestorage.app",messagingSenderId:"87049074470",appId:"1:87049074470:web:bc38b35669b43aedceb3e7"};

var HS_KEY = 'hs_fruitninja';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function saveHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }

function submitScore(score) {
  var name = localStorage.getItem('visitorName') || 'Player';
  try {
    var app = firebase.initializeApp(FB_CFG, 'lb_fruitninja');
    var db = app.database();
    db.ref('leaderboard/fruitninja').push({name:name, score:score, date:new Date().toLocaleDateString()});
  } catch(e) {}
}

var audio = null;
function getAudio() {
  if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  return audio;
}
function playBeep(freq, dur, type, vol) {
  var ac = getAudio(); if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W = 360, H = 500;

var FRUIT_TYPES = ['🍎','🍌','🍉','🍊','🍇'];
var FRUIT_PTS = [10,15,20,25,30];

var state = 'menu';
var score, lives, timer, frameCount;
var fruits, particles, blade;
var spawnTimer, bombCount;
var gameLoopId;
var lastTime, timerAcc;
var mouseDown;
var bladeTrail;

function initGame() {
  score = 0; lives = 3; timer = 60; frameCount = 0;
  fruits = []; particles = []; blade = []; bladeTrail = [];
  spawnTimer = 0; bombCount = 0;
  lastTime = null; timerAcc = 0;
  mouseDown = false;
  updateHUD();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-timer').textContent = Math.ceil(timer);
  var lh = '';
  for (var i = 0; i < lives; i++) lh += '❤️';
  for (var i = lives; i < 3; i++) lh += '🖤';
  document.getElementById('lives-display').innerHTML = lh;
}

function spawnFruit() {
  var isBomb = (bombCount >= 8);
  if (isBomb) bombCount = 0;
  else bombCount++;

  var x = 40 + Math.random() * (W - 80);
  var vy = -(10 + Math.random() * 5);
  var vx = (Math.random() - 0.5) * 4;
  var idx = Math.floor(Math.random() * FRUIT_TYPES.length);
  fruits.push({
    x: x, y: H + 30,
    vx: vx, vy: vy,
    radius: isBomb ? 22 : 28,
    type: isBomb ? '💣' : FRUIT_TYPES[idx],
    pts: isBomb ? 0 : FRUIT_PTS[idx],
    isBomb: isBomb,
    sliced: false,
    alpha: 1,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1
  });
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 2 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color: color,
      radius: 4 + Math.random() * 4,
      life: 0.6 + Math.random() * 0.4
    });
  }
}

function spawnHalves(fruit) {
  for (var i = 0; i < 2; i++) {
    var dir = i === 0 ? -1 : 1;
    particles.push({
      x: fruit.x, y: fruit.y,
      vx: dir * (2 + Math.random() * 3),
      vy: fruit.vy * 0.5,
      alpha: 1,
      color: null,
      emoji: fruit.type,
      radius: fruit.radius * 0.7,
      isHalf: true,
      life: 0.8,
      rot: fruit.rot,
      rotSpeed: dir * 0.15
    });
  }
}

// Blade/slash collision: line segment vs circle
function lineCircle(x1, y1, x2, y2, cx, cy, r) {
  var dx = x2 - x1, dy = y2 - y1;
  var len2 = dx*dx + dy*dy;
  if (len2 === 0) {
    var ddx = cx - x1, ddy = cy - y1;
    return (ddx*ddx + ddy*ddy) <= r*r;
  }
  var t = ((cx - x1)*dx + (cy - y1)*dy) / len2;
  t = Math.max(0, Math.min(1, t));
  var px = x1 + t*dx, py = y1 + t*dy;
  var ex = cx - px, ey = cy - py;
  return (ex*ex + ey*ey) <= r*r;
}

function checkSlash() {
  if (bladeTrail.length < 2) return;
  var slicedAny = false;
  for (var i = 0; i < fruits.length; i++) {
    var f = fruits[i];
    if (f.sliced) continue;
    var hit = false;
    for (var j = 0; j < bladeTrail.length - 1; j++) {
      if (lineCircle(bladeTrail[j].x, bladeTrail[j].y, bladeTrail[j+1].x, bladeTrail[j+1].y, f.x, f.y, f.radius)) {
        hit = true; break;
      }
    }
    if (hit) {
      f.sliced = true;
      if (f.isBomb) {
        playBeep(80, 0.5, 'sawtooth', 0.4);
        spawnParticles(f.x, f.y, '#333333', 20);
        gameOver();
        return;
      } else {
        score += f.pts;
        playBeep(600 + Math.random() * 200, 0.15, 'sine', 0.3);
        spawnParticles(f.x, f.y, '#ffff00', 12);
        spawnHalves(f);
        slicedAny = true;
      }
    }
  }
  bladeTrail = [];
}

function gameOver() {
  state = 'over';
  saveHS(score);
  submitScore(score);
  showOverlay(true);
}

function showOverlay(isOver) {
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ov-hs').textContent = getHS();
  var h1 = ov.querySelector('h1');
  var info = ov.querySelectorAll('.info');
  if (isOver) {
    h1.textContent = 'Game Over!';
    info[0].innerHTML = 'Score: <span style="color:#ffff00;font-weight:bold">' + score + '</span>';
    info[1].innerHTML = 'High Score: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play Again';
  } else {
    h1.textContent = '🍉 Fruit Ninja';
    info[0].textContent = 'Slash fruits, avoid bombs!';
    info[1].innerHTML = 'High Score: <span style="color:#ffff00;font-weight:bold">' + getHS() + '</span>';
    document.getElementById('play-btn').textContent = '▶ Play';
  }
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function startGame() {
  initGame();
  hideOverlay();
  state = 'play';
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  lastTime = null;
  gameLoopId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (state !== 'play') return;
  if (!lastTime) lastTime = ts;
  var dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  update(dt);
  draw();
  gameLoopId = requestAnimationFrame(loop);
}

function update(dt) {
  timer -= dt;
  timerAcc += dt;
  spawnTimer += dt;
  frameCount++;

  if (spawnTimer >= 1.2) {
    spawnTimer = 0;
    spawnFruit();
  }

  // Update fruits
  for (var i = fruits.length - 1; i >= 0; i--) {
    var f = fruits[i];
    f.vy += 10 * dt; // gravity
    f.x += f.vx * 60 * dt;
    f.y += f.vy * 60 * dt;
    f.rot += f.rotSpeed;

    if (f.sliced) {
      f.alpha -= dt * 2;
      if (f.alpha <= 0) { fruits.splice(i, 1); continue; }
    } else if (f.y > H + 60) {
      if (!f.isBomb) {
        lives--;
        playBeep(200, 0.3, 'triangle', 0.3);
        updateHUD();
        if (lives <= 0) { gameOver(); return; }
      }
      fruits.splice(i, 1);
      continue;
    }
  }

  // Update particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * 60 * dt;
    p.y += p.vy * 60 * dt;
    if (p.isHalf) {
      p.vy += 8 * dt;
      p.rot += p.rotSpeed;
    }
    p.alpha -= dt / p.life;
    if (p.alpha <= 0) particles.splice(i, 1);
  }

  if (timer <= 0) {
    timer = 0;
    gameOver();
    return;
  }
  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a00');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Draw particles
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    if (p.isHalf) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.font = (p.radius * 2) + 'px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, 0, 0);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Draw fruits
  for (var i = 0; i < fruits.length; i++) {
    var f = fruits[i];
    ctx.save();
    ctx.globalAlpha = f.sliced ? Math.max(0, f.alpha) : 1;
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.font = (f.radius * 1.4) + 'px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.type, 0, 0);
    ctx.restore();
  }

  // Draw blade trail
  if (bladeTrail.length > 1) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = '#88ffff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
    for (var i = 1; i < bladeTrail.length; i++) {
      ctx.lineTo(bladeTrail[i].x, bladeTrail[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// Input
function getPos(e, isTouch) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width, scaleY = H / rect.height;
  var src = isTouch ? e.changedTouches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', function(e) {
  if (state !== 'play') return;
  mouseDown = true;
  bladeTrail = [];
  var p = getPos(e, false);
  bladeTrail.push(p);
});
canvas.addEventListener('mousemove', function(e) {
  if (state !== 'play' || !mouseDown) return;
  var p = getPos(e, false);
  bladeTrail.push(p);
  if (bladeTrail.length > 10) bladeTrail.shift();
});
canvas.addEventListener('mouseup', function(e) {
  if (state !== 'play') return;
  mouseDown = false;
  checkSlash();
  bladeTrail = [];
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (state !== 'play') return;
  bladeTrail = [];
  var p = getPos(e, true);
  bladeTrail.push(p);
}, {passive: false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (state !== 'play') return;
  var p = getPos(e, true);
  bladeTrail.push(p);
  if (bladeTrail.length > 10) bladeTrail.shift();
}, {passive: false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (state !== 'play') return;
  checkSlash();
  bladeTrail = [];
}, {passive: false});

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('play-btn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

// Init display
document.getElementById('ov-hs').textContent = getHS();
</script>
</body>
</html>
