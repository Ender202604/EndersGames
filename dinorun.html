<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Run - Ender's Game World</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a0000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: white;
    overflow: hidden;
    touch-action: none;
  }
  #homeBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: darkred;
    color: yellow;
    border: 2px solid yellow;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    z-index: 100;
  }
  #homeBtn:hover { background: #8b0000; }
  h1 {
    color: yellow;
    font-size: 22px;
    margin-bottom: 6px;
    text-shadow: 2px 2px 0 #8b0000;
  }
  #gameCanvas {
    border: 3px solid #ff6600;
    border-radius: 6px;
    display: block;
    background: #0d0d0d;
    image-rendering: pixelated;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    width: 600px;
    max-width: 95vw;
    margin-top: 6px;
    font-size: 16px;
    color: yellow;
  }
  #msg {
    margin-top: 6px;
    font-size: 15px;
    color: #ffaaaa;
    text-align: center;
    height: 20px;
  }
  #diff-row {
    display: flex;
    gap: 8px;
    margin: 4px 0;
    align-items: center;
  }
  .diff-btn {
    background: #2a0000;
    color: #ffcc00;
    border: 2px solid #ff6600;
    padding: 4px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  .diff-btn.active { background: #cc0000; color: white; }
  #instructions {
    margin-top: 4px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
</style>
</head>
<body>
<a href="index.html" id="homeBtn">🏠 Home</a>
<h1>🦕 Dino Run</h1>
<div id="diff-row">
  <button class="diff-btn active" id="btn-easy" onclick="setDiff('easy')">Easy</button>
  <button class="diff-btn" id="btn-hard" onclick="setDiff('hard')">Hard</button>
</div>
<canvas id="gameCanvas" width="600" height="200"></canvas>
<div id="ui">
  <span>Score: <span id="scoreDisplay">0</span></span>
  <span>Best: <span id="bestDisplay">0</span></span>
  <span>Speed: <span id="speedDisplay">1.0</span>x</span>
</div>
<div id="msg">Press SPACE or TAP to start!</div>
<div id="instructions">SPACE / Tap = Jump &nbsp;|&nbsp; Double jump allowed!</div>

<script>
// --- Audio ---
var AC = window.AudioContext || window.webkitAudioContext;
var ac = AC ? new AC() : null;
function snd(freq, dur, type, vol) {
  if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.value = freq; o.type = type || 'square';
  g.gain.setValueAtTime(vol || 0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}
function sndJump() { snd(440, 0.1, 'square', 0.12); setTimeout(function(){ snd(550, 0.08, 'square', 0.08); }, 60); }
function sndDie() { snd(200, 0.15, 'square', 0.2); setTimeout(function(){ snd(150, 0.2, 'sine', 0.15); }, 100); setTimeout(function(){ snd(100, 0.25, 'sine', 0.12); }, 200); }
function sndMilestone() { [660, 880, 1100].forEach(function(f,i){ setTimeout(function(){ snd(f, 0.12, 'sine', 0.15); }, i*80); }); }

// --- High Score ---
var HS_KEY = 'hs_dinorun';
function getHiScore() { return parseInt(localStorage.getItem(HS_KEY) || '0'); }
function saveHiScore(v) { if (v > getHiScore()) { localStorage.setItem(HS_KEY, v); return true; } return false; }

// --- Difficulty ---
var difficulty = 'easy';
function setDiff(d) {
  if (difficulty === d) return;
  difficulty = d;
  document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
  document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
  // Reset game state
  state = 'idle';
  msgEl.textContent = 'Press SPACE or TAP to start!';
  resetGame();
}
function getDiffParams() {
  return difficulty === 'hard'
    ? { baseSpeed: 5.5, maxSpeed: 18, intervalMin: 28, intervalStart: 65 }
    : { baseSpeed: 4, maxSpeed: 14, intervalMin: 35, intervalStart: 80 };
}

(function() {
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('scoreDisplay');
  var bestEl = document.getElementById('bestDisplay');
  var speedEl = document.getElementById('speedDisplay');

  bestEl.textContent = getHiScore();
  window.msgEl = document.getElementById('msg');
  window.state = 'idle';

  var W = canvas.width, H = canvas.height;
  var GROUND = H - 30;

  var score = 0, best = 0, frame = 0;
  var speed = 4;
  var lastMilestone = 0;

  var dino = {
    x: 60, y: GROUND, w: 30, h: 40,
    vy: 0, jumps: 0, maxJumps: 2,
    legFrame: 0, legTimer: 0
  };

  var obstacles = [];
  var obstacleTimer = 0;
  var obstacleInterval = 80;

  var clouds = [{x:200,y:40,w:70,h:25},{x:450,y:60,w:50,h:20}];
  var groundOffset = 0;

  window.resetGame = function() {
    var dp = getDiffParams();
    score = 0; frame = 0; speed = dp.baseSpeed;
    dino.y = GROUND; dino.vy = 0; dino.jumps = 0;
    dino.legFrame = 0;
    obstacles = [];
    obstacleTimer = 0;
    obstacleInterval = dp.intervalStart;
    lastMilestone = 0;
    best = getHiScore();
    bestEl.textContent = best;
  };

  function jump() {
    if (state === 'idle' || state === 'dead') {
      state = 'running';
      resetGame();
      msgEl.textContent = '';
      sndJump();
      return;
    }
    if (dino.jumps < dino.maxJumps) {
      dino.vy = -12;
      dino.jumps++;
      sndJump();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') { e.preventDefault(); jump(); }
  });
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); jump(); }, {passive:false});
  canvas.addEventListener('mousedown', function() { jump(); });

  function spawnObstacle() {
    var dp = getDiffParams();
    // Hard mode: more birds
    var birdChance = difficulty === 'hard' ? 0.5 : 0.3;
    var type = Math.random() < (1 - birdChance) ? 'cactus' : 'bird';
    if (type === 'cactus') {
      var h = 25 + Math.floor(Math.random() * 25);
      var w = 18 + Math.floor(Math.random() * 14);
      obstacles.push({type:'cactus', x:W+10, y:GROUND+dino.h-h, w:w, h:h});
    } else {
      var bh = 20, bw = 34;
      var by = GROUND - 40 - Math.floor(Math.random() * 40);
      obstacles.push({type:'bird', x:W+10, y:by, w:bw, h:bh, wingUp:true, wingTimer:0});
    }
  }

  function drawPixelDino(x, y, legPhase) {
    ctx.fillStyle = '#55ff55';
    ctx.fillRect(x+4, y+8, 20, 20);
    ctx.fillRect(x+10, y, 16, 14);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+22, y+3, 3, 3);
    ctx.fillStyle = '#55ff55';
    ctx.fillRect(x+20, y+9, 6, 3);
    ctx.fillStyle = '#55ff55';
    ctx.fillRect(x, y+12, 8, 8);
    ctx.fillRect(x-4, y+16, 6, 5);
    ctx.fillStyle = '#44cc44';
    if (legPhase === 0) {
      ctx.fillRect(x+8, y+28, 8, 12);
      ctx.fillRect(x+16, y+28, 8, 6);
    } else {
      ctx.fillRect(x+8, y+28, 8, 6);
      ctx.fillRect(x+16, y+28, 8, 12);
    }
  }

  function drawCactus(obs) {
    ctx.fillStyle = '#228822';
    ctx.fillRect(obs.x + obs.w/2 - 5, obs.y, 10, obs.h);
    if (obs.h > 30) {
      ctx.fillRect(obs.x, obs.y + obs.h * 0.3, obs.w/2 - 3, 7);
      ctx.fillRect(obs.x, obs.y + obs.h * 0.3 - 10, 7, 12);
      ctx.fillRect(obs.x + obs.w/2 + 3, obs.y + obs.h * 0.4, obs.w/2 - 3, 7);
      ctx.fillRect(obs.x + obs.w - 7, obs.y + obs.h * 0.4 - 8, 7, 10);
    }
    ctx.fillStyle = '#33aa33';
    ctx.fillRect(obs.x + obs.w/2 - 4, obs.y + 2, 8, obs.h - 4);
  }

  function drawBird(obs) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(obs.x + 8, obs.y + 8, 18, 8);
    ctx.fillRect(obs.x + 24, obs.y + 6, 8, 5);
    ctx.fillStyle = '#cc2222';
    if (obs.wingUp) {
      ctx.fillRect(obs.x, obs.y, 14, 8);
      ctx.fillRect(obs.x + 18, obs.y, 14, 8);
    } else {
      ctx.fillRect(obs.x, obs.y + 12, 14, 8);
      ctx.fillRect(obs.x + 18, obs.y + 12, 14, 8);
    }
    ctx.fillStyle = '#000';
    ctx.fillRect(obs.x + 26, obs.y + 7, 3, 3);
  }

  function drawCloud(cloud) {
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.ellipse(cloud.x, cloud.y, cloud.w/2, cloud.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x - 18, cloud.y + 6, cloud.w/3, cloud.h/2.5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x + 20, cloud.y + 4, cloud.w/3, cloud.h/2.5, 0, 0, Math.PI*2);
    ctx.fill();
  }

  function checkCollision(dino, obs) {
    var pad = 6;
    return !(dino.x + dino.w - pad < obs.x + pad ||
             dino.x + pad > obs.x + obs.w - pad ||
             dino.y + pad > obs.y + obs.h - pad ||
             dino.y + dino.h - pad < obs.y + pad);
  }

  function update() {
    if (state !== 'running') return;
    var dp = getDiffParams();

    frame++;
    score = Math.floor(frame / 6);
    speed = dp.baseSpeed + frame / 500;
    if (speed > dp.maxSpeed) speed = dp.maxSpeed;

    // Score milestone sounds
    var milestone = Math.floor(score / 100) * 100;
    if (milestone > 0 && milestone > lastMilestone) {
      lastMilestone = milestone;
      sndMilestone();
    }

    dino.vy += 0.7;
    dino.y += dino.vy;
    if (dino.y >= GROUND) {
      dino.y = GROUND;
      dino.vy = 0;
      dino.jumps = 0;
    }

    dino.legTimer++;
    if (dino.legTimer > 8) {
      dino.legFrame = 1 - dino.legFrame;
      dino.legTimer = 0;
    }

    obstacleTimer++;
    if (obstacleTimer >= obstacleInterval) {
      spawnObstacle();
      obstacleTimer = 0;
      obstacleInterval = Math.max(dp.intervalMin, dp.intervalStart - frame / 80);
    }
    for (var i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].type === 'bird') {
        obstacles[i].wingTimer++;
        if (obstacles[i].wingTimer > 12) {
          obstacles[i].wingUp = !obstacles[i].wingUp;
          obstacles[i].wingTimer = 0;
        }
      }
      if (obstacles[i].x + obstacles[i].w < 0) {
        obstacles.splice(i, 1);
      } else if (checkCollision(dino, obstacles[i])) {
        state = 'dead';
        sndDie();
        if (score > getHiScore()) saveHiScore(score);
        best = getHiScore();
        bestEl.textContent = best;
        msgEl.textContent = 'Game Over! Press SPACE or TAP to restart.';
        return;
      }
    }

    for (var j = 0; j < clouds.length; j++) {
      clouds[j].x -= speed * 0.3;
      if (clouds[j].x + clouds[j].w < 0) clouds[j].x = W + 80;
    }

    groundOffset = (groundOffset + speed) % 30;

    scoreEl.textContent = score;
    speedEl.textContent = speed.toFixed(1);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a1a');
    grad.addColorStop(1, '#1a0a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    var stars = [[30,15],[80,25],[150,10],[280,30],[400,12],[520,22],[570,8],[100,50],[350,45]];
    for (var s = 0; s < stars.length; s++) {
      ctx.fillRect(stars[s][0], stars[s][1], 2, 2);
    }

    for (var c = 0; c < clouds.length; c++) drawCloud(clouds[c]);

    ctx.fillStyle = '#333';
    ctx.fillRect(0, GROUND + 40, W, 2);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, GROUND + 42, W, H - GROUND - 42);

    ctx.fillStyle = '#444';
    for (var gx = (-groundOffset + W) % 30; gx < W; gx += 30) {
      ctx.fillRect(gx, GROUND + 41, 15, 2);
    }

    var legPhase = (dino.y < GROUND) ? 0 : dino.legFrame;
    drawPixelDino(dino.x - dino.w/2, dino.y - dino.h + dino.h/4, legPhase);

    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i];
      if (obs.type === 'cactus') drawCactus(obs);
      else drawBird(obs);
    }

    if (state === 'idle') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'yellow';
      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('🦕 DINO RUN', W/2, H/2 - 20);
      ctx.fillStyle = '#ffaaaa';
      ctx.font = '16px Courier New';
      ctx.fillText('Press SPACE or TAP to start!', W/2, H/2 + 15);
      ctx.textAlign = 'left';
    }
    if (state === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 60, W, 80);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 26px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, 95);
      ctx.fillStyle = 'yellow';
      ctx.font = '16px Courier New';
      ctx.fillText('Score: ' + score + '   Best: ' + best, W/2, 120);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
