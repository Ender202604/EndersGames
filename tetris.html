<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris – Ender's Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a000a;font-family:'Segoe UI',Arial,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 10px}
a.back{position:fixed;top:10px;left:10px;color:#ffaaaa;text-decoration:none;font-size:13px;border:1px solid #ff6666;padding:4px 10px;border-radius:6px;z-index:999}
h1{color:#dd44ff;font-size:2rem;margin:50px 0 6px;letter-spacing:2px}
.game-wrap{display:flex;gap:14px;align-items:flex-start;margin:10px 0;flex-wrap:wrap;justify-content:center}
canvas#board{border:3px solid #aa33ff;border-radius:8px;background:#0d000d}
.side-panel{display:flex;flex-direction:column;gap:12px;min-width:110px}
.panel-box{background:#1a001a;border:2px solid #aa33ff;border-radius:10px;padding:10px 14px;text-align:center}
.panel-box .plabel{font-size:.65rem;color:#cc88ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.panel-box .pval{font-size:1.4rem;color:#dd44ff;font-weight:bold}
.panel-box .psub{font-size:.7rem;color:#aa66cc;margin-top:2px}
canvas#preview{border:2px solid #882299;border-radius:6px;background:#0d000d;display:block;margin:0 auto}
button{background:#2a0044;color:#dd44ff;border:2px solid #aa33ff;border-radius:8px;padding:8px 18px;font-size:.95rem;cursor:pointer;margin:6px 0}
button:hover{background:#440066}
.mobile-controls{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.mc-btn{background:#1a001a;color:#dd44ff;border:2px solid #882299;border-radius:8px;padding:12px 18px;font-size:1.3rem;cursor:pointer;user-select:none;-webkit-user-select:none}
.mc-btn:active{background:#440066}
#msg{font-size:1.3rem;font-weight:bold;color:#dd44ff;min-height:1.8rem;text-align:center}
.hint{color:#882299;font-size:.75rem;margin-top:4px}
.diff-row{display:flex;gap:8px;margin:6px 0;justify-content:center;flex-wrap:wrap}
.diff-btn{background:#1a001a;color:#cc88ff;border:2px solid #882299;border-radius:6px;padding:5px 14px;font-size:.82rem;cursor:pointer}
.diff-btn.active{background:#440066;border-color:#dd44ff;color:#fff}
</style>
</head>
<body>
<a href="index.html" class="back">← Back</a>
<h1>Tetris</h1>
<div id="msg"></div>
<div class="diff-row">
  <div class="diff-btn" id="d-easy" onclick="setDiff('easy')">Easy</div>
  <div class="diff-btn active" id="d-normal" onclick="setDiff('normal')">Normal</div>
  <div class="diff-btn" id="d-hard" onclick="setDiff('hard')">Hard</div>
</div>
<div class="game-wrap">
  <canvas id="board" width="200" height="400"></canvas>
  <div class="side-panel">
    <div class="panel-box"><div class="plabel">Next</div><canvas id="preview" width="80" height="80"></canvas></div>
    <div class="panel-box">
      <div class="plabel">Score</div>
      <div class="pval" id="score">0</div>
      <div class="psub">Best: <span id="best-score">0</span></div>
    </div>
    <div class="panel-box"><div class="plabel">Lines</div><div class="pval" id="lines">0</div></div>
    <div class="panel-box"><div class="plabel">Level</div><div class="pval" id="level">1</div></div>
    <button onclick="startGame()">New Game</button>
  </div>
</div>
<div class="mobile-controls">
  <div class="mc-btn" id="btn-left">◀</div>
  <div class="mc-btn" id="btn-down">▼</div>
  <div class="mc-btn" id="btn-right">▶</div>
  <div class="mc-btn" id="btn-rotate">↺</div>
  <div class="mc-btn" id="btn-drop">⬇</div>
</div>
<div class="hint">Arrow keys / buttons | Space: hard drop | Up: rotate</div>
<script>
// --- Web Audio API sound engine ---
var AC = window.AudioContext || window.webkitAudioContext;
var ac = AC ? new AC() : null;
function snd(freq, dur, type, vol) {
  if (!ac) return;
  var o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.value = freq; o.type = type || 'square';
  g.gain.setValueAtTime(vol || 0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}
function sndLineClear(lines) {
  // Ascending chord, brighter with more lines
  var freqs = [262, 330, 392, 523];
  var count = Math.min(lines, 4);
  for (var i = 0; i < count; i++) {
    (function(idx) {
      setTimeout(function() { snd(freqs[idx], 0.15, 'square', 0.2); }, idx * 60);
    })(i);
  }
}
function sndLock() { snd(180, 0.08, 'square', 0.1); }
function sndGameOver() {
  snd(300, 0.15, 'sawtooth', 0.18);
  setTimeout(function(){ snd(250, 0.15, 'sawtooth', 0.18); }, 150);
  setTimeout(function(){ snd(200, 0.3, 'sawtooth', 0.18); }, 300);
}
function sndLevelUp() {
  snd(392, 0.1, 'square', 0.2);
  setTimeout(function(){ snd(523, 0.1, 'square', 0.2); }, 110);
  setTimeout(function(){ snd(659, 0.2, 'square', 0.2); }, 220);
}

// --- Difficulty ---
var difficulty = 'normal';
var DIFF_SPEED = { easy: 1100, normal: 800, hard: 400 };

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('d-' + d).classList.add('active');
}

// --- High score (localStorage) ---
function loadBest() {
  var v = parseInt(localStorage.getItem('hs_tetris') || '0', 10);
  document.getElementById('best-score').textContent = v;
  return v;
}
function saveBest(s) {
  var cur = parseInt(localStorage.getItem('hs_tetris') || '0', 10);
  if (s > cur) {
    localStorage.setItem('hs_tetris', s);
    document.getElementById('best-score').textContent = s;
  }
}

const COLS=10,ROWS=20,BS=20;
const canvas=document.getElementById('board'),ctx=canvas.getContext('2d');
const pvCanvas=document.getElementById('preview'),pvCtx=pvCanvas.getContext('2d');

const PIECES=[
  {shape:[[1,1,1,1]],color:'#00ffff'},
  {shape:[[1,1],[1,1]],color:'#ffff00'},
  {shape:[[0,1,0],[1,1,1]],color:'#aa00ff'},
  {shape:[[1,1,0],[0,1,1]],color:'#00ff66'},
  {shape:[[0,1,1],[1,1,0]],color:'#ff4444'},
  {shape:[[1,0,0],[1,1,1]],color:'#ff8800'},
  {shape:[[0,0,1],[1,1,1]],color:'#4488ff'},
];

let grid,current,next,score,lines,level,gameRunning,loopID,dropCounter,lastTime;
var prevLevel = 1;

function newGrid(){return Array.from({length:ROWS},()=>Array(COLS).fill(0));}

function randomPiece(){
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return{shape:p.shape.map(r=>[...r]),color:p.color,x:Math.floor(COLS/2)-Math.floor(p.shape[0].length/2),y:0};
}

function rotate(piece){
  const rows=piece.shape.length,cols=piece.shape[0].length;
  const rotated=Array.from({length:cols},()=>Array(rows).fill(0));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)rotated[c][rows-1-r]=piece.shape[r][c];
  return rotated;
}

function isValid(shape,ox,oy){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    const nx=ox+c,ny=oy+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return false;
    if(ny>=0&&grid[ny][nx])return false;
  }
  return true;
}

function lock(){
  sndLock();
  for(let r=0;r<current.shape.length;r++)for(let c=0;c<current.shape[r].length;c++){
    if(!current.shape[r][c])continue;
    const ny=current.y+r;
    if(ny<0){gameOver();return;}
    grid[ny][current.x+c]=current.color;
  }
  clearLines();
  current=next;next=randomPiece();
  if(!isValid(current.shape,current.x,current.y)){gameOver();}
  drawPreview();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c)){grid.splice(r,1);grid.unshift(Array(COLS).fill(0));cleared++;r++;}
  }
  if(cleared){
    sndLineClear(cleared);
    const pts=[0,100,300,500,800];
    score+=pts[cleared]*level;lines+=cleared;
    const newLevel=Math.floor(lines/10)+1;
    if(newLevel>level){ sndLevelUp(); }
    level=newLevel;
    document.getElementById('score').textContent=score;
    document.getElementById('lines').textContent=lines;
    document.getElementById('level').textContent=level;
    saveBest(score);
  }
}

function drawBlock(ctx,x,y,color,size){
  ctx.fillStyle=color;
  ctx.fillRect(x*size+1,y*size+1,size-2,size-2);
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillRect(x*size+2,y*size+2,size-6,3);
}

function drawGame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle='#1a001a';ctx.fillRect(c*BS,r*BS,BS,BS);
    ctx.strokeStyle='#2a002a';ctx.strokeRect(c*BS+.5,r*BS+.5,BS-1,BS-1);
    if(grid[r][c])drawBlock(ctx,c,r,grid[r][c],BS);
  }
  if(current){
    let ghostY=current.y;
    while(isValid(current.shape,current.x,ghostY+1))ghostY++;
    for(let r=0;r<current.shape.length;r++)for(let c=0;c<current.shape[r].length;c++){
      if(!current.shape[r][c])continue;
      ctx.fillStyle='rgba(255,255,255,0.1)';
      ctx.fillRect((current.x+c)*BS+1,(ghostY+r)*BS+1,BS-2,BS-2);
    }
    for(let r=0;r<current.shape.length;r++)for(let c=0;c<current.shape[r].length;c++){
      if(!current.shape[r][c])continue;
      drawBlock(ctx,current.x+c,current.y+r,current.color,BS);
    }
  }
}

function drawPreview(){
  pvCtx.clearRect(0,0,80,80);
  pvCtx.fillStyle='#0d000d';pvCtx.fillRect(0,0,80,80);
  if(!next)return;
  const s=16;
  const ox=Math.floor((5-next.shape[0].length)/2);
  const oy=Math.floor((5-next.shape.length)/2);
  for(let r=0;r<next.shape.length;r++)for(let c=0;c<next.shape[r].length;c++){
    if(next.shape[r][c])drawBlock(pvCtx,ox+c,oy+r,next.color,s);
  }
}

function startGame(){
  clearInterval(loopID);
  grid=newGrid();score=0;lines=0;level=1;prevLevel=1;gameRunning=true;dropCounter=0;lastTime=null;
  document.getElementById('score').textContent=0;
  document.getElementById('lines').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('msg').textContent='';
  loadBest();
  current=randomPiece();next=randomPiece();
  drawPreview();
  requestAnimationFrame(loop);
}

function getSpeed(){
  var base = DIFF_SPEED[difficulty] || 800;
  return Math.max(80, base - (level-1)*60);
}

function loop(ts){
  if(!gameRunning)return;
  if(!lastTime)lastTime=ts;
  dropCounter+=ts-lastTime;lastTime=ts;
  if(dropCounter>getSpeed()){drop();dropCounter=0;}
  drawGame();
  requestAnimationFrame(loop);
}

function drop(){if(isValid(current.shape,current.x,current.y+1))current.y++;else lock();}
function hardDrop(){while(isValid(current.shape,current.x,current.y+1))current.y++;lock();}

function moveLeft(){if(isValid(current.shape,current.x-1,current.y))current.x--;}
function moveRight(){if(isValid(current.shape,current.x+1,current.y))current.x++;}
function tryRotate(){
  const r=rotate(current);
  if(isValid(r,current.x,current.y)){current.shape=r;}
  else if(isValid(r,current.x-1,current.y)){current.shape=r;current.x--;}
  else if(isValid(r,current.x+1,current.y)){current.shape=r;current.x++;}
}

function gameOver(){
  gameRunning=false;
  sndGameOver();
  saveBest(score);
  document.getElementById('msg').textContent='Game Over! Score: '+score;
}

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  if(e.key==='ArrowLeft'){e.preventDefault();moveLeft();}
  if(e.key==='ArrowRight'){e.preventDefault();moveRight();}
  if(e.key==='ArrowDown'){e.preventDefault();drop();dropCounter=0;}
  if(e.key==='ArrowUp'){e.preventDefault();tryRotate();}
  if(e.key===' '){e.preventDefault();hardDrop();}
});

document.getElementById('btn-left').addEventListener('click',()=>{if(gameRunning)moveLeft();});
document.getElementById('btn-right').addEventListener('click',()=>{if(gameRunning)moveRight();});
document.getElementById('btn-down').addEventListener('click',()=>{if(gameRunning){drop();dropCounter=0;}});
document.getElementById('btn-rotate').addEventListener('click',()=>{if(gameRunning)tryRotate();});
document.getElementById('btn-drop').addEventListener('click',()=>{if(gameRunning)hardDrop();});

let tx=null,ty=null;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!gameRunning||tx===null)return;
  let dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>20)moveRight();else if(dx<-20)moveLeft();}
  else{if(dy>20)hardDrop();else if(dy<-20)tryRotate();}
  tx=ty=null;
},{passive:true});

loadBest();
startGame();
</script>
</body>
</html>
